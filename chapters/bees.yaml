# Bees Chapter Definition - The Honey Makers
meta:
  id: bees
  issueNumber: 17
  date: "February 2026"
  folderName: "bees"
  title:
    en: "Bees: The Honey Makers"
    es: "Abejas: Las Hacedoras de Miel"
    ru: "Пчёлы: Создательницы Мёда"
  subtitle:
    en: "A Sweet Story of Flowers, Dance, and Teamwork"
    es: "Una Dulce Historia de Flores, Baile y Trabajo en Equipo"
    ru: "Сладкая история о цветах, танце и командной работе"
  magazineText:
    en: "Fly into the wonderful world of bees! Meet Queen Aurelia, hardworking Buzz, brave little Petal, and watchful Spike as they build their golden hive, dance to share secrets, visit beautiful flowers, and make the sweetest honey in the meadow. Teamwork makes the dream work!"
    es: "!Vuela al maravilloso mundo de las abejas! Conoce a la Reina Aurelia, la trabajadora Buzz, la valiente Petal y el vigilante Spike mientras construyen su colmena dorada, bailan para compartir secretos, visitan hermosas flores y hacen la miel mas dulce del prado. !El trabajo en equipo hace que el sueno se haga realidad!"
    ru: "Залетайте в удивительный мир пчёл! Познакомьтесь с Королевой Аурелией, трудолюбивой Базз, храброй малышкой Петал и бдительным Спайком, когда они строят свой золотой улей, танцуют, чтобы делиться секретами, навещают прекрасные цветы и делают самый сладкий мёд на лугу. Вместе мы — сила!"
  magazineCover: "magazine-cover.jpg"
  hasGeneratedContent: true
  footerSubtitle:
    en: "Celebrating the sweetest teamwork in the animal kingdom"
    es: "Celebrando el trabajo en equipo mas dulce del reino animal"
    ru: "Празднуя самую сладкую командную работу в животном мире"
  description: "Follow Queen Aurelia, Buzz, Petal, and Spike through the magical world of a beehive, where dancing, flower-visiting, and teamwork create the sweetest honey in the meadow"
  preface:
    en:
      - "Welcome to the buzzing, golden world of the beehive! Inside this incredible home, thousands of bees work together like one big family, each with a special job to do. Some build, some guard, some dance, and some fly far and wide to visit flowers!"
      - "Bees are some of the most important creatures on Earth. Every time you eat a strawberry, an apple, or a slice of watermelon, you can thank a bee! They carry pollen from flower to flower, helping plants grow the fruits and vegetables we all love."
      - "In this adventure, you will meet Queen Aurelia, the heart of the hive, hardworking Buzz, brave little Petal on her very first flight, and loyal Spike who keeps everyone safe. Together, they will show you how teamwork, dancing, and a little bit of magic turn flower nectar into golden honey!"
    es:
      - "!Bienvenidos al zumbante y dorado mundo de la colmena! Dentro de este increible hogar, miles de abejas trabajan juntas como una gran familia, cada una con un trabajo especial. !Algunas construyen, algunas guardan, algunas bailan y algunas vuelan lejos para visitar flores!"
      - "Las abejas son algunas de las criaturas mas importantes de la Tierra. Cada vez que comes una fresa, una manzana o una rebanada de sandia, !puedes agradecer a una abeja! Llevan polen de flor en flor, ayudando a las plantas a crecer las frutas y verduras que todos amamos."
      - "En esta aventura, conoceras a la Reina Aurelia, el corazon de la colmena, a la trabajadora Buzz, a la valiente Petal en su primer vuelo y al leal Spike que mantiene a todos a salvo. !Juntos te mostraran como el trabajo en equipo, el baile y un poco de magia convierten el nectar de las flores en miel dorada!"
    ru:
      - "Добро пожаловать в жужжащий, золотистый мир пчелиного улья! Внутри этого невероятного дома тысячи пчёл работают вместе, как одна большая семья, и у каждой есть особенная работа. Одни строят, другие охраняют, третьи танцуют, а некоторые летают далеко-далеко к цветам!"
      - "Пчёлы — одни из самых важных существ на Земле. Каждый раз, когда вы едите клубнику, яблоко или кусочек арбуза, вы можете поблагодарить пчелу! Они переносят пыльцу с цветка на цветок, помогая растениям выращивать фрукты и овощи, которые мы все любим."
      - "В этом приключении вы познакомитесь с Королевой Аурелией — сердцем улья, трудолюбивой Базз, храброй малышкой Петал в её самом первом полёте и верным Спайком, который хранит всех в безопасности. Вместе они покажут вам, как командная работа, танцы и немного волшебства превращают цветочный нектар в золотистый мёд!"

