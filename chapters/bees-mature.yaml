sections:
  # A Hive in Danger
  - id: a-hive-in-danger
    mood: [epic-skies, golden-hour]
    action: "dramatic wide shot of a beehive in an old oak tree at dusk, ominous dark storm clouds gathering, the warm golden glow of the hive contrasting with the darkening sky, bees returning urgently to the hive, tension in the air, a few large dark hornet shapes visible in the distance, cinematic and foreboding atmosphere, classic hand-drawn Disney animation style"
    title:
      en: "A Hive in Danger"
      es: "Una Colmena en Peligro"
      ru: "Улей в опасности"
    content:
      en: "The hive has survived drought and rain, heat and cold. Fifty thousand lives, humming together as one. But tonight, something is different. Spike stands at the entrance and feels it — a scent on the wind that does not belong. Something is watching the hive from the treeline. Something hungry. The last of the foragers rush home, their baskets heavy with pollen they may never unload. Inside, the hive hums a lower note tonight. Not the hum of work, but the hum of warning. Danger is coming, and every bee can feel it."
      es: "La colmena ha sobrevivido sequias y lluvias, calor y frio. Cincuenta mil vidas, zumbando juntas como una sola. Pero esta noche, algo es diferente. Spike esta en la entrada y lo siente — un aroma en el viento que no pertenece. Algo observa la colmena desde la linea de arboles. Algo hambriento. Las ultimas recolectoras se apresuran a casa, sus cestas pesadas con polen que quiza nunca descarguen. Adentro, la colmena zumba en una nota mas baja esta noche. No el zumbido del trabajo, sino el zumbido de advertencia."
      ru: "Улей пережил засуху и дождь, жару и холод. Пятьдесят тысяч жизней, жужжащих как одно целое. Но сегодня что-то не так. Спайк стоит у входа и чувствует это — запах на ветру, которому здесь не место. Что-то наблюдает за ульем из-за деревьев. Что-то голодное. Последние собирательницы спешат домой с корзинками, полными пыльцы, которую они, возможно, никогда не разгрузят. Внутри улей гудит тише обычного. Не гудение работы, а гудение тревоги. Опасность приближается, и каждая пчела это чувствует."
    image: "hive-in-danger.jpg"
    imageAlt:
      en: "Beehive at dusk with storm clouds, bees rushing home, dark hornet shapes in the distance, ominous atmosphere"
      es: "Colmena al anochecer con nubes de tormenta, abejas apresurandose a casa, formas oscuras de avispones a lo lejos, atmosfera ominosa"
      ru: "Улей в сумерках с грозовыми тучами, пчёлы спешат домой, тёмные силуэты шершней вдали, зловещая атмосфера"

  # The Hornet Scouts Arrive
  - id: the-hornet-scouts
    mood: [epic-skies]
    use_character: "${a-hive-in-danger.image}"
    action: "two massive giant hornets with dark brown and orange bodies, much larger than honey bees, hovering menacingly near the hive entrance, their huge mandibles visible, a single guard bee standing defiant but tiny against them, dramatic lighting, tension and danger, the hornets dwarf the bee completely, classic hand-drawn Disney animation style"
    title:
      en: "The Hornet Scouts Arrive"
      es: "Los Exploradores Avispones Llegan"
      ru: "Разведчики шершней прибывают"
    content:
      en: "They come at dawn — two giant hornets, each one five times the size of a honey bee. Their bodies are armored in dark brown and burnt orange, their mandibles thick enough to snap a bee in half with one bite. They are scouts, sent ahead to find food for their colony. One hornet can kill forty bees in a single minute. If these scouts return to their nest with the location of this hive, they will come back with reinforcements — and they will destroy everything. Spike watches them circle. He knows what is at stake. Not just honey. Not just comb. Every single life inside."
      es: "Llegan al amanecer — dos avispones gigantes, cada uno cinco veces mas grande que una abeja. Sus cuerpos estan blindados en marron oscuro y naranja quemado, sus mandibulas lo suficientemente gruesas para partir una abeja en dos de un mordisco. Son exploradores, enviados para encontrar comida para su colonia. Un avispón puede matar cuarenta abejas en un solo minuto. Si estos exploradores regresan a su nido con la ubicacion de esta colmena, volveran con refuerzos — y destruiran todo. Spike los observa circular. Sabe lo que esta en juego. No solo la miel. No solo el panal. Cada vida adentro."
      ru: "Они приходят на рассвете — два гигантских шершня, каждый в пять раз больше медоносной пчелы. Их тела покрыты бронёй из тёмно-коричневого и жжёно-оранжевого, их жвалы достаточно мощны, чтобы перекусить пчелу пополам одним укусом. Они — разведчики, посланные найти пищу для своей колонии. Один шершень может убить сорок пчёл за одну минуту. Если эти разведчики вернутся в своё гнездо с местоположением улья, они прилетят с подкреплением — и уничтожат всё. Спайк наблюдает, как они кружат. Он знает, что поставлено на карту. Не просто мёд. Не просто соты. Каждая жизнь внутри."
    image: "hornet-scouts.jpg"
    imageAlt:
      en: "Two massive giant hornets hovering menacingly near the hive entrance, dwarfing a lone guard bee, dramatic tense lighting"
      es: "Dos avispones gigantes masivos suspendidos amenazadoramente cerca de la entrada de la colmena, empequeñeciendo a una abeja guardia solitaria"
      ru: "Два огромных шершня угрожающе зависли у входа в улей, крошечная пчела-охранник перед ними, напряжённое драматичное освещение"

  # Spike's Alarm
  - id: spikes-alarm
    generate_character: true
    mood: [epic-skies, golden-hour]
    action: "a darker-colored guard bee at the hive entrance releasing visible alarm pheromone — shown as a golden misty cloud spreading from the bee, other bees inside the hive reacting with raised antennae and alert postures, chain reaction of alarm spreading through the colony, urgent dramatic atmosphere, classic hand-drawn Disney animation style"
    title:
      en: "Spike's Alarm"
      es: "La Alarma de Spike"
      ru: "Тревога Спайка"
    content:
      en: "Spike does not hesitate. He raises his abdomen and releases the alarm pheromone — a chemical scream that spreads through the hive like wildfire. The scent hits the nearest bees in seconds. Their antennae snap up. Their wings begin to vibrate. The alarm passes from bee to bee to bee, deeper and deeper into the hive. Within thirty seconds, every single bee in the colony knows: the hive is under threat. There is no committee, no debate, no vote. This is war, and the alarm is absolute. Thousands of bees begin to mobilize. Buzz drops her nectar load. Petal stops mid-flight. Even Queen Aurelia stirs from the royal chamber. The hive is waking for battle."
      es: "Spike no duda. Levanta su abdomen y libera la feromona de alarma — un grito quimico que se esparce por la colmena como un incendio. El aroma golpea a las abejas mas cercanas en segundos. Sus antenas se alzan. Sus alas comienzan a vibrar. La alarma pasa de abeja en abeja, mas y mas profundo en la colmena. En treinta segundos, cada abeja de la colonia sabe: la colmena esta bajo amenaza. No hay comite, ni debate, ni voto. Esto es guerra, y la alarma es absoluta. Miles de abejas comienzan a movilizarse. Buzz suelta su carga de nectar. Petal se detiene en pleno vuelo. Incluso la Reina Aurelia se agita en la camara real."
      ru: "Спайк не колеблется. Он поднимает брюшко и выпускает феромон тревоги — химический крик, который распространяется по улью как лесной пожар. Запах достигает ближайших пчёл за секунды. Их усики встают. Крылья начинают вибрировать. Тревога передаётся от пчелы к пчеле, всё глубже в улей. За тридцать секунд каждая пчела в колонии знает: улей под угрозой. Нет комитета, нет обсуждения, нет голосования. Это война, и тревога абсолютна. Тысячи пчёл начинают мобилизацию. Базз бросает свой груз нектара. Петал замирает в полёте. Даже Королева Аурелия пробуждается в королевской палате. Улей просыпается к битве."
    image: "spikes-alarm.jpg"
    imageAlt:
      en: "Guard bee releasing alarm pheromone as a golden mist, chain reaction of alert spreading through the colony, urgent dramatic atmosphere"
      es: "Abeja guardia liberando feromona de alarma como una niebla dorada, reaccion en cadena de alerta esparciendose por la colonia"
      ru: "Пчела-охранник выпускает феромон тревоги в виде золотистого тумана, цепная реакция тревоги распространяется по колонии"

  # The Heat Defense
  - id: the-heat-defense
    mood: [epic-skies, soft-intimate]
    use_characters: ["${spikes-alarm.image}", "${the-hornet-scouts.image}"]
    action: "a tight ball of hundreds of honey bees completely engulfing a giant hornet, the bees vibrating their flight muscles intensely, visible heat waves radiating from the bee ball, the hornet trapped inside struggling, the surrounding bees are straining with effort, some collapsing from exhaustion, dramatic lighting showing the heat, sweat and sacrifice, classic hand-drawn Disney animation style"
    title:
      en: "The Heat Defense"
      es: "La Defensa de Calor"
      ru: "Тепловая оборона"
    content:
      en: "What happens next is one of nature's most extraordinary acts of collective defense. Five hundred bees swarm the first hornet scout and form a tight, vibrating ball around it. Then they do something remarkable — they disconnect their wings from their flight muscles and vibrate those muscles as fast as they can. The temperature inside the bee ball rockets to 117 degrees Fahrenheit. The hornet can only survive up to 115. The bees can survive up to 118. That three-degree margin is the difference between life and death. The hornet cooks alive. Some bees at the center die too, crushed or overheated. They knew the risk. They did it anyway."
      es: "Lo que sucede despues es uno de los actos de defensa colectiva mas extraordinarios de la naturaleza. Quinientas abejas rodean al primer explorador y forman una bola apretada y vibrante a su alrededor. Luego hacen algo notable — desconectan sus alas de los musculos de vuelo y vibran esos musculos lo mas rapido posible. La temperatura dentro de la bola se dispara a 47 grados Celsius. El avispón solo sobrevive hasta 46. Las abejas sobreviven hasta 48. Ese margen de tres grados es la diferencia entre la vida y la muerte. El avispón se cuece vivo. Algunas abejas del centro tambien mueren, aplastadas o sobrecalentadas. Sabian el riesgo. Lo hicieron de todas formas."
      ru: "То, что происходит дальше — один из самых необычных актов коллективной обороны в природе. Пятьсот пчёл окружают первого разведчика и формируют плотный вибрирующий шар вокруг него. Затем они делают нечто поразительное — отсоединяют крылья от летательных мышц и вибрируют этими мышцами изо всех сил. Температура внутри шара взлетает до 47 градусов Цельсия. Шершень выдерживает максимум 46. Пчёлы выдерживают до 48. Этот трёхградусный зазор — разница между жизнью и смертью. Шершень варится заживо. Некоторые пчёлы в центре тоже гибнут, раздавленные или перегретые. Они знали риск. Они сделали это всё равно."
    image: "heat-defense.jpg"
    imageAlt:
      en: "Hundreds of bees forming a vibrating heat ball around a trapped giant hornet, visible heat waves, some bees collapsing from the effort"
      es: "Cientos de abejas formando una bola de calor vibrante alrededor de un avispón atrapado, ondas de calor visibles, algunas abejas colapsando por el esfuerzo"
      ru: "Сотни пчёл формируют вибрирующий тепловой шар вокруг пойманного шершня, видимые тепловые волны, некоторые пчёлы падают от усилия"

  # When Stinging Means Dying
  - id: when-stinging-means-dying
    mood: [soft-intimate, golden-hour]
    use_characters: ["${spikes-alarm.image}"]
    action: "a dramatic close-up of a honey bee that has just stung a large intruder, the barbed stinger visibly embedded in the target with the venom sac still attached, the bee pulling away with a visible wound in her abdomen where the stinger was torn out, her expression showing determination not pain, other bees watching solemnly, emotionally powerful, classic hand-drawn Disney animation style"
    title:
      en: "When Stinging Means Dying"
      es: "Cuando Picar Significa Morir"
      ru: "Когда ужалить — значит умереть"
    content:
      en: "The second hornet breaks through. Spike meets it at the entrance. He knows what he has to do, and he knows what it will cost. A honey bee's stinger has barbs — tiny hooks that catch in the skin of the enemy. When the bee pulls away, the stinger stays behind, and with it comes the venom sac, muscles, and part of the bee's own abdomen. It is a wound no bee survives. Spike drives his stinger deep into the hornet's joint. He feels the barbs catch. He pulls away and feels the tearing. It does not matter. The venom keeps pumping automatically. The alarm pheromone from his wound calls more defenders. Spike stumbles, then falls. He gave everything to protect his home."
      es: "El segundo avispón irrumpe. Spike lo enfrenta en la entrada. Sabe lo que tiene que hacer, y sabe lo que costara. El aguijon de una abeja tiene ganchos — pequenas puas que se enganchan en la piel del enemigo. Cuando la abeja se retira, el aguijon se queda, y con el viene el saco de veneno, musculos y parte del propio abdomen de la abeja. Es una herida que ninguna abeja sobrevive. Spike clava su aguijon profundamente en la articulacion del avispón. Siente los ganchos agarrar. Se retira y siente el desgarro. No importa. El veneno sigue bombeandose automaticamente. La feromona de alarma de su herida llama a mas defensores. Spike se tambalea, luego cae. Dio todo para proteger su hogar."
      ru: "Второй шершень прорывается. Спайк встречает его у входа. Он знает, что должен сделать, и знает, чего это будет стоить. Жало медоносной пчелы имеет зазубрины — крошечные крючки, которые застревают в теле врага. Когда пчела отрывается, жало остаётся, а с ним — ядовитый мешочек, мышцы и часть собственного брюшка пчелы. Это рана, от которой ни одна пчела не выживает. Спайк вонзает жало глубоко в сочленение шершня. Он чувствует, как зазубрины зацепились. Он отрывается и чувствует, как рвётся. Это неважно. Яд продолжает качаться автоматически. Феромон тревоги из его раны зовёт новых защитников. Спайк спотыкается, затем падает. Он отдал всё, чтобы защитить свой дом."
    image: "stinging-means-dying.jpg"
    imageAlt:
      en: "Dramatic close-up of a bee with barbed stinger torn from its abdomen after stinging a hornet, showing the ultimate sacrifice"
      es: "Dramatico primer plano de una abeja con aguijon arrancado de su abdomen tras picar a un avispón, mostrando el sacrificio definitivo"
      ru: "Драматичный крупный план пчелы с вырванным зазубренным жалом из брюшка после того, как ужалила шершня, высшая жертва"

  # A Worker's Short Life
  - id: a-workers-short-life
    mood: [soft-intimate, golden-hour]
    use_characters: ["${the-hornet-scouts.image}"]
    action: "a sequence showing the life stages of a single worker bee — from a plump white larva in a cell, to a young nurse bee, to a builder bee making wax, to a forager bee with worn frayed wings visiting a flower, to finally an exhausted bee with tattered wings lying on a flower petal, the progression from youth to death in six short weeks, emotionally moving, warm but bittersweet lighting, classic hand-drawn Disney animation style"
    title:
      en: "A Worker's Short Life"
      es: "La Corta Vida de una Obrera"
      ru: "Короткая жизнь работницы"
    content:
      en: "Buzz has been alive for five weeks and three days. In bee time, she is old. She hatched from an egg in a wax cell, spent her first days as a nurse feeding larvae, then became a builder secreting wax, then a guard, and finally a forager — the most dangerous job of all. Her wings, once pristine, are now frayed at the edges. She has flown over five hundred miles in her short life. Her body aches from carrying loads of nectar heavier than herself. A summer worker bee lives just six weeks. Buzz knows she has days left, not weeks. But she does not stop. She cannot. There is nectar to gather, and the hive depends on her until her very last flight."
      es: "Buzz ha estado viva por cinco semanas y tres dias. En tiempo de abeja, es vieja. Nacio de un huevo en una celda de cera, paso sus primeros dias como enfermera alimentando larvas, luego se convirtio en constructora secretando cera, luego guardia, y finalmente recolectora — el trabajo mas peligroso de todos. Sus alas, antes impecables, ahora estan deshilachadas en los bordes. Ha volado mas de ochocientos kilometros en su corta vida. Su cuerpo duele de cargar nectar mas pesado que ella misma. Una abeja obrera de verano vive solo seis semanas. Buzz sabe que le quedan dias, no semanas. Pero no se detiene. No puede. Hay nectar que recolectar, y la colmena depende de ella hasta su ultimo vuelo."
      ru: "Базз жива уже пять недель и три дня. По пчелиным меркам она стара. Она вылупилась из яйца в восковой ячейке, первые дни провела нянькой, кормя личинок, потом стала строителем, выделяя воск, потом охранником, и наконец собирательницей — самая опасная работа из всех. Её крылья, некогда безупречные, теперь истрёпаны по краям. Она пролетела более восьмисот километров за свою короткую жизнь. Её тело болит от груза нектара тяжелее её самой. Летняя рабочая пчела живёт всего шесть недель. Базз знает, что ей остались дни, не недели. Но она не останавливается. Не может. Нужно собирать нектар, и улей зависит от неё до самого последнего полёта."
    image: "workers-short-life.jpg"
    imageAlt:
      en: "Progression of a worker bee's life from larva to worn-out forager with frayed wings, the bittersweet passage of six short weeks"
      es: "Progresion de la vida de una obrera desde larva hasta recolectora desgastada con alas deshilachadas, el agridulce paso de seis cortas semanas"
      ru: "Жизненный путь рабочей пчелы от личинки до изношенной собирательницы с истрёпанными крыльями, горько-сладкое течение шести коротких недель"

  # The Queen's Dark Secret
  - id: the-queens-dark-secret
    generate_character: true
    mood: [soft-intimate]
    action: "inside a dark royal chamber of a beehive, a newly emerged queen bee with an elongated golden abdomen approaching several sealed queen cells, one cell already torn open and empty, the queen's expression cold and determined, dramatic shadows, the sealed cells containing rival queens who will never emerge, dark and regal atmosphere, classic hand-drawn Disney animation style"
    title:
      en: "The Queen's Dark Secret"
      es: "El Oscuro Secreto de la Reina"
      ru: "Тёмная тайна Королевы"
    content:
      en: "Queen Aurelia does not speak of how she became queen. When the old queen left with a swarm, the hive raised several new queens. Aurelia was the first to emerge from her royal cell. And she knew, with an instinct older than thought, exactly what she had to do. She moved through the darkness of the hive to the other queen cells — her sisters, still developing inside. One by one, she stung through the wax and killed them before they could emerge. It was not cruelty. It was the law of the hive. Two queens cannot coexist. The colony needs one voice, one mother, one center. Aurelia earned her crown not by election, but by elimination. Every queen in every hive carries this same secret."
      es: "La Reina Aurelia no habla de como se convirtio en reina. Cuando la vieja reina se fue con un enjambre, la colmena crio varias reinas nuevas. Aurelia fue la primera en emerger de su celda real. Y supo, con un instinto mas antiguo que el pensamiento, exactamente lo que tenia que hacer. Se movio a traves de la oscuridad de la colmena hacia las otras celdas reales — sus hermanas, aun desarrollandose adentro. Una por una, pico a traves de la cera y las mato antes de que pudieran emerger. No fue crueldad. Fue la ley de la colmena. Dos reinas no pueden coexistir. La colonia necesita una voz, una madre, un centro. Aurelia gano su corona no por eleccion, sino por eliminacion."
      ru: "Королева Аурелия не рассказывает о том, как стала королевой. Когда старая королева улетела с роем, улей вырастил несколько новых королев. Аурелия первой вышла из своей маточной ячейки. И она знала, инстинктом древнее мысли, что именно должна сделать. Она двигалась сквозь темноту улья к другим маточным ячейкам — к своим сёстрам, всё ещё развивающимся внутри. Одну за другой она жалила сквозь воск и убивала их прежде, чем они успевали появиться. Это не было жестокостью. Это был закон улья. Две королевы не могут сосуществовать. Колонии нужен один голос, одна мать, один центр. Аурелия заслужила корону не выборами, а уничтожением. Каждая королева в каждом улье несёт этот же секрет."
    image: "queens-dark-secret.jpg"
    imageAlt:
      en: "Queen bee approaching sealed rival queen cells in a dark royal chamber, one cell already torn open, cold determined expression"
      es: "Abeja reina acercandose a celdas reales selladas de rivales en una oscura camara real, una celda ya abierta, expresion fria y decidida"
      ru: "Королева пчёл приближается к запечатанным маточным ячейкам соперниц в тёмной королевской палате, одна ячейка уже вскрыта, холодное решительное выражение"

  # Democracy in Action
  - id: democracy-in-action
    mood: [epic-skies, golden-hour]
    use_characters: ["${the-queens-dark-secret.image}", "${spikes-alarm.image}"]
    action: "a dramatic scene of bee democracy — a massive swarm of bees hanging from a tree branch in a living cluster, individual scout bees performing waggle dances on the surface of the swarm pointing in different directions, some bees following one scout while others follow a different scout, a visual representation of voting and debate, golden afternoon light, the swarm is democracy made visible, classic hand-drawn Disney animation style"
    title:
      en: "Democracy in Action"
      es: "Democracia en Accion"
      ru: "Демократия в действии"
    content:
      en: "When the hive becomes too crowded, something extraordinary happens. The old queen leaves with half the colony in a great swarm — a living cloud of fifty thousand bees hanging from a tree branch. They need a new home. But the queen does not choose it. The BEES do. Scout bees fly out in every direction, searching for hollow trees, sheltered spots, dry cavities. Each scout returns and performs a waggle dance describing her candidate site. Other bees investigate, and if they agree, they dance for the same site. Slowly, consensus builds. It is a debate, an argument, a vote — all conducted in dance. When eighty percent of scouts dance for the same location, the swarm lifts off together. The queen follows. Even in a monarchy, the real power belongs to the many."
      es: "Cuando la colmena se llena demasiado, algo extraordinario sucede. La vieja reina se va con la mitad de la colonia en un gran enjambre — una nube viviente de cincuenta mil abejas colgando de una rama. Necesitan un nuevo hogar. Pero la reina no lo elige. Las ABEJAS lo hacen. Abejas exploradoras vuelan en todas direcciones, buscando arboles huecos, lugares resguardados, cavidades secas. Cada exploradora regresa y realiza una danza describiendo su lugar candidato. Otras abejas investigan, y si estan de acuerdo, bailan por el mismo sitio. Lentamente, se construye el consenso. Es un debate, una discusion, un voto — todo conducido en danza. Cuando el ochenta por ciento baila por el mismo lugar, el enjambre despega junto. La reina sigue. Incluso en una monarquia, el verdadero poder pertenece a la mayoria."
      ru: "Когда улей становится слишком тесным, происходит нечто необычайное. Старая королева улетает с половиной колонии в великом рое — живое облако из пятидесяти тысяч пчёл, свисающее с ветки дерева. Им нужен новый дом. Но королева не выбирает его. Это делают ПЧЁЛЫ. Пчёлы-разведчицы летят во все стороны, ища дупла деревьев, защищённые места, сухие полости. Каждая разведчица возвращается и исполняет виляющий танец, описывающий найденное место. Другие пчёлы проверяют, и если согласны, танцуют за то же место. Постепенно формируется консенсус. Это дебаты, спор, голосование — всё на языке танца. Когда восемьдесят процентов разведчиц танцуют за одно место, рой поднимается вместе. Королева следует за ними. Даже в монархии настоящая власть принадлежит многим."
    image: "democracy-in-action.jpg"
    imageAlt:
      en: "Massive swarm of bees on a branch with scouts performing competing waggle dances, a living democratic vote in golden light"
      es: "Enjambre masivo de abejas en una rama con exploradoras realizando danzas competitivas, un voto democratico viviente en luz dorada"
      ru: "Огромный рой пчёл на ветке, разведчицы исполняют конкурирующие танцы, живое демократическое голосование в золотистом свете"

  # The Unprepared Hive
  - id: the-unprepared-hive
    mood: [epic-skies]
    action: "a devastated beehive torn open by a predator or hornets, broken honeycomb scattered, dead bees on the ground, honey dripping wasted onto the earth, a few surviving bees hovering in confusion above the ruins, a stark contrast to a thriving hive — this one was weak, queenless, or unprepared, muted cold lighting, somber and sobering scene, classic hand-drawn Disney animation style"
    title:
      en: "The Unprepared Hive"
      es: "La Colmena Desprevenida"
      ru: "Неготовый улей"
    content:
      en: "Not every hive survives. Across the meadow, there was another colony. Their queen had died in autumn, and they failed to raise a new one in time. Without a queen, no new bees were born. The population dwindled. The guard force thinned. When the hornets came, there were not enough bees to form a heat ball. Not enough guards to mount a defense. The hornets broke through and destroyed the colony in hours — ripping open the comb, eating the larvae, stealing the honey. A few survivors hover above the ruins. Nature does not guarantee survival. It only gives you the tools. Unity, preparation, and sacrifice — without all three, even the sweetest hive will fall."
      es: "No toda colmena sobrevive. Al otro lado del prado, habia otra colonia. Su reina habia muerto en otono, y no lograron criar una nueva a tiempo. Sin reina, no nacieron nuevas abejas. La poblacion disminuyo. La fuerza de guardia se debilito. Cuando llegaron los avispones, no habia suficientes abejas para formar una bola de calor. No suficientes guardias para montar una defensa. Los avispones irrumpieron y destruyeron la colonia en horas — abriendo el panal, comiendo las larvas, robando la miel. Unos pocos sobrevivientes flotan sobre las ruinas. La naturaleza no garantiza la supervivencia. Solo te da las herramientas. Unidad, preparacion y sacrificio — sin los tres, incluso la colmena mas dulce caera."
      ru: "Не каждый улей выживает. На другом конце луга была другая колония. Их королева умерла осенью, и они не успели вырастить новую. Без королевы новые пчёлы не рождались. Население сокращалось. Охрана редела. Когда пришли шершни, пчёл не хватило, чтобы сформировать тепловой шар. Не хватило охранников для обороны. Шершни прорвались и уничтожили колонию за часы — разорвали соты, съели личинок, украли мёд. Несколько выживших кружат над руинами. Природа не гарантирует выживание. Она лишь даёт инструменты. Единство, подготовка и жертвенность — без всех трёх даже самый сладкий улей падёт."
    image: "unprepared-hive.jpg"
    imageAlt:
      en: "Devastated beehive torn apart, broken honeycomb and dead bees, honey dripping to waste, a few survivors above the ruins, cold somber light"
      es: "Colmena devastada destrozada, panal roto y abejas muertas, miel goteando desperdiciada, unos pocos sobrevivientes sobre las ruinas, luz fria y sombria"
      ru: "Разрушенный улей, сломанные соты и погибшие пчёлы, мёд стекает впустую, несколько выживших над руинами, холодный мрачный свет"

  # The Cost of Sweetness
  - id: the-cost-of-sweetness
    mood: [golden-hour, soft-intimate]
    use_characters: ["${the-queens-dark-secret.image}", "${spikes-alarm.image}"]
    action: "a single jar of golden honey sitting on a windowsill in warm morning light, but around the jar like ghostly memories are the images of all the bees who gave their lives to make it — worn-out workers, fallen guards, the heat-ball defenders — their translucent forms fading into golden light, bittersweet and beautiful, honoring the sacrifice behind the sweetness, classic hand-drawn Disney animation style"
    title:
      en: "The Cost of Sweetness"
      es: "El Costo de la Dulzura"
      ru: "Цена сладости"
    content:
      en: "A single jar of honey. It sits in warm morning light, golden and glowing, and it looks simple. But it is not. That jar contains the flight miles of a thousand bees who will never fly again. It contains the sacrifice of guards who gave their lives at the entrance. It contains the labor of builders who secreted wax until their glands were spent. It contains six weeks of a worker's entire existence — every sunrise, every flower, every mile — distilled into sweetness. The next time you hold a jar of honey, hold it gently. It is not just food. It is the sum of thousands of small lives, lived fully, spent completely, given freely. Sweetness always has a price."
      es: "Un solo frasco de miel. Esta en la luz calida de la manana, dorada y brillante, y parece simple. Pero no lo es. Ese frasco contiene los kilometros de vuelo de mil abejas que nunca volaran de nuevo. Contiene el sacrificio de guardias que dieron sus vidas en la entrada. Contiene el trabajo de constructoras que secretaron cera hasta agotar sus glandulas. Contiene seis semanas de la existencia completa de una obrera — cada amanecer, cada flor, cada kilometro — destilado en dulzura. La proxima vez que sostengas un frasco de miel, sostenlo con cuidado. No es solo alimento. Es la suma de miles de pequenas vidas, vividas plenamente, gastadas completamente, dadas libremente. La dulzura siempre tiene un precio."
      ru: "Одна банка мёда. Она стоит в тёплом утреннем свете, золотистая и сияющая, и выглядит просто. Но это не так. Эта банка содержит километры полёта тысячи пчёл, которые больше никогда не полетят. Содержит жертву охранников, отдавших жизнь у входа. Содержит труд строителей, выделявших воск, пока их железы не иссякли. Содержит шесть недель всей жизни работницы — каждый рассвет, каждый цветок, каждый километр — переплавленных в сладость. Когда в следующий раз возьмёте банку мёда, держите бережно. Это не просто еда. Это сумма тысяч маленьких жизней, прожитых сполна, отданных без остатка, подаренных свободно. У сладости всегда есть цена."
    image: "cost-of-sweetness.jpg"
    imageAlt:
      en: "Jar of golden honey on a windowsill surrounded by translucent ghostly images of bees who gave their lives, bittersweet and beautiful"
      es: "Frasco de miel dorada en un alfeizar rodeado de imagenes translucidas fantasmales de abejas que dieron sus vidas, agridulce y hermoso"
      ru: "Банка золотистого мёда на подоконнике, окружённая полупрозрачными образами пчёл, отдавших свои жизни, горько-сладкое и прекрасное"

  # Nature's Bittersweet Balance
  - id: natures-bittersweet-balance
    mood: [epic-skies, golden-hour, lush-botanical]
    use_characters: ["${the-queens-dark-secret.image}", "${spikes-alarm.image}"]
    action: "a powerful final image — the beehive in the old oak tree at golden sunrise after the battle, some bees mourning fallen defenders outside the entrance, new young bees emerging from cells inside, Petal now an experienced forager heading out to the flowers, life continuing despite loss, golden light and morning dew, the cycle of sacrifice and renewal, hopeful yet honest, classic hand-drawn Disney animation style"
    title:
      en: "Nature's Bittersweet Balance"
      es: "El Agridulce Equilibrio de la Naturaleza"
      ru: "Горько-сладкое равновесие природы"
    content:
      en: "Morning comes. The hive survived. But the entrance tells the story — fallen defenders lie where they gave their last sting. Inside, new eggs glisten in their cells, laid by Queen Aurelia through the night. New workers will hatch in twenty-one days. Petal, who was once the nervous young bee on her first flight, is now a seasoned forager. She has one week left, maybe two. She does not waste a moment. She launches into the dawn and heads for the flowers. Behind her, a brand-new bee peers out of the hive entrance for the very first time, wide-eyed at the enormous world. The hive endures. That is the lesson. Not that life is easy, or fair, or long. But that together, with sacrifice and purpose, sweetness can be made from sunlight, and a colony can outlive any single bee within it. That is the price of honey. And it is worth paying."
      es: "Llega la manana. La colmena sobrevivio. Pero la entrada cuenta la historia — defensores caidos yacen donde dieron su ultimo aguijonazo. Adentro, nuevos huevos brillan en sus celdas, puestos por la Reina Aurelia durante la noche. Nuevas obreras naceran en veintiun dias. Petal, quien alguna vez fue la joven nerviosa en su primer vuelo, ahora es una recolectora experimentada. Le queda una semana, quiza dos. No desperdicia un momento. Se lanza al amanecer hacia las flores. Detras de ella, una abeja nueva se asoma por la entrada de la colmena por primera vez, con ojos enormes ante el mundo. La colmena perdura. Esa es la leccion. No que la vida sea facil, o justa, o larga. Sino que juntas, con sacrificio y proposito, la dulzura puede hacerse de la luz del sol, y una colonia puede sobrevivir a cualquier abeja dentro de ella. Ese es el precio de la miel. Y vale la pena pagarlo."
      ru: "Наступает утро. Улей выстоял. Но вход рассказывает историю — павшие защитники лежат там, где нанесли свой последний укус. Внутри в ячейках блестят новые яйца, отложенные Королевой Аурелией за ночь. Новые работницы вылупятся через двадцать один день. Петал, которая когда-то была нервной молодой пчёлкой в первом полёте, теперь опытная собирательница. У неё осталась неделя, может две. Она не теряет ни мгновения. Она бросается в рассвет к цветам. За ней совсем новая пчёлка выглядывает из входа улья впервые, широко раскрыв глаза на огромный мир. Улей стоит. Вот в чём урок. Не в том, что жизнь легка, или справедлива, или долга. А в том, что вместе, с жертвой и целью, из солнечного света можно сделать сладость, и колония может пережить любую пчелу внутри неё. Это цена мёда. И она стоит того."
    image: "bittersweet-balance.jpg"
    imageAlt:
      en: "Beehive at golden sunrise after battle, fallen defenders at entrance, new bees emerging inside, experienced forager heading to flowers, life continuing"
      es: "Colmena al amanecer dorado despues de la batalla, defensores caidos en la entrada, nuevas abejas emergiendo adentro, recolectora experimentada dirigiendose a las flores"
      ru: "Улей на золотистом рассвете после битвы, павшие защитники у входа, новые пчёлы рождаются внутри, опытная собирательница летит к цветам, жизнь продолжается"

