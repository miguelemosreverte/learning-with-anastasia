funFacts:
  title:
    en: "Amazing Bee Facts!"
    es: "!Datos Asombrosos sobre Abejas!"
    ru: "Удивительные факты о пчёлах!"
  facts:
    - title:
        en: "Two Million Flowers!"
        es: "!Dos Millones de Flores!"
        ru: "Два миллиона цветов!"
      content:
        en: "To make just one pound of honey, bees must visit about two million flowers and fly over 55,000 miles — that is more than twice around the entire Earth! A single worker bee makes only about one-twelfth of a teaspoon of honey in her entire lifetime. That means the jar of honey in your kitchen is the life's work of hundreds of bees. Every drop is precious!"
        es: "Para hacer solo medio kilo de miel, las abejas deben visitar unos dos millones de flores y volar mas de 88,000 kilometros — !eso es mas de dos vueltas a toda la Tierra! Una sola abeja obrera hace solo alrededor de un doceavo de cucharadita de miel en toda su vida. Eso significa que el frasco de miel en tu cocina es el trabajo de toda la vida de cientos de abejas. !Cada gota es preciosa!"
        ru: "Чтобы сделать всего полкилограмма мёда, пчёлы должны посетить около двух миллионов цветов и пролететь более 88 000 километров — это больше, чем дважды обогнуть всю Землю! Одна рабочая пчела за всю свою жизнь делает лишь около одной двенадцатой чайной ложки мёда. Это значит, что банка мёда на вашей кухне — это труд всей жизни сотен пчёл. Каждая капля драгоценна!"
      image: "fun-fact-two-million.jpg"

    - title:
        en: "The Waggle Dance Language"
        es: "El Lenguaje de la Danza del Meneo"
        ru: "Язык виляющего танца"
      content:
        en: "Bees have their own language — and it is a DANCE! When a forager bee finds flowers, she returns to the hive and performs a special waggle dance. The angle of her dance tells other bees the direction relative to the sun. The duration of her waggle tells them the distance. Bees can communicate the location of flowers up to 6 miles away, all through dancing! Karl von Frisch won the Nobel Prize for figuring this out."
        es: "Las abejas tienen su propio lenguaje — !y es un BAILE! Cuando una abeja recolectora encuentra flores, regresa a la colmena y realiza una danza especial del meneo. El angulo de su baile les dice a las demas abejas la direccion relativa al sol. La duracion de su meneo les dice la distancia. !Las abejas pueden comunicar la ubicacion de flores hasta a 10 kilometros de distancia, todo a traves del baile! Karl von Frisch gano el Premio Nobel por descubrir esto."
        ru: "У пчёл есть свой язык — и это ТАНЕЦ! Когда пчела-собирательница находит цветы, она возвращается в улей и исполняет особый виляющий танец. Угол её танца сообщает другим пчёлам направление относительно солнца. Продолжительность виляния — расстояние. Пчёлы могут сообщить местоположение цветов на расстоянии до 10 километров, и всё это через танец! Карл фон Фриш получил Нобелевскую премию за это открытие."
      image: "fun-fact-waggle-dance.jpg"

    - title:
        en: "Hexagons: Nature's Perfect Shape"
        es: "Hexagonos: La Forma Perfecta de la Naturaleza"
        ru: "Шестиугольники: идеальная форма природы"
      content:
        en: "Bees build their honeycomb using hexagons because they are the most efficient shape in nature! Hexagons fit together perfectly with no gaps and no wasted space. They also use the least amount of wax while holding the most honey. Scientists and engineers copy this design for airplane wings, satellite panels, and building structures. Bees figured out the best engineering solution millions of years before humans did!"
        es: "!Las abejas construyen su panal usando hexagonos porque son la forma mas eficiente de la naturaleza! Los hexagonos encajan perfectamente sin espacios ni desperdicio. Tambien usan la menor cantidad de cera mientras sostienen la mayor cantidad de miel. Cientificos e ingenieros copian este diseno para alas de aviones, paneles satelitales y estructuras de edificios. !Las abejas descubrieron la mejor solucion de ingenieria millones de anos antes que los humanos!"
        ru: "Пчёлы строят соты из шестиугольников, потому что это самая эффективная форма в природе! Шестиугольники идеально соединяются без зазоров и пустого пространства. Они также используют наименьшее количество воска, вмещая наибольшее количество мёда. Учёные и инженеры копируют этот дизайн для крыльев самолётов, спутниковых панелей и строительных конструкций. Пчёлы нашли лучшее инженерное решение за миллионы лет до людей!"
      image: "fun-fact-hexagons.jpg"

    - title:
        en: "Seeing Ultraviolet!"
        es: "!Viendo Ultravioleta!"
        ru: "Видят ультрафиолет!"
      content:
        en: "Bees can see colors that are completely invisible to humans! They see ultraviolet light, which means flowers look totally different to bees than they do to us. Many flowers have secret ultraviolet patterns — like bullseyes and landing strips — that guide bees straight to the nectar. A plain yellow flower to us looks like an airport runway to a bee! Bees cannot see the color red, but their ultraviolet vision more than makes up for it."
        es: "!Las abejas pueden ver colores que son completamente invisibles para los humanos! Ven la luz ultravioleta, lo que significa que las flores se ven totalmente diferentes para las abejas que para nosotros. Muchas flores tienen patrones ultravioleta secretos — como dianas y pistas de aterrizaje — que guian a las abejas directamente al nectar. !Una flor amarilla simple para nosotros parece una pista de aeropuerto para una abeja! Las abejas no pueden ver el color rojo, pero su vision ultravioleta compensa con creces."
        ru: "Пчёлы видят цвета, совершенно невидимые для людей! Они видят ультрафиолетовый свет, а значит, цветы выглядят для пчёл совсем иначе, чем для нас. У многих цветов есть секретные ультрафиолетовые узоры — мишени и посадочные полосы — которые направляют пчёл прямо к нектару. Простой жёлтый цветок для нас выглядит как взлётная полоса для пчелы! Пчёлы не видят красный цвет, но их ультрафиолетовое зрение с лихвой это компенсирует."
      image: "fun-fact-ultraviolet.jpg"

imageGeneration:
  characters:
    queen-aurelia:
      name: "Queen Aurelia"
      description: "Majestic honey bee queen, the largest bee in the hive, with an elongated golden abdomen, regal bearing, golden crown-like pattern on her thorax"
      uniqueFeatures:
        - "LARGEST bee character — noticeably bigger than all workers, elongated body"
        - "ELONGATED GOLDEN ABDOMEN — much longer than worker bees, tapered and elegant"
        - "GOLDEN CROWN-LIKE PATTERN on thorax — distinctive marking that looks like a tiny crown"
        - "Moves SLOWLY and DELIBERATELY — never rushed, always regal"
        - "Warmer, deeper gold coloring than standard yellow-black workers"
        - "Workers always clustered around her, attending and feeding"
      personality: "Regal and cold — carries the weight of her crown and the secret of how she earned it"
      notLike: "NOT small like workers, NOT black-and-yellow striped like Buzz, NOT fluffy like Petal"

    buzz:
      name: "Buzz"
      description: "Hardworking worker bee with bright yellow-and-black stripes, fuzzy body always covered in pollen, one wing with a tiny notch, shows increasing wear as story progresses"
      uniqueFeatures:
        - "Standard worker size — much smaller than Queen Aurelia"
        - "BRIGHT YELLOW-AND-BLACK stripes — classic bee coloring, vivid and cheerful"
        - "TINY NOTCH in one wing — distinctive identifying mark, but flies perfectly"
        - "FUZZY body always DUSTED WITH POLLEN — looks like she rolled in gold dust"
        - "Wings become visibly FRAYED and WORN as story progresses — showing her short lifespan"
        - "Expression shifts from cheerful to determined to weary but unwavering"
      personality: "Hardworking and uncomplaining — works until her body gives out, never questions her duty"
      notLike: "NOT large like Queen Aurelia, NOT extra fluffy like Petal, NOT dark like Spike"

    petal:
      name: "Petal"
      description: "Young bee on her first foraging flights, slightly smaller than other workers, lighter coloring, extra fluffy fuzz, wide-eyed wonder that matures into quiet resolve"
      uniqueFeatures:
        - "SLIGHTLY SMALLER than other worker bees — young and delicate"
        - "LIGHTER COLORING — paler yellow, less intense stripes than Buzz"
        - "EXTRA FLUFFY — has not worn down her fuzz yet, looks like a tiny pompom"
        - "WIDE EYES — bigger, rounder eyes than other bees, full of wonder"
        - "Lighter, more translucent wings — newer and more delicate"
        - "Transforms from nervous newcomer to determined veteran across the story"
      personality: "Starts nervous and wide-eyed, ends resolute — the witness who sees both beauty and cost"
      notLike: "NOT as boldly striped as Buzz, NOT large like Queen Aurelia, NOT dark like Spike"

    spike:
      name: "Spike"
      description: "Guard bee, slightly larger worker with darker coloring, stationed at the hive entrance, mandibles always ready, willing to make the ultimate sacrifice"
      uniqueFeatures:
        - "SLIGHTLY LARGER than standard workers — bulkier, more muscular build"
        - "DARKER COLORING — deeper brown-black with darker yellow, more muted stripes"
        - "Always STANDING ALERT with MANDIBLES READY — jaws slightly open"
        - "Stockier build — wider thorax and legs than other workers"
        - "Positioned at hive entrance — always on guard duty"
        - "Intense, watchful eyes scanning everything — the face of sacrifice"
      personality: "Protective and selfless — knows his sting will kill him, stands ready anyway"
      notLike: "NOT cheerful and bouncy like Buzz, NOT fluffy like Petal, NOT regal like Queen Aurelia"

  style:
    global: "Classic hand-drawn Disney animation style inspired by the Golden Age (Snow White, Bambi). Warm organic flowing lines with natural variation in line weight. Large soulful expressive eyes. Painterly brushstrokes visible in fur, wings, and flowers. Soft rounded character proportions. Vintage animation cel warmth with dramatic lighting for tense scenes. Mixed setting — sunny wildflower meadow for peaceful scenes, dramatic shadows and storm light for conflict scenes. Warm honey tones contrasted with cold danger tones. Emotionally honest and visually powerful."

viewerDetails:
- title:
    en: "Wings That Never Stop"
    es: "Alas Que Nunca Paran"
    ru: "Крылья, которые не останавливаются"
  description:
    en: "Look at Buzz's tiny wings — they beat an incredible 200 times per second! That is so fast they become a blur and create the buzzing sound we all know. Each bee has two pairs of wings that hook together with tiny clasps called hamuli, turning four wings into two bigger ones for powerful flight. Bees can fly at about 15 miles per hour and visit up to 5,000 flowers in a single day!"
    es: "!Mira las pequenas alas de Buzz — laten una increible cantidad de 200 veces por segundo! Eso es tan rapido que se vuelven borrosas y crean el zumbido que todos conocemos. Cada abeja tiene dos pares de alas que se enganchan con pequenos ganchos llamados hamuli, convirtiendo cuatro alas en dos mas grandes para un vuelo poderoso. !Las abejas pueden volar a unos 24 kilometros por hora y visitar hasta 5,000 flores en un solo dia!"
    ru: "Посмотрите на крошечные крылья Базз — они бьют невероятные 200 раз в секунду! Это настолько быстро, что они становятся размытыми и создают жужжание, которое мы все знаем. У каждой пчелы две пары крыльев, которые соединяются крошечными крючками — гамулями, превращая четыре крыла в два больших для мощного полёта. Пчёлы летают со скоростью около 24 километров в час и могут посетить до 5 000 цветов за один день!"
  image: "detail-wing-closeup.jpg"

- title:
    en: "A Thousand Tiny Eyes"
    es: "Mil Ojos Diminutos"
    ru: "Тысяча крошечных глаз"
  description:
    en: "A bee's compound eye is made up of about 6,900 tiny hexagonal lenses called ommatidia — each one is like a mini eye! Together, they create a mosaic-like image of the world. Bees can see ultraviolet light that is invisible to humans, which reveals secret patterns on flowers. They can also detect polarized light, which helps them navigate using the sun even on cloudy days. The compound eye looks like a tiny honeycomb itself!"
    es: "El ojo compuesto de una abeja esta formado por unas 6,900 pequenas lentes hexagonales llamadas omatidios — !cada uno es como un mini ojo! Juntos, crean una imagen tipo mosaico del mundo. Las abejas pueden ver luz ultravioleta que es invisible para los humanos, lo que revela patrones secretos en las flores. Tambien pueden detectar luz polarizada, lo que les ayuda a navegar usando el sol incluso en dias nublados."
    ru: "Сложный глаз пчелы состоит примерно из 6 900 крошечных шестиугольных линз, называемых омматидиями — каждая как мини-глаз! Вместе они создают мозаичное изображение мира. Пчёлы видят ультрафиолетовый свет, невидимый для людей, который раскрывает тайные узоры на цветах. Они также могут обнаруживать поляризованный свет, что помогает ориентироваться по солнцу даже в пасмурные дни. Сложный глаз сам похож на крошечные соты!"
  image: "detail-compound-eye.jpg"

- title:
    en: "Pollen Shopping Baskets"
    es: "Cestas de Compras de Polen"
    ru: "Корзинки для пыльцы"
  description:
    en: "On each of Buzz's back legs, there is a special structure called a corbicula, or pollen basket. It is a smooth, slightly concave area surrounded by stiff curved hairs. As the bee visits flowers, she combs pollen from her fuzzy body and packs it into these baskets using a little bit of nectar as glue. The bright orange or yellow pollen balls on a bee's legs can contain pollen from hundreds of different flowers — like a grocery bag full of flower food!"
    es: "En cada una de las patas traseras de Buzz, hay una estructura especial llamada corbicula, o cesta de polen. Es un area lisa, ligeramente concava, rodeada de pelos curvos y rigidos. Mientras la abeja visita flores, peina el polen de su cuerpo peludo y lo empaca en estas cestas usando un poco de nectar como pegamento. !Las bolas de polen naranja o amarillo brillante en las patas de una abeja pueden contener polen de cientos de flores diferentes!"
    ru: "На каждой задней ножке Базз есть особая структура — корбикула, или пыльцевая корзинка. Это гладкая, слегка вогнутая область, окружённая жёсткими изогнутыми волосками. Когда пчела посещает цветы, она счёсывает пыльцу со своего пушистого тела и упаковывает её в эти корзинки, используя немного нектара как клей. Яркие оранжевые или жёлтые шарики пыльцы на ножках пчелы могут содержать пыльцу сотен разных цветов!"
  image: "detail-pollen-basket.jpg"

- title:
    en: "The Perfect Hexagon"
    es: "El Hexagono Perfecto"
    ru: "Идеальный шестиугольник"
  description:
    en: "Each honeycomb cell is a masterpiece of engineering! The hexagonal shape is mathematically the most efficient way to divide a surface into equal units with the least total perimeter. This means bees use the minimum amount of wax to create the maximum storage space. Each cell is tilted slightly upward at a 13-degree angle to prevent honey from dripping out. The walls are only 0.05 millimeters thick — thinner than a sheet of paper — yet strong enough to hold 25 times their own weight in honey!"
    es: "!Cada celda del panal es una obra maestra de ingenieria! La forma hexagonal es matematicamente la manera mas eficiente de dividir una superficie en unidades iguales con el menor perimetro total. Esto significa que las abejas usan la cantidad minima de cera para crear el maximo espacio de almacenamiento. Cada celda esta inclinada ligeramente hacia arriba en un angulo de 13 grados para evitar que la miel gotee. !Las paredes tienen solo 0.05 milimetros de grosor pero pueden sostener 25 veces su propio peso en miel!"
    ru: "Каждая ячейка сот — шедевр инженерии! Шестиугольная форма математически является самым эффективным способом разделить поверхность на равные части с наименьшим общим периметром. Это значит, что пчёлы используют минимум воска для создания максимального пространства хранения. Каждая ячейка слегка наклонена вверх под углом 13 градусов, чтобы мёд не вытекал. Стенки толщиной всего 0,05 миллиметра — тоньше листа бумаги — но достаточно прочные, чтобы выдержать вес мёда в 25 раз больше собственного!"
  image: "detail-honeycomb-hexagon.jpg"

