viewerDetails:
- title:
    en: "Super Sticky Toes"
    es: "Dedos Súper Pegajosos"
    ru: "Суперлипкие пальчики"
  description:
    en: "Look at Luna's orange toes — see those round discs at the tips? Those are sticky toe pads! Each pad works like a tiny suction cup, creating wet adhesion that lets tree frogs climb smooth leaves, wet bark, and even glass. The pads produce a thin layer of mucus that fills every tiny bump on a surface, creating an incredibly strong grip. That's how Luna can sleep upside down!"
    es: "¡Mira los dedos naranjas de Luna — ves esos discos redondos en las puntas? ¡Esas son almohadillas pegajosas! Cada almohadilla funciona como una pequeña ventosa, creando adhesión húmeda que permite a las ranas arbóreas trepar hojas lisas, corteza mojada e incluso vidrio. Las almohadillas producen una fina capa de mucosa que llena cada pequeño bulto en una superficie."
    ru: "Посмотрите на оранжевые пальчики Луны — видите круглые диски на кончиках? Это липкие подушечки! Каждая работает как крошечная присоска, создавая влажную адгезию, которая позволяет древесным лягушкам карабкаться по гладким листьям, мокрой коре и даже стеклу. Подушечки выделяют тонкий слой слизи, заполняющий каждую неровность поверхности."
  image: "detail-sticky-toes.jpg"

- title:
    en: "Living Jewel Skin"
    es: "Piel de Joya Viviente"
    ru: "Кожа-драгоценность"
  description:
    en: "Papa Verde's brilliant green skin isn't just beautiful — it's alive with special abilities! The green color comes from a combination of blue and yellow pigments layered in the skin. During the day, red-eyed tree frogs close their eyes and tuck in their legs, showing only green — perfect camouflage among the leaves. Their blue-and-yellow striped sides are hidden until they jump!"
    es: "¡La brillante piel verde de Papá Verde no es solo hermosa — está viva con habilidades especiales! El color verde proviene de una combinación de pigmentos azules y amarillos en capas de la piel. Durante el día, las ranas de ojos rojos cierran los ojos y recogen las patas, mostrando solo verde — perfecto camuflaje entre las hojas."
    ru: "Блестящая зелёная кожа Папы Верде не просто красива — она обладает особыми способностями! Зелёный цвет образуется из комбинации синих и жёлтых пигментов, расположенных слоями в коже. Днём красноглазые древесные лягушки закрывают глаза и поджимают лапки, показывая только зелёное — идеальный камуфляж среди листьев."
  image: "detail-skin-texture.jpg"

- title:
    en: "Ruby Red Eyes"
    es: "Ojos Rojo Rubí"
    ru: "Рубиновые глаза"
  description:
    en: "Luna's stunning red eyes serve an important purpose — they're a defense mechanism called 'startle coloration.' When a sleeping frog opens its eyes suddenly, the flash of bright red confuses predators, giving the frog time to escape. The vertical slit pupil can open wide in darkness for excellent night vision, since these frogs are nocturnal — they're most active at night!"
    es: "¡Los impresionantes ojos rojos de Luna tienen un propósito importante — son un mecanismo de defensa llamado 'coloración de sobresalto'! Cuando una rana dormida abre los ojos de repente, el destello de rojo brillante confunde a los depredadores, dando tiempo a la rana para escapar. La pupila vertical puede abrirse en la oscuridad para una excelente visión nocturna."
    ru: "Потрясающие красные глаза Луны служат важной цели — это защитный механизм, называемый 'окраска вспугивания.' Когда спящая лягушка внезапно открывает глаза, вспышка ярко-красного сбивает с толку хищников, давая лягушке время убежать. Вертикальный зрачок может широко раскрываться в темноте для отличного ночного зрения."
  image: "detail-eye-closeup.jpg"

- title:
    en: "Lightning Tongue"
    es: "Lengua Relámpago"
    ru: "Молниеносный язык"
  description:
    en: "A frog's tongue is one of the fastest muscles in the animal kingdom! It can extend and retract in just 0.07 seconds — faster than you can blink! The tongue is attached at the front of the mouth (not the back like ours), so it can flip out extra far. The tip is covered in super-sticky mucus that's 50 times stickier than anything humans have made. Once a bug lands on that tongue, there's no escape!"
    es: "¡La lengua de una rana es uno de los músculos más rápidos del reino animal! Puede extenderse y retractarse en solo 0.07 segundos — ¡más rápido de lo que puedes parpadear! La lengua está pegada en la parte delantera de la boca (no atrás como la nuestra), así que puede salir extra lejos. La punta está cubierta de una mucosa súper pegajosa que es 50 veces más pegajosa que cualquier cosa hecha por humanos."
    ru: "Язык лягушки — одна из самых быстрых мышц в животном мире! Он может выдвигаться и втягиваться всего за 0.07 секунды — быстрее, чем вы моргаете! Язык прикреплён к передней части рта (не к задней, как наш), поэтому может выбрасываться очень далеко. Кончик покрыт суперлипкой слизью, которая в 50 раз липче всего, что создали люди."
  image: "detail-tongue-anatomy.jpg"

