funFacts:
  title:
    en: "Amazing Frog Facts!"
    es: "¡Datos Asombrosos sobre Ranas!"
    ru: "Удивительные факты о лягушках!"
  facts:
    - title:
        en: "The Great Metamorphosis"
        es: "La Gran Metamorfosis"
        ru: "Великий метаморфоз"
      content:
        en: "Frogs go through one of nature's most amazing transformations! They start as eggs, hatch into tadpoles that breathe water through gills, then slowly grow legs, absorb their tails, develop lungs, and become air-breathing frogs. The whole process takes about 12 to 16 weeks — that's like becoming a completely different animal in just three months!"
        es: "¡Las ranas pasan por una de las transformaciones más asombrosas de la naturaleza! Comienzan como huevos, nacen como renacuajos que respiran agua a través de branquias, luego lentamente les crecen patas, absorben sus colas, desarrollan pulmones y se convierten en ranas que respiran aire. ¡Todo el proceso toma de 12 a 16 semanas — es como convertirse en un animal completamente diferente en solo tres meses!"
        ru: "Лягушки проходят через одно из самых удивительных превращений в природе! Начинают как яйца, вылупляются в головастиков, дышащих жабрами, потом постепенно отращивают лапки, впитывают хвосты, развивают лёгкие и становятся лягушками, дышащими воздухом. Весь процесс занимает 12-16 недель — это как стать совершенно другим животным всего за три месяца!"
      image: "fun-fact-metamorphosis.jpg"

    - title:
        en: "Breathing Through Skin!"
        es: "¡Respirando a Través de la Piel!"
        ru: "Дышат через кожу!"
      content:
        en: "Frogs can breathe through their skin! Their moist, thin skin allows oxygen to pass right through. This means frogs can breathe underwater through their skin (though tadpoles use gills). That's why frogs always need to stay moist — their skin is like a second pair of lungs! Some frogs don't even have lungs at all and breathe entirely through their skin."
        es: "¡Las ranas pueden respirar a través de su piel! Su piel húmeda y delgada permite que el oxígeno pase directamente. Esto significa que las ranas pueden respirar bajo el agua a través de su piel (aunque los renacuajos usan branquias). ¡Por eso las ranas siempre necesitan mantenerse húmedas — su piel es como un segundo par de pulmones!"
        ru: "Лягушки могут дышать через кожу! Их влажная, тонкая кожа позволяет кислороду проходить прямо через неё. Это значит, что лягушки могут дышать под водой через кожу (хотя головастики используют жабры). Вот почему лягушки всегда должны оставаться влажными — их кожа как вторая пара лёгких!"
      image: "fun-fact-breathing.jpg"

    - title:
        en: "Super Jumpers"
        es: "Súper Saltadores"
        ru: "Суперпрыгуны"
      content:
        en: "Some frogs can jump over 20 times their own body length in a single leap! That would be like a human jumping the length of a basketball court. Their powerful back legs work like springs, storing energy and releasing it all at once. Red-eyed tree frogs are especially good jumpers — they leap from branch to branch high up in the rainforest canopy!"
        es: "¡Algunas ranas pueden saltar más de 20 veces la longitud de su cuerpo en un solo salto! Eso sería como si un humano saltara la longitud de una cancha de baloncesto. Sus poderosas patas traseras funcionan como resortes, almacenando energía y liberándola de golpe. ¡Las ranas arbóreas de ojos rojos son especialmente buenas saltadoras!"
        ru: "Некоторые лягушки могут прыгнуть на расстояние более 20 длин своего тела за один прыжок! Это как если бы человек перепрыгнул баскетбольную площадку. Их мощные задние лапы работают как пружины, накапливая энергию и высвобождая её разом. Красноглазые древесные лягушки — особенно хорошие прыгуны!"
      image: "fun-fact-jumping.jpg"

    - title:
        en: "Rainbow of Frogs"
        es: "Arcoíris de Ranas"
        ru: "Радуга лягушек"
      content:
        en: "Frogs come in every color of the rainbow! There are bright blue poison dart frogs, strawberry-red frogs, golden yellow frogs, and even see-through glass frogs where you can see their organs! The bright colors often mean 'don't eat me!' — warning that the frog might not taste very nice. Red-eyed tree frogs use their colors to startle anyone who bothers them — surprise!"
        es: "¡Las ranas vienen en todos los colores del arcoíris! Hay ranas dardo venenosas azul brillante, ranas rojo fresa, ranas amarillo dorado, ¡e incluso ranas de cristal transparentes donde puedes ver sus órganos! Los colores brillantes a menudo significan '¡no me comas!' — advirtiendo que la rana podría no saber muy bien."
        ru: "Лягушки бывают всех цветов радуги! Есть ярко-голубые ядовитые лягушки-дротики, клубнично-красные лягушки, золотисто-жёлтые лягушки и даже прозрачные стеклянные лягушки, сквозь которых видны органы! Яркие цвета часто означают 'не ешь меня!' — предупреждая, что лягушка может быть невкусной."
      image: "fun-fact-colors.jpg"

