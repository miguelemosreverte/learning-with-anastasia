funFacts:
  title:
    en: "Amazing Fox Facts!"
    es: "¡Datos Asombrosos sobre Zorros!"
    ru: "Удивительные факты о лисах!"
  facts:
    - title:
        en: "Super Hearing"
        es: "Súper Oído"
        ru: "Суперслух"
      content:
        en: "Red foxes can hear a mouse squeaking from 100 feet away, and can even hear them tunnelling under 3 feet of snow! Their large ears can rotate independently — one ear forward and one sideways — like two satellite dishes scanning for sound. This super hearing is what makes their famous pounce-dive so accurate. They can pinpoint exactly where a mouse is hiding, even when they can't see it!"
        es: "¡Los zorros rojos pueden escuchar un ratón chirriando a 30 metros de distancia, e incluso pueden oírlos cavando bajo un metro de nieve! Sus grandes orejas pueden rotar independientemente — una hacia adelante y otra de lado — como dos antenas parabólicas buscando sonido. Este súper oído es lo que hace que su famoso salto-zambullida sea tan preciso. ¡Pueden localizar exactamente dónde se esconde un ratón, incluso cuando no pueden verlo!"
        ru: "Рыжие лисы могут услышать писк мыши с расстояния 30 метров и даже слышат их под метром снега! Их большие уши могут вращаться независимо — одно вперёд, другое вбок — как две спутниковые тарелки, сканирующие звуки. Именно этот суперслух делает их знаменитый прыжок-нырок таким точным. Они могут определить, где именно прячется мышь, даже не видя её!"
      image: "fun-fact-super-hearing.jpg"

    - title:
        en: "The Fox Trot"
        es: "El Trote del Zorro"
        ru: "Лисья рысца"
      content:
        en: "When a fox finds extra food, it doesn't just eat it all — it buries it for later! Foxes dig small holes, drop in a mouse or some berries, and cover it back up with their nose. The amazing part? A single fox can remember HUNDREDS of hiding spots! They use landmarks like trees, rocks, and streams to create a mental treasure map. Some foxes have been found with over 1,000 cached food items!"
        es: "Cuando un zorro encuentra comida extra, ¡no se lo come todo — lo entierra para después! Los zorros cavan pequeños hoyos, meten un ratón o algunas bayas, y lo cubren con la nariz. ¿La parte increíble? ¡Un solo zorro puede recordar CIENTOS de escondites! Usan puntos de referencia como árboles, rocas y arroyos para crear un mapa mental del tesoro. ¡Se han encontrado zorros con más de 1,000 alimentos escondidos!"
        ru: "Когда лиса находит лишнюю еду, она не съедает всё — она закапывает на потом! Лисы роют маленькие ямки, кладут туда мышку или ягоды и закрывают носом. Удивительное в том, что одна лиса может помнить СОТНИ тайников! Они используют ориентиры — деревья, камни, ручьи — чтобы создать мысленную карту сокровищ. У некоторых лис находили более 1000 спрятанных запасов еды!"
      image: "fun-fact-food-burying.jpg"

    - title:
        en: "Tail Warmth"
        es: "Calor de Cola"
        ru: "Тепло хвоста"
      content:
        en: "A fox's bushy tail — called a 'brush' — is the ultimate multi-tool! In cold weather, foxes wrap their tail over their nose and paws like a cozy blanket. In rain, it works like an umbrella. When running, it helps with balance like a tightrope walker's pole. Foxes even use their tails to communicate — a wagging tail means 'let's play,' and a puffed-up tail means 'stay away!' Baby foxes love sleeping wrapped in their parents' tails."
        es: "¡La cola peluda de un zorro — llamada 'pincel' — es la herramienta multiusos definitiva! En clima frío, los zorros envuelven su cola sobre la nariz y las patas como una manta acogedora. Con lluvia, funciona como un paraguas. Al correr, ayuda con el equilibrio como la pértiga de un equilibrista. Los zorros incluso usan sus colas para comunicarse — una cola moviéndose significa 'juguemos,' ¡y una cola esponjada significa 'aléjate!' A los cachorros les encanta dormir envueltos en las colas de sus padres."
        ru: "Пушистый хвост лисы — его называют 'труба' — это универсальный инструмент! В холодную погоду лисы оборачивают хвост вокруг носа и лап как уютное одеяло. В дождь он работает как зонтик. При беге помогает с балансом как шест канатоходца. Лисы даже общаются хвостами — виляющий хвост значит 'давай играть,' а распушённый — 'не подходи!' Лисята обожают спать, укутанные в хвосты родителей."
      image: "fun-fact-tail-warmth.jpg"

    - title:
        en: "Night Vision"
        es: "Visión Nocturna"
        ru: "Ночное зрение"
      content:
        en: "Fox eyes have a special mirror-like layer behind the retina called the tapetum lucidum — which means 'bright carpet' in Latin! This layer bounces light back through the eye a second time, giving foxes incredible night vision. It's also what makes their eyes glow bright greenish-gold when caught in a flashlight beam at night. Foxes can see in light levels six times lower than what humans need. They're nature's night ninjas!"
        es: "¡Los ojos de los zorros tienen una capa especial como un espejo detrás de la retina llamada tapetum lucidum — que significa 'alfombra brillante' en latín! Esta capa refleja la luz de vuelta a través del ojo una segunda vez, dando a los zorros una increíble visión nocturna. También es lo que hace que sus ojos brillen verde-dorado cuando los alumbra una linterna por la noche. Los zorros pueden ver con niveles de luz seis veces más bajos que los humanos. ¡Son los ninjas nocturnos de la naturaleza!"
        ru: "У лисьих глаз есть особый зеркальный слой за сетчаткой — тапетум лусидум, что по-латыни значит 'светящийся ковёр'! Этот слой отражает свет обратно через глаз во второй раз, давая лисам невероятное ночное зрение. Именно он заставляет их глаза светиться зеленовато-золотым, когда на них попадает луч фонарика ночью. Лисы видят при освещении в шесть раз слабее, чем нужно людям. Они — ночные ниндзя природы!"
      image: "fun-fact-night-vision.jpg"

imageGeneration:
  characters:
    papa-russet:
      name: "Papa Russet"
      description: "Tall handsome dog fox with deep rich russet coat, dramatic silver streak along his back, long elegant black legs, magnificent bushy tail, warm amber eyes"
      uniqueFeatures:
        - "TALLEST character — significantly larger than Mama Fern, towers over both kits"
        - "Deep RICH RUSSET coat — darker and more intense red than any other character"
        - "Dramatic SILVER STREAK running along his back — his signature mark, like a bolt of lightning"
        - "Long ELEGANT BLACK LEGS — tall and powerful, built for speed and silent movement"
        - "MAGNIFICENT bushy tail — the biggest tail, used as a blanket for the whole family"
        - "Warm AMBER eyes — golden-brown, always alert and watchful"
      personality: "Wise and adventurous — stands tall and alert, ears always turning, protective but encouraging"
      notLike: "NOT slim or delicate like Mama Fern, NOT small or round like the kits, NOT light-coloured"

    mama-fern:
      name: "Mama Fern"
      description: "Graceful vixen with softer golden-orange coat, beautiful cream chest, gentle warm brown eyes, distinctive pale patch behind one ear"
      uniqueFeatures:
        - "SOFTER GOLDEN-ORANGE coat — clearly lighter and warmer-toned than Papa's deep russet"
        - "Beautiful CREAM CHEST — prominent light patch on chest and belly"
        - "Gentle warm BROWN eyes — softer and more nurturing than Papa's amber"
        - "Distinctive PALE PATCH behind one ear — her unique identifying mark"
        - "More SLENDER and graceful build than Papa — elegant but not as tall"
        - "Often seen CURLED protectively — body language always nurturing and sheltering"
      personality: "Patient and nurturing — often curled protectively around kits, gentle and wise about the forest"
      notLike: "NOT as tall or dark as Papa Russet, NOT as small as the kits, NOT as intense or bold-coloured"

    pip:
      name: "Pip"
      description: "Smallest kit with brightest vivid orange fur, oversized perky ears, one distinctive white sock on front left paw, curious tilted-head pose"
      uniqueFeatures:
        - "SMALLEST character — much smaller than both parents, slightly smaller than Clover"
        - "BRIGHTEST vivid orange fur — more intensely orange than any other character"
        - "OVERSIZED perky ears — disproportionately large for his small head"
        - "One distinctive WHITE SOCK on front left paw — the other three paws are black"
        - "Signature TILTED-HEAD pose — always tilting head sideways to listen"
        - "Bright curious eyes — always wide open with wonder"
      personality: "Curious and brave — always tilting head sideways to listen, eager to try everything, boundless energy"
      notLike: "NOT as big as Clover, much SMALLER than adults, NOT dark-auburn like Clover, NOT calm or still"

    clover:
      name: "Clover"
      description: "Slightly larger kit with darker reddish-auburn coat, extra-large white tail tip, tiny dark freckle on nose, notably bushy tail for her age"
      uniqueFeatures:
        - "Slightly LARGER than Pip — bigger and more solidly built, but still clearly a kit"
        - "DARKER REDDISH-AUBURN coat — distinctly different from Pip's bright orange"
        - "EXTRA-LARGE white tail tip — bigger white tip than any other character"
        - "Tiny dark FRECKLE on nose — her unique identifying mark"
        - "Notably BUSHY TAIL for her age — takes after Papa's magnificent brush"
        - "Determined expression — slightly narrowed eyes, focused and clever"
      personality: "Clever and determined — always figuring things out first, independent and resourceful"
      notLike: "NOT as bright-orange as Pip, NOT as big as adults, NOT as small as Pip, NOT timid or hesitant"

  style:
    global: "Classic hand-drawn Disney animation style inspired by the Golden Age (Snow White, Bambi). Warm organic flowing lines with natural variation in line weight. Large soulful expressive eyes. Painterly brushstrokes visible in fur, leaves, and grass. Soft rounded character proportions. Vintage animation cel warmth with gentle watercolor-like backgrounds. Warm autumn woodland setting with golden leaves, amber light, misty mornings, and cozy den interiors. Child-friendly and inviting."

viewerDetails:
- title:
    en: "Ear Close-up"
    es: "Primer Plano de Orejas"
    ru: "Уши крупным планом"
  description:
    en: "Look at Papa Russet's amazing ears — they can rotate independently, like two radar dishes! One ear can point forward while the other turns sideways or even backward. This lets foxes pinpoint the exact location of sounds, even tiny mice rustling under leaves or snow. The ears are lined with thick fur to keep warm, and the dark tips help foxes recognize each other. A fox's hearing is so precise it can detect the direction of a sound within one degree!"
    es: "¡Mira las increíbles orejas de Papá Russet — pueden rotar independientemente, como dos antenas de radar! Una oreja puede apuntar hacia adelante mientras la otra gira de lado o incluso hacia atrás. Esto permite a los zorros localizar la ubicación exacta de los sonidos, incluso ratones diminutos moviéndose bajo hojas o nieve. Las orejas están forradas de pelaje grueso para mantenerse calientes, y las puntas oscuras ayudan a los zorros a reconocerse."
    ru: "Посмотрите на удивительные уши Папы Рассета — они могут вращаться независимо, как две радарные тарелки! Одно ухо может быть направлено вперёд, а другое поворачивается вбок или даже назад. Это позволяет лисам точно определять расположение звуков, даже крошечных мышей, шуршащих под листьями или снегом. Уши покрыты густым мехом для тепла, а тёмные кончики помогают лисам узнавать друг друга."
  image: "detail-ear-closeup.jpg"

- title:
    en: "Paw Pads"
    es: "Almohadillas de las Patas"
    ru: "Подушечки лап"
  description:
    en: "Fox paws are perfectly designed for sneaking! Their paw pads are covered in thick fur — even on the bottom — which muffles their footsteps like built-in slippers. Unlike most dogs, foxes have semi-retractable claws that they can pull in slightly for silent stalking and extend for digging dens. Look at Pip's special white sock on his front left paw — underneath, his paw pads are just as dark and tough as his black paws!"
    es: "¡Las patas de los zorros están perfectamente diseñadas para escabullirse! Sus almohadillas están cubiertas de pelaje grueso — incluso por debajo — lo que amortigua sus pasos como pantuflas incorporadas. A diferencia de la mayoría de los perros, los zorros tienen garras semi-retráctiles que pueden retraer ligeramente para acechar en silencio y extender para cavar madrigueras. ¡Mira el calcetín blanco especial de Pip en su pata delantera izquierda — debajo, sus almohadillas son tan oscuras y resistentes como sus patas negras!"
    ru: "Лисьи лапы идеально созданы для подкрадывания! Их подушечки покрыты густым мехом — даже снизу — что приглушает шаги, как встроенные тапочки. В отличие от большинства собак, у лис полувтяжные когти, которые они могут слегка убирать для бесшумного преследования и выпускать для рытья нор. Посмотрите на белый носочек Пипа на левой передней лапе — под ним подушечки такие же тёмные и крепкие, как на чёрных лапках!"
  image: "detail-paw-pads.jpg"

- title:
    en: "Whisker Sensors"
    es: "Sensores de Bigotes"
    ru: "Усы-сенсоры"
  description:
    en: "Mama Fern's long whiskers aren't just for looks — they're incredibly sensitive touch sensors! Each whisker is connected to hundreds of nerve endings that can detect the tiniest changes in air currents. This helps foxes navigate in complete darkness inside their dens and through thick undergrowth at night. The whiskers are as wide as the fox's body, helping them judge whether they can fit through tight spaces. They can even sense the body heat of nearby prey!"
    es: "¡Los largos bigotes de Mamá Fern no son solo para verse bien — son sensores táctiles increíblemente sensibles! Cada bigote está conectado a cientos de terminaciones nerviosas que pueden detectar los cambios más pequeños en las corrientes de aire. Esto ayuda a los zorros a navegar en completa oscuridad dentro de sus madrigueras y entre la vegetación espesa por la noche. Los bigotes son tan anchos como el cuerpo del zorro, ayudándolos a juzgar si caben por espacios estrechos."
    ru: "Длинные усы Мамы Ферн — это не просто украшение — это невероятно чувствительные датчики осязания! Каждый ус соединён с сотнями нервных окончаний, которые улавливают малейшие изменения воздушных потоков. Это помогает лисам ориентироваться в полной темноте внутри нор и в густых зарослях ночью. Усы по ширине равны телу лисы, помогая определять, пролезут ли они в узкое место."
  image: "detail-whisker-sensors.jpg"

- title:
    en: "The Magnificent Brush"
    es: "El Magnífico Pincel"
    ru: "Великолепная труба"
  description:
    en: "Papa Russet's tail — called a 'brush' by fox lovers — is a marvel of nature! It makes up about one-third of his total body length and is packed with thick, insulating fur. The white tip at the end helps fox family members follow each other through tall grass and dim light. Inside the tail, a scent gland produces the musky 'foxy' smell that foxes use to mark their territory. Kits love to chase their parents' tails — it's their favourite toy!"
    es: "¡La cola de Papá Russet — llamada 'pincel' por los amantes de los zorros — es una maravilla de la naturaleza! Representa aproximadamente un tercio de la longitud total de su cuerpo y está llena de pelaje grueso y aislante. La punta blanca al final ayuda a los miembros de la familia a seguirse en la hierba alta y la luz tenue. Dentro de la cola, una glándula de aroma produce el olor almizclado que los zorros usan para marcar su territorio. ¡A los cachorros les encanta perseguir las colas de sus padres — es su juguete favorito!"
    ru: "Хвост Папы Рассета — его называют 'труба' — чудо природы! Он составляет около трети общей длины тела и набит густым утепляющим мехом. Белый кончик помогает членам лисьей семьи следовать друг за другом в высокой траве и сумерках. Внутри хвоста находится пахучая железа, которая вырабатывает мускусный 'лисий' запах для пометки территории. Лисята обожают гоняться за хвостами родителей — это их любимая игрушка!"
  image: "detail-tail-anatomy.jpg"

