    es: "Zorros Rojos"
    ru: "Рыжие лисы"
  subtitle:
    en: "A Den Full of Love"
    es: "Una Madriguera Llena de Amor"
    ru: "Нора, полная любви"
  image: "hero-autumn-meadow.jpg"
  imageType: "landscape"
  imageAlt:
