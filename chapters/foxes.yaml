# Foxes Chapter Definition - Pip's Adventures in the Autumn Meadow
meta:
  id: foxes
  issueNumber: 11
  date: "February 2026"
  folderName: "foxes"
  title:
    en: "Red Foxes: A Den Full of Love"
    es: "Zorros Rojos: Una Madriguera Llena de Amor"
    ru: "Рыжие лисы: Нора, полная любви"
  subtitle:
    en: "Pip's Adventures in the Autumn Meadow"
    es: "Las Aventuras de Pip en el Prado Otoñal"
    ru: "Приключения Пипа на осеннем лугу"
  magazineText:
    en: "Meet Pip, a tiny fox kit with oversized ears and the brightest orange fur, who discovers the wonders of the autumn woodland with his family! Watch him open his eyes for the first time, learn Papa's famous pounce, play in golden leaves, and curl up under the stars wrapped in Papa's big bushy tail."
    es: "¡Conoce a Pip, un pequeño cachorro de zorro con orejas enormes y el pelaje naranja más brillante, que descubre las maravillas del bosque otoñal con su familia! Míralo abrir los ojos por primera vez, aprender el famoso salto de Papá, jugar entre hojas doradas y acurrucarse bajo las estrellas envuelto en la gran cola esponjosa de Papá."
    ru: "Познакомьтесь с Пипом, крошечным лисёнком с огромными ушами и самым ярким рыжим мехом, который открывает чудеса осеннего леса вместе со своей семьёй! Смотрите, как он впервые открывает глаза, учится знаменитому прыжку Папы, играет в золотых листьях и засыпает под звёздами, укутанный большим пушистым хвостом Папы."
  magazineCover: "magazine-cover.jpg"
  hasGeneratedContent: true
  footerSubtitle:
    en: "Celebrating the cleverest family in the autumn woodland"
    es: "Celebrando a la familia más astuta del bosque otoñal"
    ru: "Celebrating самую умную семью осеннего леса"
  description: "Follow Pip the red fox kit through his first autumn, from opening his eyes in the cozy den to learning to pounce, play, and curl up with his family under the stars"
  preface:
    en:
      - "Welcome to the golden autumn woodland, where a family of red foxes lives in a cozy underground den beneath an old oak tree! In this adventure, we'll follow Pip, an adorable little kit with oversized ears and one white sock, as he discovers the magic of the meadow with his family."
      - "Red foxes are some of the cleverest animals in nature. Papa hunts with an incredible pounce-dive, Mama knows every berry and safe path in the forest, and the kits learn everything through play. Both parents work together to teach their babies about the wonderful world above their den."
      - "Through Pip's first autumn, you'll discover how foxes hear mice under the snow, how they bury food in hundreds of hiding spots, how their bushy tails keep them warm like blankets, and how their eyes glow in the dark. Get ready for a cozy adventure in the autumn leaves!"
    es:
      - "¡Bienvenidos al dorado bosque otoñal, donde una familia de zorros rojos vive en una acogedora madriguera subterránea bajo un viejo roble! En esta aventura, seguiremos a Pip, un adorable cachorro con orejas enormes y un calcetín blanco, mientras descubre la magia del prado con su familia."
      - "Los zorros rojos son de los animales más astutos de la naturaleza. Papá caza con un increíble salto-zambullida, Mamá conoce cada baya y sendero seguro del bosque, y los cachorros aprenden todo a través del juego. Ambos padres trabajan juntos para enseñar a sus bebés sobre el maravilloso mundo sobre su madriguera."
      - "A través del primer otoño de Pip, descubrirás cómo los zorros escuchan ratones bajo la nieve, cómo entierran comida en cientos de escondites, cómo sus colas peludas los mantienen calientes como mantas y cómo sus ojos brillan en la oscuridad. ¡Prepárate para una aventura acogedora entre las hojas de otoño!"
    ru:
      - "Добро пожаловать в золотой осенний лес, где семья рыжих лис живёт в уютной подземной норе под старым дубом! В этом приключении мы последуем за Пипом, очаровательным лисёнком с огромными ушами и одним белым носочком, пока он открывает волшебство луга вместе со своей семьёй."
      - "Рыжие лисы — одни из самых умных животных в природе. Папа охотится невероятным прыжком-нырком, Мама знает каждую ягоду и безопасную тропинку в лесу, а лисята учатся всему через игру. Оба родителя вместе учат малышей удивительному миру над их норой."
      - "Через первую осень Пипа вы узнаете, как лисы слышат мышей под снегом, как прячут еду в сотнях тайников, как их пушистые хвосты согревают как одеяла и как их глаза светятся в темноте. Приготовьтесь к уютному приключению среди осенних листьев!"

hero:
  title:
