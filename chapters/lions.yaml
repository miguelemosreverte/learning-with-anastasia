sections:
  # Meet Papa Kazi
  - id: meet-kazi
    generate_character: true
    mood: [epic-skies, golden-hour]
    title:
      en: "Meet Papa Kazi, the Mighty King"
      es: "Conoce a Papá Kazi, el Rey Poderoso"
      ru: "Знакомьтесь: Папа Кази, могучий король"
    content:
      en: "Standing on a rocky hill overlooking the golden savanna, Papa Kazi is the most magnificent lion you have ever seen! His huge dark brown mane flows around his face like a crown, making him look twice as big as he already is — and he is BIG. His golden amber eyes see everything — every bird, every rustle in the grass. When Kazi yawns, you can see teeth as long as your fingers! But don't worry — this mighty king has the gentlest heart. 'My job,' he rumbles in his deep voice, 'is to keep my family safe. And I always will.'"
      es: "¡De pie en una colina rocosa sobre la dorada sabana, Papá Kazi es el león más magnífico que hayas visto! Su enorme melena marrón oscura fluye alrededor de su cara como una corona, haciéndolo parecer el doble de grande de lo que ya es — y es MUY grande. Sus ojos dorados de ámbar lo ven todo — cada pájaro, cada susurro en la hierba. ¡Cuando Kazi bosteza, puedes ver dientes tan largos como tus dedos! Pero no te preocupes — este poderoso rey tiene el corazón más tierno. 'Mi trabajo,' retumba con su voz profunda, 'es mantener a mi familia a salvo. Y siempre lo haré.'"
      ru: "Стоя на скалистом холме над золотой саванной, Папа Кази — самый великолепный лев, которого вы когда-либо видели! Его огромная тёмно-коричневая грива обрамляет лицо как корона, делая его вдвое больше, чем он уже есть — а он ОГРОМНЫЙ. Его золотисто-янтарные глаза видят всё — каждую птицу, каждый шорох в траве. Когда Кази зевает, видны зубы длиной с ваши пальцы! Но не волнуйтесь — у этого могучего короля самое нежное сердце. 'Моя работа,' рокочет он глубоким голосом, 'защищать мою семью. И я всегда буду.'"
    image: "kazi-portrait.jpg"
    imageAlt:
      en: "Magnificent male lion with huge dark brown mane standing proudly on a rocky hill, golden amber eyes, powerful muscular build, golden savanna stretching behind him at sunrise"
      es: "Magnífico león macho con enorme melena marrón oscura de pie orgullosamente en una colina rocosa, ojos dorados de ámbar, constitución poderosa y musculosa, sabana dorada extendiéndose detrás al amanecer"
      ru: "Великолепный лев-самец с огромной тёмно-коричневой гривой, гордо стоящий на скалистом холме, золотисто-янтарные глаза, мощное мускулистое тело, золотая саванна простирается позади на рассвете"

  # Meet Mama Dalila
  - id: meet-dalila
    generate_character: true
    mood: [golden-hour, soft-intimate]
    use_character: "${meet-kazi.image}"
    action: "sleek golden lioness with athletic muscular build and a small notch on her left ear, standing in tall golden savanna grass in a hunting stance — low, focused, powerful. A magnificent male lion with a huge dark brown mane watches from a distance behind her. Warm golden hour light, African savanna with acacia trees"
    title:
      en: "Mama Dalila, the Great Huntress"
      es: "Mamá Dalila, la Gran Cazadora"
      ru: "Мама Далила, великая охотница"
    content:
      en: "While Papa Kazi is the biggest and loudest, Mama Dalila is the cleverest and fastest. She is a sleek, golden lioness with strong muscles that ripple under her smooth fur. See that little notch on her left ear? She got that from a brave hunt long ago, and she wears it proudly. Dalila can sneak through the tall grass without making a single sound. She can run as fast as a car on a neighborhood street! 'Being strong isn't just about roaring,' she tells the cubs. 'It's about being smart, patient, and working together.'"
      es: "Mientras Papá Kazi es el más grande y ruidoso, Mamá Dalila es la más lista y rápida. Es una leona dorada y esbelta con músculos fuertes que se marcan bajo su suave pelaje. ¿Ves esa pequeña muesca en su oreja izquierda? La obtuvo en una valiente cacería hace mucho tiempo, y la lleva con orgullo. Dalila puede deslizarse por la hierba alta sin hacer un solo sonido. ¡Puede correr tan rápido como un auto en una calle residencial! 'Ser fuerte no se trata solo de rugir,' les dice a los cachorros. 'Se trata de ser inteligente, paciente y trabajar juntos.'"
      ru: "Пока Папа Кази — самый большой и громкий, Мама Далила — самая умная и быстрая. Она стройная, золотистая львица с сильными мускулами, которые перекатываются под гладкой шерстью. Видите маленькую зарубку на её левом ухе? Она получила её на храброй охоте давным-давно и носит с гордостью. Далила может красться по высокой траве, не издав ни звука. Она бежит так быстро, как машина на городской улице! 'Быть сильным — это не только рычать,' говорит она львятам. 'Это значит быть умным, терпеливым и работать вместе.'"
    image: "dalila-portrait.jpg"
    imageAlt:
      en: "Sleek golden lioness in hunting stance in tall savanna grass, athletic muscular build, small notch on left ear, warm focused eyes, golden hour light"
      es: "Esbelta leona dorada en postura de caza en la hierba alta de la sabana, constitución atlética y musculosa, pequeña muesca en la oreja izquierda, ojos cálidos y enfocados, luz de hora dorada"
      ru: "Стройная золотистая львица в охотничьей стойке в высокой траве саванны, атлетическое мускулистое тело, маленькая зарубка на левом ухе, тёплые сосредоточенные глаза, свет золотого часа"

  # Meet the Cubs
  - id: meet-cubs
    generate_character: true
    mood: [soft-intimate, golden-hour]
    use_characters: ["${meet-kazi.image}", "${meet-dalila.image}"]
    action: "two adorable lion cubs playing together in golden savanna grass — one slightly larger male cub with lighter golden fur and visible faint spots, oversized paws, tumbling playfully; one slightly smaller female cub with darker golden fur, pouncing bravely. A magnificent male lion with huge dark brown mane and a sleek golden lioness with notched left ear watch them lovingly from nearby shade of an acacia tree. Warm golden light, African savanna"
    title:
      en: "Cubs at Play: Taji and Zuri!"
      es: "¡Cachorros Jugando: Taji y Zuri!"
      ru: "Львята играют: Таджи и Зури!"
    content:
      en: "POUNCE! TUMBLE! ROLL! Meet Taji and Zuri, the two funniest, bounciest lion cubs on the entire savanna! Taji is the bigger one — his golden fur still has faint baby spots, and his paws are ENORMOUS compared to his body. He hasn't grown into them yet! He's always getting into trouble, sneaking up on butterflies and falling over his own big feet. Little Zuri is smaller but OH so brave! She has darker golden fur and she is always trying to keep up with the grown-ups. Right now, she's pounced on Taji's tail and WON'T let go! 'That's MY tail!' Taji squeals, and they both tumble into a giggling heap."
      es: "¡SALTO! ¡VOLTERETA! ¡RUEDO! ¡Conoce a Taji y Zuri, los dos cachorros de león más graciosos y saltarines de toda la sabana! Taji es el más grande — su pelaje dorado todavía tiene tenues manchas de bebé, y sus patas son ENORMES comparadas con su cuerpo. ¡Todavía no les ha dado alcance! Siempre se mete en problemas, acechando mariposas y tropezando con sus propias patas grandes. ¡La pequeña Zuri es más chiquita pero MUY valiente! Tiene pelaje dorado más oscuro y siempre intenta seguir el paso de los grandes. ¡Ahora mismo ha saltado sobre la cola de Taji y NO la suelta! '¡Esa es MI cola!' chilla Taji, y ambos caen en un montón de risitas."
      ru: "ПРЫГ! КУВЫРК! КАТИСЬ! Познакомьтесь с Таджи и Зури — двумя самыми смешными и прыгучими львятами во всей саванне! Таджи покрупнее — на его золотистой шерсти ещё видны бледные детские пятнышки, а лапы ОГРОМНЫЕ по сравнению с телом. Он ещё не дорос до них! Он вечно попадает в переделки, подкрадывается к бабочкам и спотыкается о собственные большие лапы. Маленькая Зури поменьше, но О какая храбрая! У неё более тёмная золотистая шерсть, и она всегда пытается угнаться за взрослыми. Прямо сейчас она вцепилась в хвост Таджи и НЕ отпускает! 'Это МОЙ хвост!' визжит Таджи, и оба кубарем валятся в хохочущую кучу."
    image: "cubs-playing.jpg"
    imageAlt:
      en: "Two adorable lion cubs tumbling and playing in golden savanna grass, one larger with faint spots and big paws, one smaller and darker, parents watching from shade of acacia tree"
      es: "Dos adorables cachorros de león rodando y jugando en la hierba dorada de la sabana, uno más grande con manchas tenues y patas grandes, otro más pequeño y oscuro, padres observando desde la sombra de un árbol de acacia"
      ru: "Два очаровательных львёнка кувыркаются и играют в золотой траве саванны, один крупнее с бледными пятнышками и большими лапами, другой поменьше и темнее, родители наблюдают из тени акации"

  # Learning to Stalk
  - id: learning-to-stalk
    mood: [golden-hour]
    use_characters: ["${meet-dalila.image}", "${meet-cubs.image}"]
    action: "golden lioness mother crouching low in tall savanna grass teaching two lion cubs to stalk — the cubs trying to copy her low hunting posture, one cub doing it well while the other has its bottom sticking up comically. Warm afternoon light, African savanna with distant acacia trees"
    title:
      en: "Learning to Stalk"
      es: "Aprendiendo a Acechar"
      ru: "Учимся подкрадываться"
    content:
      en: "'Lesson one,' Mama Dalila whispers. 'Get LOW.' She sinks into the golden grass until she's nearly invisible. Only her eyes peek above the tips of the grass, watching. 'Now you try.' Zuri drops down perfectly — her darker fur blends right into the shadows. 'Excellent, Zuri!' Mama purrs. Taji tries too, but his big bottom sticks up like a golden hill. A bird lands right on it! 'Taji!' Zuri giggles. 'You're supposed to be HIDING!' Taji grins his goofy grin. 'I was testing if the bird would notice. It's... research!' Mama laughs softly. 'Practice makes perfect, my darlings.'"
      es: "'Lección uno,' susurra Mamá Dalila. 'Agáchense BIEN.' Se hunde en la hierba dorada hasta quedar casi invisible. Solo sus ojos se asoman por encima de las puntas de la hierba. 'Ahora inténtenlo.' Zuri se agacha perfectamente — su pelaje más oscuro se funde con las sombras. '¡Excelente, Zuri!' ronronea Mamá. Taji también lo intenta, pero su gran trasero sobresale como una colina dorada. ¡Un pájaro se posa encima! '¡Taji!' se ríe Zuri. '¡Se supone que debes ESCONDERTE!' Taji sonríe con su sonrisa tontita. 'Estaba probando si el pájaro notaría. Es... ¡investigación!'"
      ru: "'Урок первый,' шепчет Мама Далила. 'Ниже.' Она опускается в золотую траву, пока не становится почти невидимой. Только глаза выглядывают над кончиками травинок. 'Теперь вы.' Зури приседает идеально — её тёмная шерсть сливается с тенями. 'Отлично, Зури!' мурлычет Мама. Таджи тоже пытается, но его большая попа торчит как золотой холмик. Птичка садится прямо на неё! 'Таджи!' хихикает Зури. 'Ты должен ПРЯТАТЬСЯ!' Таджи ухмыляется своей глупой улыбкой. 'Я проверял, заметит ли птица. Это... исследование!'"
    image: "learning-to-stalk.jpg"

  # The Great Hunt
  - id: the-great-hunt
    mood: [epic-skies, golden-hour]
    use_characters: ["${meet-dalila.image}"]
    action: "powerful golden lioness sprinting at full speed through golden savanna grass, muscles rippling, dust kicking up behind her, small notch visible on left ear, intense focused eyes, dramatic golden hour lighting with dust particles glowing in the air, African savanna landscape"
    title:
      en: "Mama's Amazing Hunt!"
      es: "¡La Increíble Cacería de Mamá!"
      ru: "Потрясающая охота Мамы!"
    content:
      en: "Today, the cubs get to WATCH Mama hunt for the very first time! They hide in the tall grass with Papa Kazi, eyes wide. Mama Dalila creeps through the grass, so low and so quiet, she's like a golden shadow. Step... step... step... Then — WHOOOOSH! Mama EXPLODES forward like a golden rocket! Her powerful legs eat up the ground. Dust flies everywhere! She's SO FAST! The cubs' mouths drop open. 'Is Mama FLYING?!' Taji gasps. Papa chuckles proudly. 'Your mother is the finest huntress in all the land. She feeds our whole family with her skill and bravery.'"
      es: "¡Hoy los cachorros pueden VER a Mamá cazar por primera vez! Se esconden en la hierba alta con Papá Kazi, ojos bien abiertos. Mamá Dalila se arrastra por la hierba, tan baja y tan silenciosa, como una sombra dorada. Paso... paso... paso... ¡Entonces — FUUUUSH! ¡Mamá EXPLOTA hacia adelante como un cohete dorado! Sus poderosas patas devoran el suelo. ¡El polvo vuela por todas partes! ¡Es TAN RÁPIDA! Las bocas de los cachorros se abren. '¿¡Mamá está VOLANDO?!' jadea Taji. Papá se ríe orgulloso. 'Su madre es la mejor cazadora de toda la tierra.'"
      ru: "Сегодня львята впервые СМОТРЯТ, как Мама охотится! Они прячутся в высокой траве с Папой Кази, глаза широко открыты. Мама Далила крадётся по траве, так низко и так тихо, что она как золотая тень. Шаг... шаг... шаг... И — ВЖУУУХ! Мама ВЗРЫВАЕТСЯ вперёд как золотая ракета! Её мощные лапы пожирают землю. Пыль летит повсюду! Она ТАКАЯ быстрая! У львят отвисают челюсти. 'Мама ЛЕТИТ?!' задыхается Таджи. Папа горделиво хмыкает. 'Ваша мать — лучшая охотница во всей округе.'"
    image: "dalila-hunting.jpg"
    imageAlt:
      en: "Powerful golden lioness sprinting at full speed through golden savanna grass, muscles rippling, dust flying, intense focused expression, dramatic golden hour light"
      es: "Poderosa leona dorada corriendo a toda velocidad por la hierba dorada de la sabana, músculos ondeando, polvo volando, expresión intensa y enfocada, luz dramática de hora dorada"
      ru: "Мощная золотистая львица мчится на полной скорости по золотой траве саванны, мускулы перекатываются, пыль летит, сосредоточенный взгляд, драматичный свет золотого часа"

  # Kazi's Mighty Roar
  - id: mighty-roar
    mood: [epic-skies]
    use_characters: ["${meet-kazi.image}"]
    action: "magnificent male lion with huge dark brown mane roaring powerfully at golden sunset, mouth wide open showing teeth, mane blowing in the wind, standing on rocky outcrop overlooking vast savanna, dramatic orange and purple sky, dust and wind swirling around him, epic powerful moment"
    title:
      en: "The Mightiest Roar!"
      es: "¡El Rugido Más Poderoso!"
      ru: "Самый могучий рык!"
    content:
      en: "As the sun turns the sky orange and purple, Papa Kazi climbs to the highest rock. He takes a DEEP breath, his enormous chest expanding, his great dark mane bristling in the wind. Then — RRRROOOOAAARRR! The ground seems to SHAKE! Birds scatter! The grass RIPPLES! Papa's roar rolls across the savanna like thunder, on and on and on. It can be heard FIVE MILES away! 'AGAIN! AGAIN!' the cubs cheer. Taji tries his own roar — 'Mew!' Zuri tries too — 'Mip!' Papa laughs so hard his mane shakes. 'Don't worry, little ones. Your roars will come. And they will be MIGHTY.'"
      es: "Cuando el sol tiñe el cielo de naranja y púrpura, Papá Kazi sube a la roca más alta. Toma una respiración PROFUNDA, su enorme pecho expandiéndose, su gran melena oscura erizándose en el viento. ¡Entonces — RRRROOOOAAARRR! ¡El suelo parece TEMBLAR! ¡Los pájaros huyen! ¡La hierba ONDULA! El rugido de Papá rueda por la sabana como un trueno. ¡Se puede escuchar a OCHO KILÓMETROS! '¡OTRA VEZ! ¡OTRA VEZ!' animan los cachorros. Taji intenta su propio rugido — '¡Miu!' Zuri también — '¡Mip!' Papá se ríe tanto que su melena tiembla. 'No se preocupen, pequeños. Sus rugidos vendrán. Y serán PODEROSOS.'"
      ru: "Когда солнце окрашивает небо в оранжевый и пурпурный, Папа Кази поднимается на самую высокую скалу. Он делает ГЛУБОКИЙ вдох, его огромная грудь расширяется, великая тёмная грива встаёт дыбом на ветру. И — РРРООООААААРРР! Земля, кажется, ДРОЖИТ! Птицы разлетаются! Трава ВОЛНУЕТСЯ! Рык Папы катится по саванне как гром, дальше и дальше. Его слышно за ВОСЕМЬ КИЛОМЕТРОВ! 'ЕЩЁ! ЕЩЁ!' кричат львята. Таджи пробует свой рык — 'Мяу!' Зури тоже — 'Мип!' Папа смеётся так, что грива трясётся. 'Не волнуйтесь, малыши. Ваши рыки придут. И они будут МОГУЧИМИ.'"
    image: "kazi-roaring.jpg"
    imageAlt:
      en: "Magnificent male lion roaring powerfully on rocky outcrop at sunset, huge dark brown mane blowing in wind, dramatic orange and purple sky behind"
      es: "Magnífico león macho rugiendo poderosamente en un promontorio rocoso al atardecer, enorme melena marrón oscura al viento, dramático cielo naranja y púrpura detrás"
      ru: "Великолепный лев-самец могуче рычит на скалистом выступе на закате, огромная тёмно-коричневая грива развевается на ветру, драматичное оранжево-пурпурное небо позади"

  # Nap Time
  - id: nap-time
    mood: [soft-intimate]
    use_characters: ["${meet-kazi.image}", "${meet-dalila.image}", "${meet-cubs.image}"]
    action: "entire lion family sleeping together in warm shade under a large acacia tree — magnificent male lion with dark brown mane sprawled on his back with two small cubs curled up on his belly, sleek golden lioness with notched ear sleeping close beside them, all peaceful and adorable, dappled golden light filtering through acacia leaves, African savanna"
    title:
      en: "The Great Big Nap"
      es: "La Gran Siesta"
      ru: "Великий сон"
    content:
      en: "If there's one thing lions are CHAMPIONS at, it's SLEEPING! Lions sleep up to TWENTY hours a day — that's almost the whole day! And the way they sleep is the cutest thing ever. Papa Kazi lies on his back under the big acacia tree, his huge paws in the air, snoring like a rumbling engine. Taji is curled up right on Papa's fluffy belly, rising and falling with each giant breath. Zuri is tucked between Mama and Papa, purring in her sleep. Mama Dalila has her paw draped gently over both cubs. One big, warm, furry pile of love. 'Shhhh,' the wind whispers. 'The kings are sleeping.'"
      es: "¡Si hay algo en lo que los leones son CAMPEONES, es en DORMIR! Los leones duermen hasta VEINTE horas al día — ¡eso es casi todo el día! Y la forma en que duermen es lo más tierno del mundo. Papá Kazi yace boca arriba bajo la gran acacia, sus enormes patas en el aire, roncando como un motor. Taji está acurrucado sobre la barriguita peluda de Papá, subiendo y bajando con cada respiración gigante. Zuri está encajada entre Mamá y Papá, ronroneando dormida. Mamá Dalila tiene su pata suavemente sobre ambos cachorros. Un gran montón cálido y peludo de amor. 'Shhhh,' susurra el viento. 'Los reyes están durmiendo.'"
      ru: "Если и есть то, в чём львы — ЧЕМПИОНЫ, так это СОН! Львы спят до ДВАДЦАТИ часов в день — это почти весь день! И то, как они спят — самое милое на свете. Папа Кази лежит на спине под большой акацией, огромные лапы в воздухе, храпит как мотор. Таджи свернулся прямо на пушистом животе Папы, поднимаясь и опускаясь с каждым гигантским вдохом. Зури устроилась между Мамой и Папой, мурлыча во сне. Мама Далила нежно положила лапу на обоих львят. Одна большая, тёплая, пушистая куча любви. 'Тшшш,' шепчет ветер. 'Короли спят.'"
    image: "family-napping.jpg"

  # The Watering Hole
  - id: watering-hole
    mood: [golden-hour, lush-botanical]
    use_characters: ["${meet-kazi.image}", "${meet-dalila.image}", "${meet-cubs.image}"]
    action: "lion family drinking water together at a beautiful African watering hole at sunset — magnificent male lion with dark brown mane, sleek golden lioness with notched ear, and two small cubs, all side by side lapping water, their reflections visible in the still water. Zebras and giraffes visible in the far background keeping safe distance. Golden sunset light, acacia trees silhouetted"
    title:
      en: "The Watering Hole"
      es: "El Abrevadero"
      ru: "Водопой"
    content:
      en: "When the afternoon heat cools, the whole family walks to the watering hole. It's like the neighborhood park of the savanna — everyone comes here! Papa Kazi walks in front, his dark mane swaying. The zebras and giraffes see him coming and step back politely. 'Good evening, Kazi!' a giraffe nods from a safe distance. At the water's edge, the whole family drinks together — lap, lap, lap. Taji sees his reflection and POUNCES on it — SPLASH! He's soaking wet. 'I caught a lion!' he announces proudly. Everyone laughs — even the zebras."
      es: "Cuando el calor de la tarde se enfría, toda la familia camina al abrevadero. ¡Es como el parque del vecindario de la sabana — todos vienen aquí! Papá Kazi camina al frente, su melena oscura balanceándose. Las cebras y jirafas lo ven venir y se apartan educadamente. '¡Buenas tardes, Kazi!' asiente una jirafa desde una distancia segura. En la orilla del agua, toda la familia bebe junta — lap, lap, lap. Taji ve su reflejo y ¡SALTA sobre él — SPLASH! Está empapado. '¡Atrapé un león!' anuncia orgulloso. Todos se ríen — hasta las cebras."
      ru: "Когда послеобеденная жара спадает, вся семья идёт к водопою. Это как парк по соседству в саванне — все приходят сюда! Папа Кази идёт впереди, его тёмная грива покачивается. Зебры и жирафы видят его и вежливо отступают. 'Добрый вечер, Кази!' кивает жираф с безопасного расстояния. У кромки воды вся семья пьёт вместе — лакать, лакать, лакать. Таджи видит своё отражение и ПРЫГАЕТ на него — ВСПЛЕСК! Он весь мокрый. 'Я поймал льва!' объявляет он гордо. Все смеются — даже зебры."
    image: "watering-hole.jpg"
    imageAlt:
      en: "Lion family drinking together at African watering hole at sunset, reflections in still water, zebras and giraffes in distant background, golden light, acacia tree silhouettes"
      es: "Familia de leones bebiendo juntos en un abrevadero africano al atardecer, reflejos en el agua quieta, cebras y jirafas en el fondo distante, luz dorada, siluetas de acacias"
      ru: "Семья львов пьёт вместе у африканского водопоя на закате, отражения в тихой воде, зебры и жирафы на дальнем фоне, золотой свет, силуэты акаций"

  # Night Patrol
  - id: night-patrol
    mood: [epic-skies]
    use_characters: ["${meet-kazi.image}"]
    action: "magnificent male lion with huge dark brown mane patrolling under a vast starry African sky with full moon, walking powerfully through moonlit savanna grass, golden amber eyes glowing softly in moonlight, protective and alert, acacia tree silhouettes against the starry sky, peaceful but powerful nighttime scene"
    title:
      en: "Papa's Night Patrol"
      es: "La Patrulla Nocturna de Papá"
      ru: "Ночной обход Папы"
    content:
      en: "While the family sleeps under the stars, Papa Kazi is on patrol. He walks the edges of their territory, his golden eyes glowing softly in the moonlight. Every few minutes, he lets out a low, rumbling roar — not his big roar, but a gentle one that says: 'I am here. My family is safe.' The sound travels across the dark savanna, and every animal for miles knows — this land belongs to Kazi. Back at the sleeping spot, the cubs stir. 'Is that Papa?' Zuri murmurs sleepily. 'Yes,' Mama whispers. 'Papa is watching over us. Go back to sleep, my love.' And they do, feeling perfectly safe."
      es: "Mientras la familia duerme bajo las estrellas, Papá Kazi está de patrulla. Camina por los bordes de su territorio, sus ojos dorados brillando suavemente a la luz de la luna. Cada pocos minutos, deja escapar un rugido bajo y retumbante — no su gran rugido, sino uno suave que dice: 'Estoy aquí. Mi familia está a salvo.' El sonido viaja por la oscura sabana. De vuelta con los que duermen, los cachorros se mueven. '¿Ese es Papá?' murmura Zuri adormilada. 'Sí,' susurra Mamá. 'Papá nos vigila. Vuelve a dormir, mi amor.'"
      ru: "Пока семья спит под звёздами, Папа Кази на обходе. Он бродит по границам их территории, золотые глаза мягко светятся в лунном свете. Каждые несколько минут он издаёт низкий, раскатистый рык — не свой большой рык, а нежный, который говорит: 'Я здесь. Моя семья в безопасности.' Звук летит по тёмной саванне, и каждое животное на километры знает — эта земля принадлежит Кази. У спящих львят Зури шевелится. 'Это Папа?' бормочет она сонно. 'Да,' шепчет Мама. 'Папа охраняет нас. Спи, моя любовь.'"
    image: "kazi-night-patrol.jpg"

  # Growing Up
  - id: growing-up
    mood: [golden-hour]
    use_characters: ["${meet-cubs.image}", "${meet-dalila.image}"]
    action: "two young lions (no longer tiny cubs but not yet adults) — one male with the beginnings of a small fluffy mane growing in, big paws, lighter golden fur with fading spots; one slightly smaller female with darker golden fur, athletic build. Both in mid-stride walking confidently through golden savanna grass. Their lioness mother with notched ear watches proudly from behind. Warm golden hour light, African savanna with acacia trees"
    title:
      en: "Growing Bigger Every Day!"
      es: "¡Creciendo Más Cada Día!"
      ru: "Растём каждый день!"
    content:
      en: "The days turn to weeks, and the weeks turn to months, and OH how Taji and Zuri have GROWN! Taji's big paws finally match his body, and something exciting is happening — tiny tufts of fur are growing around his neck. 'Is that... a MANE?' he asks Papa, eyes shining. Papa examines it seriously. 'Why, I believe it is! A fine mane is beginning, son. It will grow big and strong like mine.' Zuri has grown sleek and fast like Mama. She can already stalk a grasshopper without making a sound. 'My little huntress,' Mama beams. The cubs aren't so little anymore!"
      es: "Los días se convierten en semanas, y las semanas en meses, ¡y CÓMO han CRECIDO Taji y Zuri! Las grandes patas de Taji por fin van con su cuerpo, y algo emocionante está pasando — pequeños mechones de pelo crecen alrededor de su cuello. '¿Eso es... una MELENA?' pregunta a Papá, ojos brillantes. Papá lo examina seriamente. '¡Pues creo que sí! Una fina melena está empezando, hijo. Crecerá grande y fuerte como la mía.' Zuri se ha vuelto esbelta y rápida como Mamá. Ya puede acechar a un saltamontes sin hacer ruido. 'Mi pequeña cazadora,' Mamá sonríe. ¡Los cachorros ya no son tan pequeños!"
      ru: "Дни превращаются в недели, недели в месяцы, и КАК выросли Таджи и Зури! Большие лапы Таджи наконец подходят к его телу, и происходит кое-что волнующее — крошечные пучки шерсти растут вокруг его шеи. 'Это... ГРИВА?' спрашивает он Папу, глаза сияют. Папа серьёзно осматривает. 'Что ж, похоже! Прекрасная грива начинается, сынок. Она вырастет большой и сильной, как моя.' Зури стала стройной и быстрой, как Мама. Она уже может выследить кузнечика, не издав ни звука. 'Моя маленькая охотница,' сияет Мама. Львята уже не такие маленькие!"
    image: "cubs-growing.jpg"

  # The Pride Together
  - id: pride-together
    mood: [epic-skies, golden-hour, soft-intimate]
    use_characters: ["${meet-kazi.image}", "${meet-dalila.image}", "${meet-cubs.image}"]
    action: "entire lion family sitting together on a large rocky outcrop overlooking the vast African savanna at golden sunset — magnificent male lion with huge dark brown mane in center, sleek golden lioness with notched ear beside him, two young lions (one with small growing mane, one sleek female) in front. All looking out over the savanna together, majestic and peaceful. Dramatic orange and gold sunset sky, sweeping savanna landscape below, acacia trees dotting the horizon"
    title:
      en: "Our Pride, Our Family"
      es: "Nuestra Manada, Nuestra Familia"
      ru: "Наш прайд, наша семья"
    content:
      en: "As the golden sun melts into the African horizon, the family climbs to their favorite rocky hill. Papa Kazi sits tall in the center, his magnificent mane catching the last warm light. Mama Dalila leans against him, her notched ear a badge of honor. Taji sits up straight, trying to look as regal as Papa. Zuri sits close to Mama, eyes full of dreams. Below them, the whole savanna stretches out — golden, endless, and beautiful. 'This is our home,' Papa says, his deep voice full of love. 'And we are a pride — a family. We roar together, hunt together, sleep together, and love together. No matter what comes, we face it as one.' And somewhere across the savanna, a distant lion roars. And Kazi roars back. Always."
      es: "Cuando el sol dorado se derrite en el horizonte africano, la familia sube a su colina rocosa favorita. Papá Kazi se sienta erguido en el centro, su magnífica melena captando la última luz cálida. Mamá Dalila se recarga contra él, su oreja con muesca como insignia de honor. Taji se sienta derecho, intentando verse tan regio como Papá. Zuri se sienta cerca de Mamá, ojos llenos de sueños. Debajo de ellos, toda la sabana se extiende — dorada, infinita y hermosa. 'Este es nuestro hogar,' dice Papá, su voz profunda llena de amor. 'Y somos una manada — una familia. Rugimos juntos, cazamos juntos, dormimos juntos y nos amamos juntos. Sin importar lo que venga, lo enfrentamos como uno.'"
      ru: "Когда золотое солнце тает в африканском горизонте, семья поднимается на свой любимый скалистый холм. Папа Кази сидит прямо в центре, его великолепная грива ловит последний тёплый свет. Мама Далила прижимается к нему, зарубка на ухе — знак чести. Таджи сидит ровно, стараясь выглядеть таким же величественным, как Папа. Зури прижалась к Маме, глаза полны мечтаний. Под ними простирается вся саванна — золотая, бесконечная и прекрасная. 'Это наш дом,' говорит Папа, его глубокий голос полон любви. 'И мы — прайд. Семья. Мы рычим вместе, охотимся вместе, спим вместе и любим вместе. Что бы ни случилось, мы встречаем это вместе.'"
    image: "pride-together.jpg"
    imageAlt:
      en: "Majestic lion family sitting together on rocky outcrop overlooking vast African savanna at golden sunset, father with dark mane in center, mother beside him, two young lions in front, dramatic sky"
      es: "Majestuosa familia de leones sentada junta en un promontorio rocoso sobre la vasta sabana africana al atardecer dorado, padre con melena oscura en el centro, madre a su lado, dos leones jóvenes al frente, cielo dramático"
      ru: "Величественная семья львов сидит вместе на скалистом выступе над бескрайней африканской саванной на золотом закате, отец с тёмной гривой в центре, мать рядом, два молодых льва впереди, драматичное небо"

