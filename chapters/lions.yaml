# Lions Chapter Definition - Kings of the Savanna (Child-Friendly)
meta:
  id: lions
  issueNumber: 13
  date: "February 2026"
  folderName: "lions"
  title:
    en: "Lions: Kings of the Savanna"
    es: "Leones: Reyes de la Sabana"
    ru: "Львы: Короли Саванны"
  subtitle:
    en: "A Family of Roars, Naps, and Mighty Love"
    es: "Una Familia de Rugidos, Siestas y Amor Poderoso"
    ru: "Семья рыков, снов и могучей любви"
  magazineText:
    en: "Meet Kazi the magnificent lion father and his family! Follow cubs Taji and Zuri as they learn to stalk, play-fight, and roar across the golden African savanna. Discover how Mama Dalila hunts for the family, how Papa Kazi protects them all with his mighty roar, and why lions are the only cats that live in families called prides!"
    es: "¡Conoce a Kazi, el magnífico padre león, y a su familia! Sigue a los cachorros Taji y Zuri mientras aprenden a acechar, jugar a pelear y rugir por la dorada sabana africana. ¡Descubre cómo Mamá Dalila caza para la familia, cómo Papá Kazi los protege a todos con su poderoso rugido, y por qué los leones son los únicos felinos que viven en familias llamadas manadas!"
    ru: "Познакомьтесь с Кази, великолепным отцом-львом, и его семьёй! Следуйте за львятами Таджи и Зури, пока они учатся выслеживать добычу, играть в бой и рычать по золотистой африканской саванне. Узнайте, как Мама Далила охотится для семьи, как Папа Кази защищает всех своим могучим рыком, и почему львы — единственные кошки, живущие семьями, называемыми прайдами!"
  magazineCover: "magazine-cover.jpg"
  hasGeneratedContent: true
  footerSubtitle:
    en: "Celebrating the mightiest family on the African savanna"
    es: "Celebrando la familia más poderosa de la sabana africana"
    ru: "Самая могучая семья африканской саванны"
  description: "Follow the lion pride through a day on the African savanna — from Papa Kazi's mighty roar to cubs Taji and Zuri learning to stalk, hunt, and grow up in the warmth of their family"
  preface:
    en:
      - "Welcome to the golden African savanna, where the most magnificent family in the animal kingdom lives — the lions! Lions are the only cats that live together in big families called prides, and every member has an important job to do."
      - "In this adventure, you'll meet Papa Kazi with his enormous dark mane, Mama Dalila the greatest huntress on the plains, and their two playful cubs, Taji and Zuri. Together, they'll show you what it means to be part of a pride — a family that roars together, naps together, and loves together!"
      - "Did you know that lions sleep up to 20 hours a day? Or that a lion's roar can be heard from 5 miles away? Get ready to discover all the amazing secrets of the kings and queens of the savanna!"
    es:
      - "¡Bienvenidos a la dorada sabana africana, donde vive la familia más magnífica del reino animal — los leones! Los leones son los únicos felinos que viven juntos en grandes familias llamadas manadas, y cada miembro tiene un trabajo importante."
      - "En esta aventura conocerás a Papá Kazi con su enorme melena oscura, a Mamá Dalila, la mejor cazadora de las llanuras, y a sus dos juguetones cachorros, Taji y Zuri. ¡Juntos te mostrarán lo que significa ser parte de una manada — una familia que ruge junta, duerme junta y se ama junta!"
      - "¿Sabías que los leones duermen hasta 20 horas al día? ¿O que el rugido de un león se puede escuchar a 8 kilómetros de distancia? ¡Prepárate para descubrir todos los secretos asombrosos de los reyes y reinas de la sabana!"
    ru:
      - "Добро пожаловать в золотистую африканскую саванну, где живёт самая великолепная семья в животном мире — львы! Львы — единственные кошки, которые живут вместе большими семьями, называемыми прайдами, и у каждого члена есть важная роль."
      - "В этом приключении вы познакомитесь с Папой Кази и его огромной тёмной гривой, Мамой Далилой — лучшей охотницей равнин, и их двумя игривыми львятами, Таджи и Зури. Вместе они покажут вам, что значит быть частью прайда — семьи, которая рычит вместе, спит вместе и любит вместе!"
      - "Вы знали, что львы спят до 20 часов в день? Или что рык льва слышен за 8 километров? Приготовьтесь узнать все удивительные секреты королей и королев саванны!"

