funFacts:
  title:
    en: "Amazing Lion Facts!"
    es: "¡Datos Asombrosos sobre Leones!"
    ru: "Удивительные факты о львах!"
  facts:
    - title:
        en: "Champion Sleepers"
        es: "Campeones de la Siesta"
        ru: "Чемпионы по сну"
      content:
        en: "Lions sleep up to 20 hours a day! That makes them one of the sleepiest animals on Earth. They rest so much because hunting takes enormous energy — a single hunt can use up all their strength. So when they're not hunting or eating, lions spend their time dozing in the shade, cuddling with family, and taking the world's longest naps. Even their name in some African languages means 'the lazy one'!"
        es: "¡Los leones duermen hasta 20 horas al día! Eso los convierte en uno de los animales más dormilones de la Tierra. Descansan tanto porque la caza requiere una energía enorme — una sola cacería puede usar toda su fuerza. Así que cuando no están cazando o comiendo, los leones pasan el tiempo dormitando a la sombra, acurrucándose con la familia y tomando las siestas más largas del mundo."
        ru: "Львы спят до 20 часов в день! Это делает их одними из самых сонливых животных на Земле. Они столько отдыхают, потому что охота требует огромной энергии — одна охота может забрать все силы. Поэтому, когда они не охотятся и не едят, львы дремлют в тени, обнимаются с семьёй и устраивают самые длинные в мире тихие часы."
      image: "fun-fact-sleeping.jpg"

    - title:
        en: "The 5-Mile Roar"
        es: "El Rugido de 8 Kilómetros"
        ru: "Рык на 8 километров"
      content:
        en: "A lion's roar is the loudest of any big cat and can be heard from 5 miles (8 kilometers) away! That's like roaring at one end of town and being heard at the other end. Lions roar to communicate with their pride, to warn rivals to stay away, and to find family members in the dark. They have a special bone in their throat called the hyoid bone that lets them produce such incredibly deep, powerful sounds."
        es: "¡El rugido de un león es el más fuerte de todos los grandes felinos y se puede escuchar a 8 kilómetros de distancia! Es como rugir en un extremo del pueblo y ser escuchado en el otro. Los leones rugen para comunicarse con su manada, para advertir a los rivales que se mantengan lejos, y para encontrar a miembros de la familia en la oscuridad. Tienen un hueso especial en la garganta llamado hueso hioides."
        ru: "Рык льва — самый громкий среди всех больших кошек, его слышно за 8 километров! Это как зарычать на одном конце города и быть услышанным на другом. Львы рычат, чтобы общаться со своим прайдом, предупреждать соперников держаться подальше и находить членов семьи в темноте. У них есть особая кость в горле — подъязычная кость, которая позволяет издавать такие невероятно глубокие, мощные звуки."
      image: "fun-fact-roar.jpg"

    - title:
        en: "Girl Power Hunters"
        es: "Cazadoras Poderosas"
        ru: "Охотницы-чемпионки"
      content:
        en: "In a lion pride, the lionesses do most of the hunting! They work together as a team, using clever strategies — some lionesses chase the prey toward others waiting in ambush. Lionesses are faster, lighter, and more agile than male lions, whose big heavy manes would slow them down and make them easy to spot. The males have a different job — they patrol and protect the territory so the family is safe."
        es: "¡En una manada de leones, las leonas hacen la mayor parte de la caza! Trabajan juntas como equipo, usando estrategias inteligentes — algunas leonas persiguen a la presa hacia otras que esperan emboscadas. Las leonas son más rápidas, ligeras y ágiles que los leones machos, cuyas grandes y pesadas melenas los harían más lentos y fáciles de detectar. Los machos tienen un trabajo diferente — patrullan y protegen el territorio."
        ru: "В львином прайде львицы выполняют основную часть охоты! Они работают вместе как команда, используя хитрые стратегии — одни львицы гонят добычу к другим, ждущим в засаде. Львицы быстрее, легче и проворнее львов-самцов, чьи большие тяжёлые гривы замедляли бы их и делали заметными. У самцов другая работа — они патрулируют и защищают территорию, чтобы семья была в безопасности."
      image: "fun-fact-huntress.jpg"

    - title:
        en: "Spots That Disappear"
        es: "Manchas Que Desaparecen"
        ru: "Исчезающие пятнышки"
      content:
        en: "Lion cubs are born with spotted fur! These faint rosette-shaped spots help baby lions hide in the dappled shade of bushes and grass, camouflaging them from predators while they're small and vulnerable. As the cubs grow bigger and stronger, their spots gradually fade away until they have the smooth golden coat of an adult lion. Some lions keep very faint spots on their belly even as adults — look closely next time!"
        es: "¡Los cachorros de león nacen con pelaje manchado! Estas tenues manchas en forma de roseta ayudan a los bebés león a esconderse en la sombra moteada de arbustos y hierba, camuflándolos de depredadores mientras son pequeños y vulnerables. A medida que los cachorros crecen más grandes y fuertes, sus manchas se desvanecen gradualmente hasta tener el suave pelaje dorado de un león adulto. ¡Algunos leones mantienen manchas muy tenues en su vientre incluso de adultos!"
        ru: "Львята рождаются с пятнистой шерстью! Эти бледные пятнышки-розетки помогают маленьким львам прятаться в пятнистой тени кустов и травы, маскируя их от хищников, пока они маленькие и уязвимые. По мере того как львята растут и крепнут, пятна постепенно исчезают, пока не остаётся гладкая золотистая шерсть взрослого льва. Некоторые львы сохраняют очень бледные пятна на животе даже во взрослом возрасте — присмотритесь внимательнее!"
      image: "fun-fact-spots.jpg"

imageGeneration:
  characters:
    kazi:
      name: "Papa Kazi"
      description: "Magnificent male lion father with a huge dark brown mane, golden amber eyes, powerful muscular build, proud protective stance"
      uniqueFeatures:
        - "LARGEST character — visibly bigger and more powerful than all others"
        - "HUGE DARK BROWN MANE — thick, voluminous, frames his entire face like a crown"
        - "GOLDEN AMBER EYES — intense, warm, watchful"
        - "POWERFUL MUSCULAR BUILD — broad chest, thick legs, massive paws"
        - "PROUD PROTECTIVE STANCE — always standing tall, chest out, head held high"
        - "Signature: his mane is so thick and dark it almost looks black at the center"
      personality: "Proud, protective, and regal — stands tall and alert, always watching over his family, but with surprising tenderness"
      notLike: "NOT sleek or slim like Dalila, NOT small like the cubs, the BIGGEST character by far"

    dalila:
      name: "Mama Dalila"
      description: "Sleek golden lioness mother, skilled huntress, athletic muscular build, warm caring eyes, small notch on left ear"
      uniqueFeatures:
        - "SMALLER than Kazi — no mane, sleek and streamlined"
        - "ATHLETIC MUSCULAR BUILD — lean and powerful, built for speed"
        - "WARM CARING EYES — softer expression than Kazi, but intense when hunting"
        - "SMALL NOTCH ON LEFT EAR — her signature mark from a past hunt"
        - "SMOOTH GOLDEN FUR — lighter and more uniform than Kazi's coloring"
        - "Low hunting stance — often shown crouched and ready to spring"
      personality: "Clever, fast, and nurturing — graceful in movement, fierce when protecting cubs, tender with family"
      notLike: "NOT as large or dark as Kazi, NOT spotted like cubs, always identifiable by ear notch"

    taji:
      name: "Taji"
      description: "Male lion cub, curious and playful, lighter golden fur with faint spots still visible, big oversized paws he hasn't grown into yet"
      uniqueFeatures:
        - "LIGHTER GOLDEN FUR with FAINT SPOTS — baby rosettes still visible on coat"
        - "OVERSIZED PAWS — comically big compared to his body, he trips over them"
        - "BIGGER than Zuri — the larger of the two cubs"
        - "Later: tiny tufts of mane beginning to grow around neck"
        - "GOOFY GRIN — always smiling, one side of mouth higher than the other"
        - "Round cub face with oversized ears"
      personality: "Curious, playful, always getting into trouble — pounces on everything, falls over his own paws, eternally cheerful"
      notLike: "NOT as dark as Zuri, NOT as big as parents, identifiable by big paws and lighter color"

    zuri:
      name: "Zuri"
      description: "Female lion cub, brave and bold for her size, slightly smaller than Taji, darker golden fur, always trying to keep up with the adults"
      uniqueFeatures:
        - "DARKER GOLDEN FUR — noticeably darker shade than Taji"
        - "SLIGHTLY SMALLER than Taji — the smaller of the two cubs"
        - "DETERMINED EXPRESSION — eyebrows set, jaw firm, ready for anything"
        - "More ATHLETIC build than Taji even as a cub — takes after Mama"
        - "Later: sleek and fast like Dalila, no mane development"
        - "Often shown trying to match the adults' stride"
      personality: "Brave, bold, determined — always trying to keep up with the grown-ups, serious about learning to hunt"
      notLike: "NOT as light-colored as Taji, NOT as big as Taji, NOT as large as parents"

  style:
    global: "Classic hand-drawn Disney animation style inspired by the Golden Age (Snow White, Bambi). Warm organic flowing lines with natural variation in line weight. Large soulful expressive eyes. Painterly brushstrokes visible in fur, grass, and sky. Soft rounded character proportions for cubs. Vintage animation cel warmth with gentle watercolor-like backgrounds. Golden African savanna setting with warm amber tones, acacia trees, tall grass, dramatic sunsets, and starry nights. Child-friendly and inviting."

viewerDetails:
- title:
    en: "The Mighty Mane"
    es: "La Melena Poderosa"
    ru: "Могучая грива"
  description:
    en: "Look at Papa Kazi's incredible mane! A lion's mane is made of thick, coarse hair that grows around the face, neck, and shoulders. The darker the mane, the healthier and stronger the lion! Kazi's dark brown mane tells everyone he is in his prime. The mane makes him look much bigger than he really is, which scares away rivals. It also protects his neck during fights. No two lion manes are exactly alike — each one is as unique as a fingerprint!"
    es: "¡Mira la increíble melena de Papá Kazi! La melena de un león está hecha de pelo grueso y áspero que crece alrededor de la cara, cuello y hombros. ¡Cuanto más oscura la melena, más sano y fuerte el león! La melena marrón oscura de Kazi le dice a todos que está en su mejor momento. La melena lo hace parecer mucho más grande de lo que realmente es, lo que asusta a los rivales. También protege su cuello durante las peleas."
    ru: "Посмотрите на невероятную гриву Папы Кази! Грива льва состоит из толстых, жёстких волос, растущих вокруг лица, шеи и плеч. Чем темнее грива, тем здоровее и сильнее лев! Тёмно-коричневая грива Кази говорит всем, что он в расцвете сил. Грива делает его намного больше, чем он есть на самом деле, что отпугивает соперников. Она также защищает шею в боях. Нет двух одинаковых грив — каждая уникальна, как отпечаток пальца!"
  image: "detail-mane-closeup.jpg"

- title:
    en: "Retractable Claws"
    es: "Garras Retráctiles"
    ru: "Втягивающиеся когти"
  description:
    en: "Lions have an amazing superpower — retractable claws! When walking, their sharp claws are tucked inside soft, furry paw pads, keeping them quiet and their claws razor-sharp. But when hunting or climbing, the claws pop out like hidden knives! Each claw can be up to 1.5 inches long and curved like a hook. This retractable design means their claws never get dull from walking on hard ground. Lions are one of the few cats that can't fully retract their claws — cheetahs can't at all!"
    es: "¡Los leones tienen un superpoder asombroso — garras retráctiles! Al caminar, sus afiladas garras están guardadas dentro de suaves almohadillas peludas, manteniéndolos silenciosos y sus garras afiladísimas. ¡Pero al cazar o trepar, las garras salen como cuchillos ocultos! Cada garra puede medir hasta 4 centímetros de largo y curvarse como un gancho. Este diseño retráctil significa que sus garras nunca se desgastan al caminar sobre suelo duro."
    ru: "У львов есть удивительная суперспособность — втягивающиеся когти! При ходьбе острые когти спрятаны внутри мягких пушистых подушечек лап, что делает шаги бесшумными и сохраняет когти острыми как бритва. Но во время охоты или лазания когти выскакивают как скрытые ножи! Каждый коготь может достигать 4 сантиметров в длину и изогнут как крючок. Этот убирающийся механизм означает, что когти никогда не тупятся от ходьбы по твёрдой земле."
  image: "detail-retractable-claws.jpg"

- title:
    en: "Whisker Spot ID"
    es: "Identificación por Bigotes"
    ru: "Усы-отпечатки"
  description:
    en: "Did you know that every lion has a unique pattern of whisker spots? The small dark dots on a lion's muzzle where each whisker grows form a pattern that is different for every single lion — just like human fingerprints! Scientists use these whisker spot patterns to identify individual lions in the wild. Next time you see a lion, look closely at the dots on its muzzle — no other lion in the world has the exact same pattern!"
    es: "¿Sabías que cada león tiene un patrón único de puntos de bigotes? Los pequeños puntos oscuros en el hocico de un león donde crece cada bigote forman un patrón diferente para cada león — ¡igual que las huellas dactilares humanas! Los científicos usan estos patrones de puntos de bigotes para identificar leones individuales en la naturaleza. La próxima vez que veas un león, mira de cerca los puntos en su hocico."
    ru: "Вы знали, что у каждого льва уникальный рисунок точек у усов? Маленькие тёмные точки на морде льва, где растёт каждый ус, образуют рисунок, отличающийся у каждого льва — как отпечатки пальцев у людей! Учёные используют эти рисунки точек у усов для идентификации отдельных львов в дикой природе. В следующий раз, когда увидите льва, присмотритесь к точкам на его морде — ни у одного другого льва в мире нет такого же рисунка!"
  image: "detail-whisker-spots.jpg"

- title:
    en: "Sandpaper Tongue"
    es: "Lengua de Lija"
    ru: "Язык-наждачка"
  description:
    en: "A lion's tongue is covered in tiny backward-pointing barbs called papillae, making it rough like sandpaper! These barbs are made of the same material as your fingernails. The rough tongue helps lions scrape every last bit of meat from bones, and it works like a comb for grooming their fur. When Mama Dalila licks her cubs clean, it's like a gentle scrubbing brush! One lick from a lion's tongue could scratch your skin — but to the cubs, it feels like the warmest, most loving bath."
    es: "¡La lengua de un león está cubierta de pequeñas púas apuntando hacia atrás llamadas papilas, haciéndola áspera como papel de lija! Estas púas están hechas del mismo material que tus uñas. La lengua áspera ayuda a los leones a raspar hasta el último pedazo de carne de los huesos, y funciona como un peine para acicalar su pelaje. ¡Cuando Mamá Dalila lame a sus cachorros para limpiarlos, es como un suave cepillo de fregar!"
    ru: "Язык льва покрыт крошечными направленными назад шипами — папиллами, что делает его шершавым как наждачная бумага! Эти шипы сделаны из того же материала, что и ваши ногти. Шершавый язык помогает львам соскребать каждый кусочек мяса с костей и работает как расчёска для ухода за шерстью. Когда Мама Далила вылизывает львят, это как нежная щёточка! Одно облизывание львиным языком может поцарапать кожу — но для львят это самая тёплая и любящая ванна."
  image: "detail-rough-tongue.jpg"

