funFacts:
  title:
    en: "Amazing Ant Facts!"
    es: "Datos Asombrosos sobre Hormigas!"
    ru: "Удивительные факты о муравьях!"
  facts:
    - title:
        en: "Super Strength"
        es: "Super Fuerza"
        ru: "Суперсила"
      content:
        en: "Ants can carry objects 50 times their own body weight! That's like a human picking up a car and carrying it over their head. Their secret is their exoskeleton — a hard outer shell that acts like a suit of armor and gives their muscles incredible leverage. Some species can even carry 100 times their weight when working together!"
        es: "Las hormigas pueden cargar objetos 50 veces su propio peso! Eso es como si un humano levantara un auto y lo cargara sobre su cabeza. Su secreto es su exoesqueleto — una cubierta exterior dura que actua como una armadura y da a sus musculos una palanca increible. Algunas especies pueden incluso cargar 100 veces su peso cuando trabajan juntas!"
        ru: "Муравьи могут нести предметы в 50 раз тяжелее собственного веса! Это как если бы человек поднял автомобиль и нёс его над головой. Их секрет — экзоскелет, твёрдая внешняя оболочка, которая действует как доспехи и даёт их мышцам невероятный рычаг. Некоторые виды могут нести даже в 100 раз больше своего веса, работая вместе!"
      image: "fun-fact-strength.jpg"

    - title:
        en: "Mega Colonies"
        es: "Mega Colonias"
        ru: "Мегаколонии"
      content:
        en: "Some ant colonies can have MILLIONS of members! The largest known ant supercolony stretches over 6,000 kilometers across southern Europe — that's wider than the United States! These massive colonies have multiple queens and billions of workers. A single colony of leafcutter ants can strip a whole tree of its leaves in one night!"
        es: "Algunas colonias de hormigas pueden tener MILLONES de miembros! La supercolonia de hormigas mas grande conocida se extiende por mas de 6,000 kilometros a traves del sur de Europa — eso es mas ancho que los Estados Unidos! Estas colonias masivas tienen multiples reinas y miles de millones de trabajadoras. Una sola colonia de hormigas cortadoras puede despojar un arbol entero de sus hojas en una noche!"
        ru: "Некоторые колонии муравьёв могут насчитывать МИЛЛИОНЫ членов! Самая большая известная суперколония муравьёв простирается на более чем 6 000 километров через южную Европу — это шире, чем США! Эти огромные колонии имеют множество королев и миллиарды рабочих. Одна колония муравьёв-листорезов может обобрать целое дерево за одну ночь!"
      image: "fun-fact-colony-size.jpg"

    - title:
        en: "Scent Language"
        es: "Lenguaje de Olores"
        ru: "Язык запахов"
      content:
        en: "Ants talk to each other using special chemicals called pheromones! They leave scent trails on the ground to say 'food this way,' release alarm scents that mean 'danger!', and even have a special smell that says 'I'm from this colony.' An ant's antennae can detect incredibly tiny amounts of these chemicals — it's like having a super-powered nose on your head!"
        es: "Las hormigas hablan entre si usando quimicos especiales llamados feromonas! Dejan rastros de olor en el suelo para decir 'comida por aqui,' liberan olores de alarma que significan 'peligro!', e incluso tienen un olor especial que dice 'soy de esta colonia.' Las antenas de una hormiga pueden detectar cantidades increiblemente pequenas de estos quimicos — es como tener una super nariz en tu cabeza!"
        ru: "Муравьи разговаривают друг с другом с помощью особых химических веществ — феромонов! Они оставляют пахучие следы на земле, чтобы сказать 'еда тут,' выпускают тревожные запахи, означающие 'опасность!', и даже имеют особый запах, говорящий 'я из этой колонии.' Усики муравья могут обнаружить невероятно малые количества этих веществ — это как иметь суперносик на голове!"
      image: "fun-fact-scent-trails.jpg"

    - title:
        en: "Tiny Farmers"
        es: "Pequenas Granjeras"
        ru: "Крошечные фермеры"
      content:
        en: "Leafcutter ants have been farming fungus for over 50 MILLION years — that's way before humans even existed! They cut leaves, carry them underground, chew them into a paste, and grow a special fungus on top. They even use natural antibiotics to keep their gardens disease-free. They were the world's first farmers, and they're still some of the best!"
        es: "Las hormigas cortadoras de hojas han cultivado hongos por mas de 50 MILLONES de anos — eso es mucho antes de que los humanos existieran! Cortan hojas, las llevan bajo tierra, las mastican hasta hacer una pasta y cultivan un hongo especial encima. Incluso usan antibioticos naturales para mantener sus jardines libres de enfermedades. Fueron las primeras granjeras del mundo, y siguen siendo de las mejores!"
        ru: "Муравьи-листорезы выращивают грибы уже более 50 МИЛЛИОНОВ лет — это задолго до появления людей! Они срезают листья, несут их под землю, пережёвывают в пасту и выращивают на ней особый гриб. Они даже используют природные антибиотики, чтобы защитить свои сады от болезней. Они были первыми фермерами в мире и до сих пор одни из лучших!"
      image: "fun-fact-fungus-farming.jpg"

imageGeneration:
  characters:
    queen-terra:
      name: "Queen Terra"
      description: "The ant queen, largest ant in the colony, deep reddish-brown, wise ancient eyes, sits in the heart of the nest with a slightly iridescent wing remnant on her back"
      uniqueFeatures:
        - "LARGEST ant character — visibly much bigger than all other ants, massive abdomen"
        - "DEEP REDDISH-BROWN coloring — rich, warm wood-toned exoskeleton"
        - "WISE ANCIENT EYES — calm, knowing expression, seen a thousand seasons"
        - "IRIDESCENT WING REMNANT on her back — small shimmering stubs that catch the light like tiny rainbows, the mark of a founding queen"
        - "Regal posture — sits upright and still, surrounded by attendant workers"
        - "Largest head with smooth, polished-looking exoskeleton"
      personality: "Wise, warm, and regal — sits calmly and speaks with quiet authority, maternal and commanding"
      notLike: "NOT small or lean like Scout, NOT dark like Tiny, NOT aggressive-looking like Major"

    scout:
      name: "Scout"
      description: "Explorer ant, lean and fast, lighter brown color, antennae always pointing forward alertly, one antenna slightly bent from an adventure"
      uniqueFeatures:
        - "LEAN and FAST build — longest legs proportionally, streamlined body"
        - "LIGHTER BROWN coloring — sandier, paler than Queen Terra's deep reddish-brown"
        - "ANTENNAE pointing FORWARD alertly — always sensing, always searching"
        - "ONE ANTENNA SLIGHTLY BENT — the left antenna has a noticeable crook from her first adventure, her signature feature"
        - "Front legs often raised — poised to run, ready for action"
        - "Alert, wide-eyed expression — always looking into the distance"
      personality: "Brave and curious — constantly exploring, front legs raised, leaning forward into the unknown"
      notLike: "NOT large like Queen Terra, NOT dark or small like Tiny, NOT bulky like Major"

    tiny:
      name: "Tiny"
      description: "Young worker ant, smallest of the group, darker color, eager to help but clumsy, always carries leaves twice her size"
      uniqueFeatures:
        - "SMALLEST ant character — noticeably smaller than all others, baby proportions"
        - "DARKER coloring — darker brown-black than the others, distinct from Scout's light brown"
        - "Always carrying something TOO BIG — signature look is struggling under an oversized leaf"
        - "ROUND, oversized head relative to body — baby-like proportions"
        - "Legs slightly splayed for balance — always wobbling, endearingly clumsy"
        - "Determined expression despite struggling — never gives up"
      personality: "Eager, determined, and adorably clumsy — always trying too hard, never giving up, heart of gold"
      notLike: "NOT lean like Scout, NOT large like Queen Terra, NOT intimidating like Major"

    major:
      name: "Major"
      description: "Soldier ant, biggest worker with oversized mandibles, dark reddish-black, stands guard at tunnel entrances, intimidating but gentle with colony-mates"
      uniqueFeatures:
        - "BIGGEST WORKER ant — second only to Queen Terra in size, but stockier and more muscular"
        - "MASSIVE HEAD with OVERSIZED MANDIBLES — enormous jaws that dominate his face"
        - "DARK REDDISH-BLACK coloring — darker and more intense than Queen Terra's warm brown"
        - "WIDE, planted stance — legs spread, blocking tunnel entrances, immovable"
        - "Gentle eyes that contrast with intimidating jaws — soft expression despite fearsome appearance"
        - "Thicker exoskeleton with visible armor-like plates on head"
      personality: "Powerful and protective but gentle — stands like an immovable guardian, speaks softly to colony-mates"
      notLike: "NOT lean like Scout, NOT small like Tiny, NOT regal like Queen Terra"

  style:
    global: "Classic hand-drawn Disney animation style inspired by the Golden Age (Snow White, Bambi). Warm organic flowing lines with natural variation in line weight. Large soulful expressive eyes. Painterly brushstrokes visible in earth, leaves, and tunnel walls. Soft rounded character proportions. Vintage animation cel warmth with gentle watercolor-like backgrounds. Lush meadow and underground settings with rich browns, golden light, green grass, and wildflowers. Child-friendly and inviting."

viewerDetails:
- title:
    en: "Mandible Power"
    es: "Poder de las Mandibulas"
    ru: "Сила челюстей"
  description:
    en: "Look at Major's massive mandibles — those are his jaws! Ant mandibles are like a Swiss Army knife: they can cut leaves, dig tunnels, carry food, feed baby ants, and fight off enemies. Major's mandibles are especially large because he's a soldier ant. The inside edges are serrated like a tiny saw blade, perfect for gripping and cutting. Some ants can even snap their mandibles shut faster than almost any movement in the animal kingdom!"
    es: "Mira las mandibulas masivas de Mayor — esas son sus quijadas! Las mandibulas de las hormigas son como una navaja suiza: pueden cortar hojas, cavar tuneles, cargar comida, alimentar bebes y luchar contra enemigos. Las mandibulas de Mayor son especialmente grandes porque es un soldado. Los bordes interiores estan serrados como una pequena sierra, perfectos para agarrar y cortar."
    ru: "Посмотрите на массивные мандибулы Майора — это его челюсти! Челюсти муравья как швейцарский нож: ими можно резать листья, копать тоннели, переносить еду, кормить малышей и отбиваться от врагов. Челюсти Майора особенно большие, потому что он муравей-солдат. Внутренние края зазубрены как крошечная пила, идеальны для захвата и резки."
  image: "detail-mandible-closeup.jpg"

- title:
    en: "Amazing Antennae"
    es: "Antenas Asombrosas"
    ru: "Удивительные усики"
  description:
    en: "Scout's antennae are her most important tools! Each antenna has a special elbow joint in the middle that lets it bend and reach in all directions. The tip is covered in thousands of tiny scent receptors that can detect chemical signals in the air. Ants use their antennae to smell, taste, touch, and even measure things! When two ants meet, they touch antennae to share information — it's like a secret handshake that tells them everything about each other."
    es: "Las antenas de Exploradora son sus herramientas mas importantes! Cada antena tiene una articulacion especial en el medio que le permite doblarse y alcanzar en todas direcciones. La punta esta cubierta de miles de receptores de olor que pueden detectar senales quimicas en el aire. Las hormigas usan sus antenas para oler, saborear, tocar e incluso medir cosas!"
    ru: "Усики Разведчицы — её важнейшие инструменты! На каждом усике есть особый локтевой сустав посередине, позволяющий сгибаться и дотягиваться во всех направлениях. Кончик покрыт тысячами крошечных рецепторов запаха, способных улавливать химические сигналы в воздухе. Муравьи используют усики, чтобы нюхать, пробовать на вкус, осязать и даже измерять! Когда два муравья встречаются, они касаются усиками — это как тайное рукопожатие."
  image: "detail-antenna-closeup.jpg"

- title:
    en: "Armor Exoskeleton"
    es: "Exoesqueleto Armadura"
    ru: "Экзоскелет-броня"
  description:
    en: "Queen Terra's body is covered in an exoskeleton — a hard outer shell made of a material called chitin (say 'KY-tin'). It's like wearing a suit of armor on the outside instead of having bones on the inside! The exoskeleton is divided into plates connected by flexible joints, so ants can still move freely. It protects them from damage and keeps water inside their bodies. As ants grow, they shed their exoskeleton and grow a bigger one — like getting a new suit of armor!"
    es: "El cuerpo de la Reina Terra esta cubierto por un exoesqueleto — una cubierta exterior dura hecha de un material llamado quitina. Es como llevar una armadura por fuera en lugar de tener huesos por dentro! El exoesqueleto esta dividido en placas conectadas por articulaciones flexibles, para que las hormigas puedan moverse libremente. Las protege del dano y mantiene el agua dentro de sus cuerpos."
    ru: "Тело Королевы Терры покрыто экзоскелетом — твёрдой внешней оболочкой из материала хитин. Это как носить доспехи снаружи вместо костей внутри! Экзоскелет разделён на пластины, соединённые гибкими суставами, чтобы муравьи могли свободно двигаться. Он защищает их от повреждений и удерживает воду внутри тела. По мере роста муравьи сбрасывают экзоскелет и выращивают новый — как получить новые доспехи!"
  image: "detail-exoskeleton-texture.jpg"

- title:
    en: "Grip and Climb"
    es: "Agarre y Escalada"
    ru: "Хватка и лазание"
  description:
    en: "How does Tiny walk up walls and even upside down on ceilings? Each ant foot has two tiny hooks called tarsal claws, plus a sticky pad between them called an arolium. The claws grip rough surfaces like bark and soil, while the sticky pad works on smooth surfaces like leaves and glass. This dual system means ants can walk on almost ANYTHING — vertical walls, upside down, even on water surface tension! That's why you see ants climbing everywhere without ever falling."
    es: "Como camina Diminuta por las paredes e incluso boca abajo en los techos? Cada pata de hormiga tiene dos ganchos llamados garras tarsales, mas una almohadilla pegajosa entre ellas llamada arolio. Las garras agarran superficies rugosas como corteza y tierra, mientras la almohadilla pegajosa funciona en superficies lisas como hojas y vidrio. Este sistema doble significa que las hormigas pueden caminar en casi CUALQUIER COSA!"
    ru: "Как Крошка ходит по стенам и даже вверх ногами по потолкам? На каждой лапке муравья есть два крошечных крючка — тарзальные коготки, плюс липкая подушечка между ними — аролиум. Коготки цепляются за шероховатые поверхности вроде коры и почвы, а липкая подушечка работает на гладких поверхностях вроде листьев и стекла. Эта двойная система означает, что муравьи могут ходить почти по ЧЕМУ УГОДНО — по вертикальным стенам, вверх ногами, даже по поверхности воды!"
  image: "detail-leg-grip.jpg"

