# Ants Chapter Definition - The Tiny Builders
meta:
  id: ants
  issueNumber: 15
  date: "February 2026"
  folderName: "ants"
  title:
    en: "Ants: The Tiny Builders"
    es: "Hormigas: Las Pequenas Constructoras"
    ru: "Муравьи: Маленькие Строители"
  subtitle:
    en: "A World of Teamwork Under Our Feet"
    es: "Un Mundo de Trabajo en Equipo Bajo Nuestros Pies"
    ru: "Мир командной работы у нас под ногами"
  magazineText:
    en: "Discover the incredible underground world of ants! Meet Queen Terra, brave Scout, little Tiny, and mighty Major as they work together to build a colony more amazing than any human city. Every ant has a job, and together they can do anything!"
    es: "Descubre el increible mundo subterraneo de las hormigas! Conoce a la Reina Terra, la valiente Exploradora, la pequena Diminuta y el poderoso Mayor mientras trabajan juntos para construir una colonia mas asombrosa que cualquier ciudad humana. Cada hormiga tiene un trabajo, y juntas pueden hacer cualquier cosa!"
    ru: "Откройте невероятный подземный мир муравьёв! Познакомьтесь с Королевой Террой, храброй Разведчицей, маленькой Крошкой и могучим Майором - они работают вместе, чтобы построить колонию удивительнее любого человеческого города. У каждого муравья есть работа, и вместе они могут всё!"
  magazineCover: "magazine-cover.jpg"
  hasGeneratedContent: true
  footerSubtitle:
    en: "Celebrating the power of teamwork in nature's tiniest builders"
    es: "Celebrando el poder del trabajo en equipo en las constructoras mas pequenas de la naturaleza"
    ru: "Восхваляя силу командной работы самых маленьких строителей природы"
  description: "Follow Queen Terra, Scout, Tiny, and Major as they build and protect their incredible underground ant colony through the power of teamwork"
  preface:
    en:
      - "Welcome to a world hidden right beneath your feet! Under every garden, every sidewalk, and every forest floor, millions of ants are building incredible underground cities. These tiny creatures are some of the strongest, smartest, and most organized animals on Earth."
      - "In this adventure, you'll meet Queen Terra and her amazing colony. You'll discover how ants talk to each other with special scents, build tunnels deeper than a house is tall, and carry objects fifty times their own weight. That's like you carrying a car over your head!"
      - "Every ant in the colony has an important job, and when they all work together, they can do things that seem impossible. Get ready to shrink down and explore the most incredible tiny world you've ever seen!"
    es:
      - "Bienvenidos a un mundo escondido justo bajo sus pies! Debajo de cada jardin, cada acera y cada suelo del bosque, millones de hormigas estan construyendo increibles ciudades subterraneas. Estas diminutas criaturas son algunos de los animales mas fuertes, inteligentes y organizados de la Tierra."
      - "En esta aventura, conoceran a la Reina Terra y su asombrosa colonia. Descubriran como las hormigas hablan entre si con olores especiales, construyen tuneles mas profundos que una casa y cargan objetos cincuenta veces su propio peso. Eso es como si tu cargaras un auto sobre tu cabeza!"
      - "Cada hormiga en la colonia tiene un trabajo importante, y cuando todas trabajan juntas, pueden hacer cosas que parecen imposibles. Preparense para encogerse y explorar el mundo diminuto mas increible que hayan visto!"
    ru:
      - "Добро пожаловать в мир, спрятанный прямо у вас под ногами! Под каждым садом, каждым тротуаром и каждым лесным покровом миллионы муравьёв строят невероятные подземные города. Эти крошечные существа - одни из самых сильных, умных и организованных животных на Земле."
      - "В этом приключении вы познакомитесь с Королевой Террой и её удивительной колонией. Вы узнаете, как муравьи разговаривают друг с другом с помощью особых запахов, строят тоннели глубже, чем высота дома, и переносят предметы в пятьдесят раз тяжелее себя. Это как если бы вы несли машину над головой!"
      - "У каждого муравья в колонии есть важная работа, и когда все работают вместе, они могут делать то, что кажется невозможным. Приготовьтесь уменьшиться и исследовать самый невероятный крошечный мир!"

