# Penguins Chapter Definition - Kaia's Warm Winter
meta:
  id: penguins
  issueNumber: 9
  date: "February 2026"
  folderName: "penguins"
  title:
    en: "Penguins: The Warmest Family on Ice"
    es: "Pingüinos: La Familia Más Cálida del Hielo"
    ru: "Пингвины: Самая тёплая семья на льду"
  subtitle:
    en: "Kaia's Cozy Winter Adventure"
    es: "La Acogedora Aventura Invernal de Kaia"
    ru: "Уютное зимнее приключение Кайи"
  magazineText:
    en: "Meet Kaia, a fluffy emperor penguin chick who discovers that even in the coldest place on Earth, love keeps you warm! Watch her hatch from Papa's cozy pouch, reunite with Mama, make friends, and take her very first swim in the sparkling Antarctic ocean."
    es: "¡Conoce a Kaia, una esponjosa cría de pingüino emperador que descubre que incluso en el lugar más frío de la Tierra, el amor te mantiene caliente! Mírala salir del acogedor bolsillo de Papá, reunirse con Mamá, hacer amigos y dar su primer baño en el brillante océano antártico."
    ru: "Познакомьтесь с Кайей, пушистым птенцом императорского пингвина, который открывает, что даже в самом холодном месте на Земле любовь согревает! Смотрите, как она вылупляется из уютного мешочка Папы, воссоединяется с Мамой, заводит друзей и впервые плавает в сверкающем антарктическом океане."
  magazineCover: "magazine-cover.jpg"
  hasGeneratedContent: true
  footerSubtitle:
    en: "Celebrating the most devoted parents in the animal kingdom"
    es: "Celebrando a los padres más dedicados del reino animal"
    ru: "Celebrating самых преданных родителей в животном мире"
  description: "Follow Kaia the emperor penguin chick through her first months, from hatching in Papa's warm pouch to her first swim with the whole family"
  preface:
    en:
      - "Welcome to the sparkling world of Antarctica, where emperor penguins prove that love is the warmest thing of all! In this adventure, we'll follow Kaia, an adorable fluffy chick, as she discovers the wonders of her icy home with her devoted Mama and Papa."
      - "Emperor penguins are the most amazing parents in nature. Papa keeps the egg warm on his feet for months, tucked under a special pouch, while Mama goes fishing to bring back the best food. When the chick hatches, both parents take turns caring for their baby — a true team!"
      - "Through Kaia's first months, you'll discover how penguins huddle together for warmth, toboggan on their bellies for fun, sing to find each other in a crowd of thousands, and take the most exciting first swim imaginable. Get ready for a cozy adventure!"
    es:
      - "¡Bienvenidos al brillante mundo de la Antártida, donde los pingüinos emperador demuestran que el amor es lo más cálido de todo! En esta aventura, seguiremos a Kaia, una adorable cría esponjosa, mientras descubre las maravillas de su hogar helado con su devoto Mamá y Papá."
      - "Los pingüinos emperador son los padres más increíbles de la naturaleza. Papá mantiene el huevo caliente sobre sus patas durante meses, guardado bajo un bolsillo especial, mientras Mamá va a pescar para traer la mejor comida. Cuando la cría nace, ambos padres se turnan para cuidar a su bebé — ¡un verdadero equipo!"
      - "A través de los primeros meses de Kaia, descubrirás cómo los pingüinos se acurrucan juntos para calentarse, se deslizan sobre sus barrigas por diversión, cantan para encontrarse entre miles, y dan el primer baño más emocionante imaginable. ¡Prepárate para una aventura acogedora!"
    ru:
      - "Добро пожаловать в сверкающий мир Антарктиды, где императорские пингвины доказывают, что любовь — самое тёплое на свете! В этом приключении мы последуем за Кайей, очаровательным пушистым птенцом, пока она открывает чудеса своего ледяного дома вместе с преданными Мамой и Папой."
      - "Императорские пингвины — самые удивительные родители в природе. Папа хранит яйцо в тепле на своих лапах месяцами, спрятанное под особой складкой, пока Мама отправляется за рыбой, чтобы принести лучшую еду. Когда птенец вылупляется, оба родителя по очереди заботятся о малыше — настоящая команда!"
      - "Через первые месяцы Кайи вы узнаете, как пингвины жмутся друг к другу ради тепла, катаются на животиках ради веселья, поют, чтобы найти друг друга среди тысяч, и совершают самый захватывающий первый заплыв. Готовьтесь к уютному приключению!"

hero:
  title:
    en: "Penguins"
    es: "Pingüinos"
    ru: "Пингвины"
  subtitle:
    en: "The Warmest Family on Ice"
    es: "La Familia Más Cálida del Hielo"
    ru: "Самая тёплая семья на льду"
  image: "hero-antarctica-dawn.jpg"
  imageType: "landscape"
  imageAlt:
    en: "Breathtaking Antarctic landscape at dawn with soft pink and purple sky, sparkling ice and snow, a colony of emperor penguins gathered peacefully on the ice, gentle golden light on the horizon"
    es: "Impresionante paisaje antártico al amanecer con cielo rosa y púrpura suave, hielo y nieve brillantes, una colonia de pingüinos emperador reunidos pacíficamente sobre el hielo, suave luz dorada en el horizonte"
    ru: "Захватывающий антарктический пейзаж на рассвете с нежным розово-фиолетовым небом, сверкающим льдом и снегом, колония императорских пингвинов мирно собравшихся на льду, мягкий золотистый свет на горизонте"

sections:
  # Meet Papa Frost
  - id: meet-papa
    generate_character: true
    mood: [soft-intimate, translucency]
    title:
      en: "Meet Papa Frost"
      es: "Conoce a Papá Frost"
      ru: "Знакомьтесь: Папа Фрост"
    content:
      en: "Papa Frost is the proudest penguin in all of Antarctica! He is tall and handsome, with a sleek black-and-white tuxedo and a beautiful golden-orange patch on his chest that glows like sunshine. Right now, Papa has the most important job in the world — he is keeping a very special egg warm on top of his feet, tucked snugly under his belly pouch. 'Don't worry, little one,' he whispers to the egg. 'I'll keep you warm until Mama comes home.'"
      es: "¡Papá Frost es el pingüino más orgulloso de toda la Antártida! Es alto y apuesto, con un elegante esmoquin blanco y negro y un hermoso parche dorado-anaranjado en el pecho que brilla como el sol. Ahora mismo, Papá tiene el trabajo más importante del mundo — está manteniendo un huevo muy especial caliente sobre sus patas, acurrucado bajo el bolsillo de su barriga. 'No te preocupes, pequeño,' le susurra al huevo. 'Te mantendré caliente hasta que Mamá vuelva a casa.'"
      ru: "Папа Фрост — самый гордый пингвин во всей Антарктиде! Он высокий и красивый, в элегантном чёрно-белом фраке с прекрасным золотисто-оранжевым пятном на груди, которое светится как солнышко. Сейчас у Папы самая важная работа в мире — он согревает очень особенное яйцо на своих лапах, уютно спрятанное под складкой на животе. 'Не волнуйся, малышка,' шепчет он яйцу. 'Я буду греть тебя, пока Мама не вернётся домой.'"
    image: "papa-frost-portrait.jpg"
    imageAlt:
      en: "Proud tall emperor penguin father with golden-orange chest patch, standing on ice with an egg balanced on his feet, warm gentle expression, soft Antarctic light"
      es: "Orgulloso y alto pingüino emperador padre con parche dorado-anaranjado en el pecho, de pie sobre el hielo con un huevo equilibrado en sus patas, expresión cálida y gentil, suave luz antártica"
      ru: "Гордый высокий отец-пингвин с золотисто-оранжевым пятном на груди, стоящий на льду с яйцом на лапах, тёплое нежное выражение, мягкий антарктический свет"

  # The Great Huddle
  - id: the-great-huddle
    mood: [soft-intimate, translucency]
    use_character: "${meet-papa.image}"
    action: "hundreds of emperor penguins huddled tightly together on Antarctic ice for warmth, all facing inward, steam rising from the group, one penguin with a golden chest patch visible in the huddle with an egg on his feet, soft blue-pink twilight sky, snowflakes gently falling, cozy and warm feeling despite the cold setting"
    title:
      en: "The Cozy Huddle"
      es: "El Acogedor Grupo"
      ru: "Уютное сплочение"
    content:
      en: "When the wind blows cold, the penguin papas have a brilliant idea — they huddle together! Hundreds of penguins press close, sharing their warmth like one enormous feathery blanket. They take turns — the ones on the outside slowly shuffle to the warm center, and the warm ones move out to take their turn. 'We take care of each other,' Papa tells the egg. 'That's what families do.' Together, they are warmer than any house!"
      es: "Cuando el viento sopla frío, los papás pingüinos tienen una idea brillante — ¡se acurrucan juntos! Cientos de pingüinos se aprietan, compartiendo su calor como una enorme manta de plumas. Se turnan — los de afuera se mueven lentamente al centro cálido, y los calientes salen a tomar su turno. '¡Nos cuidamos unos a otros,' le dice Papá al huevo. 'Eso hacen las familias.' ¡Juntos son más cálidos que cualquier casa!"
      ru: "Когда ветер дует холодный, папы-пингвины придумывают блестящую идею — они жмутся друг к другу! Сотни пингвинов прижимаются, делясь теплом как одно огромное пуховое одеяло. Они чередуются — те, кто снаружи, медленно перемещаются в тёплый центр, а согретые выходят наружу. 'Мы заботимся друг о друге,' говорит Папа яйцу. 'Вот что делают семьи.' Вместе они теплее любого дома!"
    image: "great-huddle.jpg"

  # Mama Returns
  - id: mama-returns
    generate_character: true
    mood: [golden-hour, epic-skies]
    use_character: "${meet-papa.image}"
    action: "female emperor penguin walking gracefully across sparkly ice toward a group of penguins, carrying fish in her beak, warm golden light behind her, she looks excited and happy, the ice sparkles like diamonds, joyful reunion scene"
    title:
      en: "Mama Pearl Comes Home!"
      es: "¡Mamá Pearl Vuelve a Casa!"
      ru: "Мама Перл возвращается домой!"
    content:
      en: "One beautiful morning, a familiar call rings across the ice — 'I'm HOME!' It's Mama Pearl! She's been on the most amazing fishing trip, diving deep into the sparkling ocean to bring back the very best food for her family. Mama is sleek and beautiful, with a soft silver-white chest and the gentlest eyes. She and Papa sing their special song to find each other among thousands of penguins. When they meet, they bow to each other and tap beaks — a penguin kiss!"
      es: "Una hermosa mañana, un llamado familiar resuena por el hielo — '¡Estoy en CASA!' ¡Es Mamá Pearl! Ha estado en el viaje de pesca más increíble, buceando profundamente en el océano brillante para traer la mejor comida para su familia. Mamá es elegante y hermosa, con un pecho blanco-plateado suave y los ojos más dulces. Ella y Papá cantan su canción especial para encontrarse entre miles de pingüinos. Cuando se encuentran, se inclinan uno al otro y chocan picos — ¡un beso de pingüino!"
      ru: "Одним прекрасным утром знакомый зов раздаётся надо льдом — 'Я ДОМА!' Это Мама Перл! Она была в самом удивительном рыболовном путешествии, ныряя глубоко в сверкающий океан, чтобы принести лучшую еду для семьи. Мама изящная и красивая, с мягкой серебристо-белой грудкой и самыми нежными глазами. Она и Папа поют свою особенную песню, чтобы найти друг друга среди тысяч пингвинов. Когда они встречаются, они кланяются и касаются клювами — пингвиний поцелуй!"
    image: "mama-pearl-portrait.jpg"
    imageAlt:
      en: "Beautiful female emperor penguin with soft silver-white chest and gentle eyes, standing on sparkling ice, warm and loving expression"
      es: "Hermosa pingüino emperador hembra con pecho blanco-plateado suave y ojos dulces, de pie sobre hielo brillante, expresión cálida y amorosa"
      ru: "Красивая самка императорского пингвина с мягкой серебристо-белой грудкой и нежными глазами, стоящая на сверкающем льду, тёплое и любящее выражение"

  # Kaia Hatches
  - id: kaia-hatches
    mood: [soft-intimate, translucency]
    generate_character: true
    use_characters: ["${meet-papa.image}", "${mama-returns.image}"]
    action: "adorable tiny fluffy grey penguin chick peeking out from father penguin's belly pouch for the first time, mother penguin leaning in to see, both parents looking down with overwhelming love, cracked eggshell visible, warm golden light, the chick has huge curious dark eyes and fluffy silver-grey down"
    title:
      en: "Welcome, Little Kaia!"
      es: "¡Bienvenida, Pequeña Kaia!"
      ru: "Добро пожаловать, маленькая Кайя!"
    content:
      en: "CRACK! A tiny sound comes from the egg. CRACK-CRACK! Papa and Mama watch breathlessly. And then — a little grey head pops out! 'Hello, world!' Baby Kaia blinks her enormous dark eyes and sees her parents for the very first time. She is the fluffiest, most adorable ball of silver-grey down ever born. Papa's eyes fill with happy tears. Mama nuzzles Kaia's tiny head with her beak. 'You're here,' they both whisper. 'Our beautiful baby is here.'"
      es: "¡CRAC! Un sonido diminuto sale del huevo. ¡CRAC-CRAC! Papá y Mamá observan sin respirar. Y entonces — ¡una cabecita gris asoma! '¡Hola, mundo!' La bebé Kaia parpadea con sus enormes ojos oscuros y ve a sus padres por primera vez. Es la bolita de plumón gris-plateado más esponjosa y adorable jamás nacida. Los ojos de Papá se llenan de lágrimas felices. Mamá acaricia la cabecita de Kaia con su pico. 'Estás aquí,' susurran ambos. 'Nuestra hermosa bebé está aquí.'"
      ru: "КРАК! Крошечный звук раздаётся из яйца. КРАК-КРАК! Папа и Мама смотрят затаив дыхание. И тогда — маленькая серая головка появляется! 'Привет, мир!' Малышка Кайя моргает своими огромными тёмными глазами и видит родителей в самый первый раз. Она — самый пушистый, самый очаровательный комочек серебристо-серого пуха, когда-либо рождённый. Глаза Папы наполняются счастливыми слезами. Мама нежно касается клювом крошечной головки Кайи. 'Ты здесь,' шепчут оба. 'Наша прекрасная малышка здесь.'"
    image: "kaia-hatches.jpg"

  # Papa's Warm Pouch
  - id: papas-pouch
    mood: [soft-intimate, translucency]
    use_characters: ["${kaia-hatches.image}", "${meet-papa.image}"]
    action: "tiny fluffy grey penguin chick sitting snugly on father penguin's feet, tucked under his warm belly pouch, only the chick's face peeking out, both looking content and cozy, soft warm light, ice crystals sparkling around them"
    title:
      en: "Papa's Warm Pouch"
      es: "El Bolsillo Cálido de Papá"
      ru: "Тёплый мешочек Папы"
    content:
      en: "Kaia's favorite place in the whole world is Papa's pouch! She sits on his big warm feet, tucked under his soft belly feathers, and peeks out at the sparkling ice world. It's like the coziest sleeping bag ever invented. 'Papa, why is everything so sparkly?' she asks. 'Because you're seeing it for the first time,' Papa smiles. 'Everything is magical when you're brand new.' Kaia wiggles deeper into the pouch and yawns. Being brand new is wonderful."
      es: "¡El lugar favorito de Kaia en todo el mundo es el bolsillo de Papá! Se sienta sobre sus grandes patas calientes, acurrucada bajo las suaves plumas de su barriga, y se asoma al brillante mundo de hielo. Es como el saco de dormir más acogedor jamás inventado. '¡Papá, por qué todo es tan brillante?' pregunta. 'Porque lo estás viendo por primera vez,' sonríe Papá. 'Todo es mágico cuando eres nueva.' Kaia se acurruca más en el bolsillo y bosteza."
      ru: "Любимое место Кайи во всём мире — мешочек Папы! Она сидит на его больших тёплых лапах, укутанная под мягкими перьями на животе, и выглядывает на сверкающий ледяной мир. Это как самый уютный спальный мешок, когда-либо изобретённый. 'Папа, почему всё такое блестящее?' спрашивает она. 'Потому что ты видишь это впервые,' улыбается Папа. 'Всё волшебно, когда ты совсем новенькая.' Кайя забирается глубже в мешочек и зевает."
    image: "papas-pouch.jpg"

  # First Feeding
  - id: first-feeding
    use_characters: ["${kaia-hatches.image}", "${mama-returns.image}"]
    action: "mother emperor penguin gently feeding a tiny fluffy grey chick beak-to-beak, the chick is standing on the mother's feet looking up eagerly, warm tender moment, soft golden Antarctic light, other penguin families visible in the gentle background"
    title:
      en: "Mama's Special Breakfast"
      es: "El Desayuno Especial de Mamá"
      ru: "Особый завтрак Мамы"
    content:
      en: "Time for Kaia's very first meal! Mama Pearl leans down and feeds Kaia beak-to-beak — the most delicious fish soup a baby penguin could dream of. 'Mama brought this all the way from the ocean, just for you,' Papa explains proudly. Kaia gobbles it up and chirps for more. Mama laughs her soft penguin laugh. 'You eat just like your Papa!' From now on, Mama and Papa will take turns — one fishing in the ocean, one keeping Kaia warm and fed. The best team ever!"
      es: "¡Hora de la primera comida de Kaia! Mamá Pearl se inclina y alimenta a Kaia pico a pico — la sopa de pescado más deliciosa que un bebé pingüino podría soñar. 'Mamá trajo esto desde el océano, solo para ti,' explica Papá con orgullo. Kaia lo devora y pía pidiendo más. Mamá ríe su suave risa de pingüino. '¡Comes igual que tu Papá!' De ahora en adelante, Mamá y Papá se turnarán — uno pescando en el océano, otro manteniendo a Kaia caliente y alimentada."
      ru: "Время первой еды Кайи! Мама Перл наклоняется и кормит Кайю клюв к клюву — самый вкусный рыбный суп, о котором мог мечтать птенец пингвина. 'Мама принесла это из самого океана, только для тебя,' гордо объясняет Папа. Кайя жадно съедает и пищит, прося ещё. Мама смеётся своим мягким пингвиньим смехом. 'Ты ешь прямо как Папа!' Отныне Мама и Папа будут чередоваться — один ловит рыбу в океане, другой согревает и кормит Кайю."
    image: "first-feeding.jpg"

  # Meet Pip
  - id: meet-pip
    generate_character: true
    use_character: "${kaia-hatches.image}"
    action: "two fluffy grey emperor penguin chicks standing face to face on ice, one slightly bigger and rounder than the other, both with huge curious dark eyes, playful poses, one has a tiny tuft of extra fluff sticking up on its head, sparkling ice around them, joyful meeting"
    title:
      en: "Meet Pip, the Brave Explorer"
      es: "Conoce a Pip, el Explorador Valiente"
      ru: "Знакомьтесь: Пип, храбрый исследователь"
    content:
      en: "In the penguin nursery — called a crèche — Kaia meets Pip! Pip is a bit older and rounder, with a funny little tuft of fluff that sticks straight up on his head. 'Want to see something AMAZING?' Pip whispers. He waddles to the edge of a tiny ice hill and slides down on his belly — WHEEE! 'That's called tobogganing,' he announces proudly. 'I invented it!' (He didn't, but Kaia is very impressed.) They become the very best of friends."
      es: "¡En la guardería de pingüinos — llamada crèche — Kaia conoce a Pip! Pip es un poco mayor y más redondo, con un gracioso mechoncito de plumón que se levanta recto sobre su cabeza. '¿Quieres ver algo INCREÍBLE?' susurra Pip. Se balancea hasta el borde de una pequeña colina de hielo y se desliza sobre su barriga — ¡WIIII! 'Eso se llama trineo,' anuncia orgulloso. '¡Yo lo inventé!' (No lo hizo, pero Kaia está muy impresionada.) Se convierten en los mejores amigos."
      ru: "В пингвиньем детском саду — он называется ясли — Кайя встречает Пипа! Пип немного старше и круглее, с забавным хохолком пуха, торчащим прямо вверх на голове. 'Хочешь увидеть что-то ПОТРЯСАЮЩЕЕ?' шепчет Пип. Он переваливается к краю маленькой ледяной горки и скатывается на животе — УИИИ! 'Это называется тобогган,' гордо объявляет он. 'Я это придумал!' (Нет, не придумал, но Кайя очень впечатлена.) Они становятся лучшими друзьями."
    image: "pip-portrait.jpg"
    imageAlt:
      en: "Adorable fluffy grey emperor penguin chick, slightly round, with a funny tuft of fluff on top of its head, playful expression, standing on sparkling ice"
      es: "Adorable cría de pingüino emperador gris esponjosa, un poco redonda, con un gracioso mechón de plumón en la cabeza, expresión juguetona, de pie sobre hielo brillante"
      ru: "Очаровательный пушистый серый птенец императорского пингвина, немного круглый, с забавным хохолком пуха на голове, игривое выражение, стоящий на сверкающем льду"

  # Tobogganing
  - id: tobogganing
    use_characters: ["${kaia-hatches.image}", "${meet-pip.image}"]
    action: "two fluffy grey penguin chicks sliding on their bellies down a gentle ice slope, pure joy on their faces, one behind the other, snow spraying around them, sparkling ice surface, blue sky, playful fun scene"
    title:
      en: "Belly Sliding!"
      es: "¡Deslizándose sobre la Barriga!"
      ru: "Катание на животике!"
    content:
      en: "Tobogganing is officially the BEST THING EVER! Kaia and Pip spend all day sliding on their fluffy bellies across the smooth ice. They race each other, spin in circles, and crash into soft snow banks — POOF! 'Again! Again!' Kaia squeals. Even the grown-up penguins toboggan — it's actually faster than walking! Mama and Papa watch from nearby, laughing as the chicks tumble and slide. 'We used to do that too,' Mama whispers to Papa."
      es: "¡El trineo es oficialmente la MEJOR COSA DEL MUNDO! Kaia y Pip pasan todo el día deslizándose sobre sus barrigas esponjosas por el hielo liso. Compiten entre ellos, giran en círculos y se estrellan contra suaves bancos de nieve — ¡POOF! '¡Otra vez! ¡Otra vez!' chilla Kaia. Incluso los pingüinos adultos se deslizan — ¡en realidad es más rápido que caminar! Mamá y Papá observan desde cerca, riendo mientras las crías ruedan y se deslizan."
      ru: "Тобогган — это официально ЛУЧШЕЕ В МИРЕ! Кайя и Пип проводят весь день, скользя на пушистых животиках по гладкому льду. Они гоняются наперегонки, крутятся кругами и врезаются в мягкие сугробы — ПУФ! 'Ещё! Ещё!' визжит Кайя. Даже взрослые пингвины катаются на животе — это на самом деле быстрее ходьбы! Мама и Папа наблюдают рядом, смеясь, как птенцы кувыркаются и скользят."
    image: "tobogganing-fun.jpg"

  # The Penguin Song
  - id: penguin-song
    mood: [epic-skies, golden-hour]
    use_characters: ["${kaia-hatches.image}", "${meet-papa.image}", "${mama-returns.image}"]
    action: "emperor penguin family — father, mother and tiny fluffy chick — standing close together with beaks pointed upward, singing together, golden-pink sky behind them, aurora borealis faintly visible, other penguin families singing in the background, beautiful harmonious scene"
    title:
      en: "Our Family Song"
      es: "Nuestra Canción Familiar"
      ru: "Наша семейная песня"
    content:
      en: "Every penguin family has their own special song — and no two songs are the same! Papa's voice is deep and rumbly like gentle thunder. Mama's voice is clear and bright like a bell. And Kaia's little voice is squeaky and adorable. Together, they point their beaks to the sky and sing! Their song echoes across the ice. 'This is how we'll always find each other,' Papa explains. 'Even in a crowd of a thousand penguins, I will always know YOUR voice.'"
      es: "¡Cada familia de pingüinos tiene su propia canción especial — y no hay dos canciones iguales! La voz de Papá es profunda y retumbante como un trueno suave. La voz de Mamá es clara y brillante como una campana. Y la vocecita de Kaia es chillona y adorable. Juntos, apuntan sus picos al cielo y ¡cantan! Su canción resuena por el hielo. 'Así es como siempre nos encontraremos,' explica Papá. 'Incluso en una multitud de mil pingüinos, siempre reconoceré TU voz.'"
      ru: "У каждой пингвиньей семьи есть своя особенная песня — и нет двух одинаковых! Голос Папы глубокий и гулкий, как мягкий гром. Голос Мамы чистый и яркий, как колокольчик. А голосок Кайи пискливый и обворожительный. Вместе они направляют клювы к небу и поют! Их песня разносится надо льдом. 'Так мы всегда найдём друг друга,' объясняет Папа. 'Даже среди тысячи пингвинов я всегда узнаю ТВОЙ голос.'"
    image: "family-song.jpg"

  # Aurora Borealis
  - id: aurora-lights
    mood: [epic-skies, translucency]
    use_characters: ["${kaia-hatches.image}"]
    action: "tiny fluffy penguin chick staring up in wonder at a magnificent aurora australis (southern lights) painting the Antarctic sky in curtains of green, purple and pink light, the chick's face lit up with amazement, sparkling ice reflecting the colors, magical and awe-inspiring but warm and safe feeling"
    title:
      en: "The Dancing Lights"
      es: "Las Luces Danzantes"
      ru: "Танцующие огни"
    content:
      en: "One night, Kaia looks up and gasps. The sky is DANCING! Great curtains of green and purple and pink light ripple across the darkness like a magic show. 'Papa! Mama! The sky is on FIRE!' 'Those are the Southern Lights,' Mama whispers. 'Some say they're the sky's way of singing.' Kaia watches, mouth wide open, as the colors swirl and shimmer above the ice. It's the most beautiful thing she has ever seen. She decides right then: Antarctica is the best home in the whole universe."
      es: "Una noche, Kaia mira hacia arriba y queda boquiabierta. ¡El cielo está BAILANDO! Grandes cortinas de luz verde, púrpura y rosa ondean a través de la oscuridad como un espectáculo de magia. '¡Papá! ¡Mamá! ¡El cielo está en LLAMAS!' 'Esas son las Luces del Sur,' susurra Mamá. 'Algunos dicen que es la forma en que el cielo canta.' Kaia observa, con la boca bien abierta, mientras los colores giran y brillan sobre el hielo. Es lo más hermoso que ha visto jamás."
      ru: "Однажды ночью Кайя смотрит вверх и ахает. Небо ТАНЦУЕТ! Великие занавеси зелёного, фиолетового и розового света струятся сквозь темноту, как волшебное шоу. 'Папа! Мама! Небо ГОРИТ!' 'Это Южное сияние,' шепчет Мама. 'Некоторые говорят, что это небо поёт.' Кайя смотрит, широко раскрыв рот, как цвета кружатся и мерцают надо льдом. Это самое красивое, что она когда-либо видела."
    image: "aurora-wonder.jpg"

  # Growing Up — New Feathers
  - id: growing-up
    use_characters: ["${kaia-hatches.image}", "${meet-pip.image}"]
    action: "two young emperor penguins in the middle of molting — patches of fluffy grey baby down mixed with sleek new black and white adult feathers coming in, one looking at the other's patchy appearance and laughing, funny awkward teenage penguin stage, bright Antarctic day"
    title:
      en: "The Funny Feather Stage"
      es: "La Etapa Graciosa de las Plumas"
      ru: "Забавная линька"
    content:
      en: "One morning, Kaia notices something strange — her fluffy grey baby feathers are falling out! In their place, sleek new black-and-white feathers are growing in. She looks absolutely RIDICULOUS — half fluffy, half sleek, like a penguin wearing a costume that doesn't fit. Pip looks even funnier — he has a big grey patch right on his face! 'We look like clouds with legs!' Kaia giggles. 'But soon,' says Mama proudly, 'you'll have the most beautiful waterproof coat in the ocean.'"
      es: "Una mañana, Kaia nota algo extraño — ¡sus plumas esponjosas grises de bebé se están cayendo! En su lugar, plumas nuevas y elegantes blancas y negras están creciendo. Se ve absolutamente RIDÍCULA — mitad esponjosa, mitad elegante, como un pingüino usando un disfraz que no le queda. ¡Pip se ve aún más gracioso — tiene un gran parche gris justo en la cara! '¡Parecemos nubes con patas!' ríe Kaia. 'Pero pronto,' dice Mamá con orgullo, 'tendrás el abrigo impermeable más hermoso del océano.'"
      ru: "Однажды утром Кайя замечает что-то странное — её пушистые серые детские перья выпадают! На их месте растут гладкие новые чёрно-белые перья. Она выглядит абсолютно НЕЛЕПО — наполовину пушистая, наполовину гладкая, как пингвин в костюме не по размеру. Пип выглядит ещё смешнее — у него большое серое пятно прямо на лице! 'Мы похожи на облака с ножками!' хихикает Кайя. 'Но скоро,' говорит Мама с гордостью, 'у тебя будет самая красивая водонепроницаемая шубка в океане.'"
    image: "funny-molting.jpg"

  # First Swim
  - id: first-swim
    mood: [translucency, lush-botanical]
    use_characters: ["${kaia-hatches.image}", "${meet-papa.image}", "${mama-returns.image}"]
    action: "young emperor penguin with new sleek feathers diving joyfully into crystal-clear turquoise Antarctic water for the first time, parent penguins watching proudly from the ice edge, underwater view showing the young penguin swimming gracefully with fish visible, sunlight streaming through the water, pure joy and freedom"
    title:
      en: "Kaia's First Swim!"
      es: "¡El Primer Baño de Kaia!"
      ru: "Первый заплыв Кайи!"
    content:
      en: "The day has come — Kaia's new waterproof feathers are ready, and it's time for her VERY FIRST SWIM! She stands at the edge of the ice, looking at the sparkling turquoise water. Her heart beats fast. Papa stands on one side. Mama stands on the other. 'We'll be right here,' they promise. Kaia takes a deep breath and — SPLASH! The water is cool and wonderful! She zooms through it like a rocket, twisting and spinning. 'I'M FLYING UNDERWATER!' she shouts with pure joy."
      es: "¡El día ha llegado — las nuevas plumas impermeables de Kaia están listas, y es hora de su PRIMER BAÑO! Se para al borde del hielo, mirando el agua turquesa brillante. Su corazón late rápido. Papá está a un lado. Mamá al otro. 'Estaremos justo aquí,' prometen. Kaia respira profundamente y — ¡SPLASH! ¡El agua es fresca y maravillosa! Se desliza como un cohete, girando y dando vueltas. '¡ESTOY VOLANDO BAJO EL AGUA!' grita con pura alegría."
      ru: "День настал — новые водонепроницаемые перья Кайи готовы, и пришло время её САМОГО ПЕРВОГО ЗАПЛЫВА! Она стоит на краю льда, глядя на сверкающую бирюзовую воду. Сердце бьётся быстро. Папа стоит с одной стороны. Мама с другой. 'Мы будем прямо здесь,' обещают они. Кайя глубоко вдыхает и — ПЛЮХ! Вода прохладная и чудесная! Она мчится сквозь неё как ракета, крутясь и вращаясь. 'Я ЛЕТАЮ ПОД ВОДОЙ!' кричит она от чистой радости."
    image: "first-swim.jpg"
    imageAlt:
      en: "Young emperor penguin diving joyfully into crystal-clear turquoise Antarctic water, parent penguins watching proudly from ice edge, sunlight streaming through water, pure freedom and joy"
      es: "Joven pingüino emperador sumergiéndose alegremente en agua turquesa cristalina antártica, pingüinos padres observando orgullosamente desde el borde del hielo, luz solar atravesando el agua"
      ru: "Молодой императорский пингвин радостно ныряющий в кристально чистую бирюзовую антарктическую воду, родители-пингвины гордо наблюдающие с края льда, солнечный свет пронизывающий воду"

  # Family Together
  - id: family-together
    mood: [golden-hour, epic-skies]
    title:
      en: "Together Forever"
      es: "Juntos Para Siempre"
      ru: "Вместе навсегда"
    content:
      en: "As the golden Antarctic sun paints the ice in warm shades of amber and rose, the whole colony gathers together. Papa, Mama, and Kaia stand side by side, sleek and beautiful in their matching tuxedos. Kaia is almost as tall as her parents now! She can swim, she can sing, she can toboggan faster than Pip (don't tell him). But the very best thing about being a penguin, Kaia knows, is having a family that keeps you warm — no matter how cold the world gets. And that is the warmest thing of all."
      es: "Mientras el dorado sol antártico pinta el hielo en cálidos tonos de ámbar y rosa, toda la colonia se reúne. Papá, Mamá y Kaia están lado a lado, elegantes y hermosos en sus esmóquines a juego. ¡Kaia es casi tan alta como sus padres ahora! Puede nadar, puede cantar, puede deslizarse más rápido que Pip (no le digan). Pero lo mejor de ser pingüino, sabe Kaia, es tener una familia que te mantiene caliente — sin importar cuán frío sea el mundo."
      ru: "Когда золотое антарктическое солнце окрашивает лёд в тёплые оттенки янтаря и розы, вся колония собирается вместе. Папа, Мама и Кайя стоят бок о бок, элегантные и красивые в своих одинаковых фраках. Кайя почти такая же высокая, как её родители! Она умеет плавать, петь, кататься на животе быстрее Пипа (не говорите ему). Но самое лучшее в том, чтобы быть пингвином, знает Кайя — это иметь семью, которая согревает тебя, как бы холодно ни было вокруг."
    image: "family-together-sunset.jpg"
    referenceImage: "${meet-papa.image}"
    use_characters:
      - "${meet-papa.image}"
      - "${mama-returns.image}"
      - "${kaia-hatches.image}"
    imageAlt:
      en: "Emperor penguin family — father, mother, and nearly-grown chick — standing together on ice at golden sunset, warm amber light, the whole colony visible in the background, peaceful and loving"
      es: "Familia de pingüinos emperador — padre, madre y cría casi adulta — de pie juntos sobre el hielo al atardecer dorado, cálida luz ámbar, toda la colonia visible al fondo, pacífica y amorosa"
      ru: "Семья императорских пингвинов — отец, мать и почти взрослый птенец — стоят вместе на льду на золотом закате, тёплый янтарный свет, вся колония видна на фоне, мирная и любящая"

