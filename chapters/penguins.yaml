viewerDetails:
- title:
    en: "The Brood Pouch"
    es: "El Bolsillo de Cría"
    ru: "Наседный мешочек"
  description:
    en: "Look at Papa Frost's feet — see that special flap of warm skin? That's the brood pouch! Emperor penguin fathers balance the egg (or chick) on top of their feet and cover it with this warm, feathered pouch. Inside, the temperature stays a cozy 36°C even when it's -40°C outside. It's nature's best sleeping bag!"
    es: "¡Mira los pies de Papá Frost — ves esa solapa especial de piel caliente? ¡Ese es el bolsillo de cría! Los padres pingüino emperador equilibran el huevo (o la cría) sobre sus patas y lo cubren con este cálido bolsillo emplumado. Adentro, la temperatura se mantiene en acogedores 36°C incluso cuando afuera hay -40°C. ¡Es el mejor saco de dormir de la naturaleza!"
    ru: "Посмотрите на лапы Папы Фроста — видите эту особую складку тёплой кожи? Это наседный мешочек! Папы-пингвины балансируют яйцо (или птенца) на лапах и накрывают его этим тёплым, оперённым мешочком. Внутри температура держится на уютных 36°C, даже когда снаружи -40°C. Это лучший спальный мешок в природе!"
  image: "detail-feet-warmth.jpg"

- title:
    en: "Waterproof Feathers"
    es: "Plumas Impermeables"
    ru: "Водонепроницаемые перья"
  description:
    en: "Emperor penguin feathers are incredible! They have about 100 feathers per square inch — more than almost any other bird. The feathers overlap tightly like roof tiles, and each one is coated with a special oil that repels water. This keeps penguins completely dry even when diving in freezing water. That's why Kaia had to wait for her adult feathers before swimming!"
    es: "¡Las plumas de los pingüinos emperador son increíbles! Tienen unas 100 plumas por pulgada cuadrada — más que casi cualquier otra ave. Las plumas se superponen como tejas de techo, y cada una está recubierta con un aceite especial que repele el agua. Esto mantiene a los pingüinos completamente secos incluso al bucear en agua helada. ¡Por eso Kaia tuvo que esperar sus plumas adultas antes de nadar!"
    ru: "Перья императорских пингвинов невероятны! У них около 100 перьев на квадратный дюйм — больше, чем у почти любой другой птицы. Перья плотно накладываются друг на друга как черепица, и каждое покрыто специальным маслом, отталкивающим воду. Это сохраняет пингвинов совершенно сухими даже при нырянии в ледяную воду. Вот почему Кайе пришлось ждать взрослых перьев перед плаванием!"
  image: "detail-feather-closeup.jpg"

- title:
    en: "Underwater Eyes"
    es: "Ojos Submarinos"
    ru: "Подводные глаза"
  description:
    en: "Kaia's big dark eyes aren't just adorable — they're specially designed for underwater hunting! Penguins can see perfectly both above and below water. Their eyes adjust quickly from bright ice to the dark deep ocean. They can even see in near-darkness at 500 meters deep, helping them spot tiny fish and krill."
    es: "¡Los grandes ojos oscuros de Kaia no son solo adorables — están especialmente diseñados para cazar bajo el agua! Los pingüinos pueden ver perfectamente tanto sobre como bajo el agua. Sus ojos se ajustan rápidamente del hielo brillante al océano profundo y oscuro. ¡Incluso pueden ver en casi oscuridad a 500 metros de profundidad, ayudándolos a detectar pequeños peces y krill!"
    ru: "Большие тёмные глаза Кайи не просто очаровательны — они специально приспособлены для подводной охоты! Пингвины прекрасно видят как над водой, так и под водой. Их глаза быстро адаптируются от яркого льда к тёмному глубокому океану. Они даже могут видеть в почти полной темноте на глубине 500 метров!"
  image: "detail-eye-adaptation.jpg"

- title:
    en: "The Penguin Beak"
    es: "El Pico del Pingüino"
    ru: "Клюв пингвина"
  description:
    en: "Mama Pearl's beak is a multi-tool! The orange-pink coloring at the sides helps penguins recognize each other. The sharp, curved tip is perfect for catching slippery fish. And inside, tiny backwards-pointing barbs grip prey so it can't escape. Mama uses her beak for feeding Kaia, preening her feathers, and giving gentle penguin kisses!"
    es: "¡El pico de Mamá Pearl es una multiherramienta! La coloración naranja-rosa en los lados ayuda a los pingüinos a reconocerse. La punta afilada y curvada es perfecta para atrapar peces resbaladizos. Y adentro, pequeñas púas que apuntan hacia atrás agarran las presas para que no escapen. ¡Mamá usa su pico para alimentar a Kaia, acicalar sus plumas y dar dulces besos de pingüino!"
    ru: "Клюв Мамы Перл — это мультиинструмент! Оранжево-розовая окраска по бокам помогает пингвинам узнавать друг друга. Острый изогнутый кончик идеален для ловли скользкой рыбы. А внутри крошечные направленные назад шипики удерживают добычу, чтобы она не ускользнула. Мама использует клюв, чтобы кормить Кайю, чистить перья и дарить нежные пингвиньи поцелуи!"
  image: "detail-beak-structure.jpg"

