      ru: "Пушистый птенец пингвина выглядывающий из мешочка Папы, Мама Перл рядом, сверкающий антарктический лёд с сиянием в небе"

funFacts:
  title:
    en: "Amazing Penguin Facts!"
    es: "¡Datos Asombrosos sobre Pingüinos!"
    ru: "Удивительные факты о пингвинах!"
  facts:
    - title:
        en: "Champion Divers"
        es: "Campeones de Buceo"
        ru: "Чемпионы по нырянию"
      content:
        en: "Emperor penguins can dive deeper than 500 meters (1,640 feet) — that's taller than the Eiffel Tower! They can hold their breath for over 20 minutes while hunting for fish, squid, and krill in the deep, dark ocean. Their special blood can carry extra oxygen, like a built-in scuba tank!"
        es: "¡Los pingüinos emperador pueden bucear más de 500 metros de profundidad — eso es más alto que la Torre Eiffel! Pueden contener la respiración por más de 20 minutos mientras cazan peces, calamares y krill en el océano profundo y oscuro. ¡Su sangre especial puede llevar oxígeno extra, como un tanque de buceo incorporado!"
        ru: "Императорские пингвины могут нырять глубже 500 метров — это выше Эйфелевой башни! Они могут задерживать дыхание более 20 минут, охотясь за рыбой, кальмарами и крилем в глубоком тёмном океане. Их особая кровь может нести дополнительный кислород, как встроенный акваланг!"
      image: "fun-fact-deep-diving.jpg"

    - title:
        en: "Belly Surfers"
        es: "Surfistas de Barriga"
        ru: "Серфингисты на животе"
      content:
        en: "Penguins don't just walk — they toboggan! By lying on their bellies and pushing with their flippers, they can slide across the ice much faster than waddling. It's like having a built-in sled wherever you go! Baby penguins learn to toboggan as soon as they can walk, and it's their favorite game."
        es: "¡Los pingüinos no solo caminan — se deslizan! Acostándose sobre sus barrigas y empujándose con sus aletas, pueden deslizarse por el hielo mucho más rápido que caminando. ¡Es como tener un trineo incorporado donde vayas! Los bebés pingüinos aprenden a deslizarse tan pronto como pueden caminar, y es su juego favorito."
        ru: "Пингвины не только ходят — они катаются! Ложась на живот и отталкиваясь ластами, они могут скользить по льду гораздо быстрее, чем переваливаясь. Это как встроенные санки, куда бы ты ни шёл! Птенцы учатся кататься, как только начинают ходить, и это их любимая игра."
      image: "fun-fact-toboggan.jpg"

    - title:
        en: "No Teeth, No Problem!"
        es: "¡Sin Dientes, Sin Problema!"
        ru: "Без зубов — не проблема!"
      content:
        en: "Penguins don't have teeth! Instead, they have backwards-pointing barbs inside their beaks and on their tongues that help grip slippery fish. Once a fish goes in, it can only go one way — down! This clever design means penguins never drop their dinner, even underwater."
        es: "¡Los pingüinos no tienen dientes! En su lugar, tienen púas que apuntan hacia atrás dentro de sus picos y en sus lenguas que ayudan a agarrar peces resbaladizos. Una vez que un pez entra, solo puede ir en una dirección — ¡abajo! Este diseño inteligente significa que los pingüinos nunca dejan caer su cena, ni siquiera bajo el agua."
        ru: "У пингвинов нет зубов! Вместо этого у них есть направленные назад шипики внутри клюва и на языке, которые помогают удерживать скользкую рыбу. Раз рыба попала внутрь, она может двигаться только в одном направлении — вниз! Этот хитрый дизайн означает, что пингвины никогда не роняют ужин, даже под водой."
      image: "fun-fact-no-teeth.jpg"

    - title:
        en: "The Warmest Huddle"
        es: "El Grupo Más Cálido"
        ru: "Самое тёплое сплочение"
      content:
        en: "When emperor penguins huddle together, the temperature inside the group can reach a toasty 37°C (98°F) — as warm as your body! The penguins on the outside slowly shuffle to the center to warm up, while the warm ones move out. They take turns so everyone stays cozy. It's like a giant, rotating group hug!"
        es: "Cuando los pingüinos emperador se acurrucan juntos, ¡la temperatura dentro del grupo puede alcanzar unos agradables 37°C — tan caliente como tu cuerpo! Los pingüinos de afuera se mueven lentamente al centro para calentarse, mientras los calientes salen. Se turnan para que todos se mantengan cómodos. ¡Es como un abrazo grupal gigante y rotativo!"
        ru: "Когда императорские пингвины жмутся друг к другу, температура внутри группы может достигать уютных 37°C — как температура вашего тела! Пингвины снаружи медленно перемещаются в центр, чтобы согреться, а тёплые выходят наружу. Они чередуются, чтобы всем было уютно. Это как гигантское вращающееся групповое объятие!"
      image: "fun-fact-huddle-warmth.jpg"

