sections:
  # A Peaceful Morning
  - id: peaceful-morning
    mood: [golden-hour, lush-botanical]
    action: "a serene and beautiful morning scene at a thriving ant colony, ants moving peacefully in organized lines, some carrying food, some tending the mound, wildflowers blooming around the anthill, butterflies in the air, warm golden sunlight, dappled shadows on the grass, the feeling is calm and idyllic, like a village that doesn't know what's coming"
    title:
      en: "A Peaceful Morning"
      es: "Una Manana Pacifica"
      ru: "Мирное утро"
    content:
      en: "The morning is perfect. Sunlight warms the earth above Queen Terra's colony, and the meadow hums with peaceful industry. Lines of workers stream out to gather food, returning laden with seeds and leaf fragments. Tiny struggles happily beneath her oversized load. Scout ranges far afield, mapping new territory. Major stands at the main gate, nodding as each familiar ant passes. Deep below, Queen Terra tends to the next generation of eggs in the warm nursery. Every ant knows her purpose. Every tunnel leads somewhere important. This colony is a masterpiece of cooperation — thousands of individuals, one shared heartbeat. No one knows that by sunset, everything will change."
      es: "La manana es perfecta. La luz del sol calienta la tierra sobre la colonia de la Reina Terra, y el prado zumba con industria pacifica. Filas de obreras salen a recolectar comida, regresando cargadas de semillas y fragmentos de hojas. Diminuta lucha felizmente bajo su carga sobredimensionada. Exploradora se aventura lejos, mapeando nuevo territorio. Mayor esta en la puerta principal, asintiendo mientras cada hormiga familiar pasa. En las profundidades, la Reina Terra cuida la proxima generacion de huevos en la calida guarderia. Cada hormiga conoce su proposito. Cada tunel lleva a algun lugar importante. Esta colonia es una obra maestra de cooperacion — miles de individuos, un solo latido compartido. Nadie sabe que al atardecer, todo cambiara."
      ru: "Утро совершенно. Солнечный свет греет землю над колонией Королевы Терры, и луг гудит мирным трудом. Вереницы рабочих выходят за едой, возвращаясь гружёные семенами и кусочками листьев. Крошка счастливо борется под своей непомерной ношей. Разведчица уходит далеко, нанося на карту новые территории. Майор стоит у главных ворот, кивая каждому знакомому муравью. Глубоко внизу Королева Терра ухаживает за следующим поколением яиц в тёплой детской. Каждый муравей знает своё предназначение. Каждый тоннель ведёт куда-то важному. Эта колония — шедевр сотрудничества: тысячи особей, одно общее сердцебиение. Никто не знает, что к закату всё изменится."
    image: "peaceful-morning.jpg"
    imageAlt:
      en: "Serene morning at a thriving ant colony, ants moving peacefully, wildflowers blooming, warm golden sunlight, calm idyllic meadow scene"
      es: "Manana serena en una prospera colonia de hormigas, hormigas moviéndose pacificamente, flores silvestres floreciendo, calida luz dorada"
      ru: "Безмятежное утро в процветающей колонии муравьёв, муравьи мирно движутся, полевые цветы цветут, тёплый золотистый свет"

  # Scouts Report Danger
  - id: scouts-report-danger
    mood: [epic-skies, golden-hour]
    use_characters: ["${meet-scout.image}", "${meet-queen-terra.image}"]
    action: "a lean lighter brown ant with one bent antenna racing frantically back toward the anthill entrance, antennae flat against her body in alarm, behind her in the far distance a dark mass of army ants is visible on the horizon like a storm cloud, other ants near the entrance are beginning to react with alarm, dramatic lighting with storm clouds gathering"
    title:
      en: "Scouts Report Danger"
      es: "Las Exploradoras Reportan Peligro"
      ru: "Разведчицы сообщают об опасности"
    content:
      en: "Scout sees them first. A dark, living river flowing over the hill. Not dozens, not hundreds — THOUSANDS of army ants, marching in columns ten bodies wide, their massive jaws snapping like scissors. They are Dorylus — driver ants — and they consume everything in their path. Insects, lizards, even small mammals that cannot flee fast enough. Scout's bent antenna trembles. She has never run so fast in her life. She bursts into the colony, releasing alarm pheromones so powerful that every ant in every tunnel freezes. 'They're coming,' she gasps. 'The raiders. Thousands of them. We have hours, maybe less.' In the queen's chamber, Queen Terra closes her ancient eyes. She has seen this before. She knows what it costs."
      es: "Exploradora los ve primero. Un rio oscuro y viviente fluyendo sobre la colina. No docenas, no cientos — MILES de hormigas legionarias, marchando en columnas de diez cuerpos de ancho, sus mandibulas masivas chasqueando como tijeras. Son Dorylus — hormigas conductoras — y devoran todo a su paso. Insectos, lagartijas, incluso pequenos mamiferos que no pueden huir lo suficientemente rapido. La antena doblada de Exploradora tiembla. Nunca ha corrido tan rapido en su vida. Irrumpe en la colonia, liberando feromonas de alarma tan potentes que cada hormiga en cada tunel se congela. 'Vienen,' jadea. 'Las invasoras. Miles de ellas. Tenemos horas, quiza menos.' En la camara de la reina, la Reina Terra cierra sus antiguos ojos. Ha visto esto antes. Sabe lo que cuesta."
      ru: "Разведчица видит их первой. Тёмная, живая река, текущая через холм. Не десятки, не сотни — ТЫСЯЧИ кочевых муравьёв, марширующих колоннами шириной в десять тел, их массивные челюсти щёлкают как ножницы. Это дорилусы — бродячие муравьи — и они пожирают всё на своём пути. Насекомых, ящериц, даже мелких млекопитающих, не успевших убежать. Изогнутый усик Разведчицы дрожит. Она никогда не бежала так быстро в жизни. Она врывается в колонию, выпуская тревожные феромоны такой силы, что каждый муравей в каждом тоннеле замирает. 'Они идут,' задыхается она. 'Захватчики. Тысячи. У нас часы, может меньше.' В камере королевы Королева Терра закрывает свои древние глаза. Она видела это раньше. Она знает, чего это стоит."
    image: "scouts-report-danger.jpg"
    imageAlt:
      en: "Lean brown ant racing frantically toward the anthill, dark mass of army ants visible on the horizon, storm clouds gathering, dramatic lighting"
      es: "Hormiga marron delgada corriendo franticamente hacia el hormiguero, masa oscura de hormigas legionarias visible en el horizonte, nubes de tormenta"
      ru: "Стройный коричневый муравей мчится к муравейнику, тёмная масса кочевых муравьёв видна на горизонте, грозовые тучи собираются"

  # The Enemy Approaches
  - id: enemy-approaches
    mood: [epic-skies]
    action: "a terrifying close-up of the invading army ant column — hundreds of dark, aggressive-looking ants with huge snapping mandibles marching in tight formation over a barren patch of earth, the ground beneath them looks stripped clean, smaller ants fleeing before the advancing column, dramatic dark red lighting, the army stretches endlessly into the background, menacing and unstoppable"
    title:
      en: "The Enemy Army"
      es: "El Ejercito Enemigo"
      ru: "Вражеская армия"
    content:
      en: "The army ants are unlike anything in the colony's experience. They have no permanent home — they ARE the invasion. Their queen is carried in the center of the swarm, surrounded by millions of soldiers whose only purpose is to kill and consume. Where Terra's colony is built on roles and cooperation, this army is built on one thing: conquest. The raiders don't negotiate. They don't coexist. They strip the earth bare and move on. As the column advances, the ground behind it is clean — every insect, every larva, every living thing devoured. Scout watches from a grass blade, counting. She stops counting at ten thousand. It doesn't matter anymore. There are more raiders than blades of grass."
      es: "Las hormigas legionarias son diferentes a todo lo que la colonia ha experimentado. No tienen hogar permanente — ELLAS SON la invasion. Su reina es cargada en el centro del enjambre, rodeada por millones de soldados cuyo unico proposito es matar y consumir. Donde la colonia de Terra esta construida sobre roles y cooperacion, este ejercito esta construido sobre una cosa: conquista. Las invasoras no negocian. No coexisten. Despojan la tierra y siguen adelante. Mientras la columna avanza, el suelo detras queda limpio — cada insecto, cada larva, cada ser vivo devorado. Exploradora observa desde una hoja de hierba, contando. Deja de contar en diez mil. Ya no importa. Hay mas invasoras que hojas de hierba."
      ru: "Кочевые муравьи не похожи ни на что из опыта колонии. У них нет постоянного дома — они САМИ и есть вторжение. Их королеву несут в центре роя, окружённую миллионами солдат, чья единственная цель — убивать и пожирать. Там, где колония Терры построена на ролях и сотрудничестве, эта армия построена на одном: завоевании. Захватчики не ведут переговоров. Не сосуществуют. Они обдирают землю догола и идут дальше. По мере продвижения колонны земля позади неё чиста — каждое насекомое, каждая личинка, всё живое пожрано. Разведчица наблюдает с травинки, считая. Она перестаёт считать на десяти тысячах. Это больше не имеет значения. Захватчиков больше, чем травинок."
    image: "enemy-approaches.jpg"
    imageAlt:
      en: "Terrifying close-up of invading army ant column, hundreds of dark aggressive ants with huge mandibles in tight formation, barren stripped earth behind them, dramatic red lighting"
      es: "Primer plano aterrador de la columna de hormigas legionarias invasoras, cientos de hormigas oscuras agresivas con mandibulas enormes en formacion cerrada"
      ru: "Устрашающий крупный план колонны вторгающихся кочевых муравьёв, сотни тёмных агрессивных муравьёв с огромными челюстями в тесном строю, голая земля позади"

  # Major's Decision
  - id: majors-decision
    mood: [soft-intimate, epic-skies]
    use_characters: ["${major-guards-gate.image}", "${meet-queen-terra.image}"]
    action: "a large dark reddish-black soldier ant with a massive head and oversized mandibles standing in the queen's chamber facing the large reddish-brown queen ant, both looking at each other with deep gravity, the chamber is dimly lit with amber light, worker ants visible in the background watching, the mood is solemn and weighty like a council of war"
    title:
      en: "Major's Decision"
      es: "La Decision de Mayor"
      ru: "Решение Майора"
    content:
      en: "In the queen's chamber, Major stands before Queen Terra. The room is silent. Every ant knows what must happen. 'The tunnels must be sealed,' Terra says quietly. 'The main corridors. The secondary routes. All of them.' Major nods. He knows what this means. The ants who seal the tunnels will be on the WRONG side of the barrier — between the colony and the invaders. They won't be coming back. 'I'll lead the defenders,' Major says. His voice doesn't waver. 'Choose only volunteers,' Terra says. Her ancient eyes are wet. 'They are all volunteers, my Queen,' Major replies. 'Every single one.' And this is true. In a colony built on selflessness, no one needs to be ordered to sacrifice. They simply step forward."
      es: "En la camara de la reina, Mayor esta frente a la Reina Terra. La habitacion esta en silencio. Cada hormiga sabe lo que debe pasar. 'Los tuneles deben ser sellados,' dice Terra en voz baja. 'Los corredores principales. Las rutas secundarias. Todos.' Mayor asiente. Sabe lo que esto significa. Las hormigas que sellen los tuneles estaran en el lado EQUIVOCADO de la barrera — entre la colonia y los invasores. No van a volver. 'Yo liderare a los defensores,' dice Mayor. Su voz no tiembla. 'Elige solo voluntarias,' dice Terra. Sus ojos ancianos estan humedos. 'Todas son voluntarias, mi Reina,' responde Mayor. 'Cada una de ellas.' Y esto es verdad. En una colonia construida sobre el altruismo, nadie necesita que le ordenen sacrificarse. Simplemente dan un paso adelante."
      ru: "В камере королевы Майор стоит перед Королевой Террой. В комнате тишина. Каждый муравей знает, что должно произойти. 'Тоннели должны быть запечатаны,' тихо говорит Терра. 'Главные коридоры. Запасные пути. Все.' Майор кивает. Он знает, что это значит. Муравьи, которые запечатают тоннели, окажутся по НЕПРАВИЛЬНУЮ сторону преграды — между колонией и захватчиками. Они не вернутся. 'Я поведу защитников,' говорит Майор. Его голос не дрожит. 'Выбери только добровольцев,' говорит Терра. Её древние глаза влажны. 'Они все добровольцы, моя Королева,' отвечает Майор. 'Каждый из них.' И это правда. В колонии, построенной на самоотверженности, никому не нужно приказывать жертвовать собой. Они просто делают шаг вперёд."
    image: "majors-decision.jpg"
    imageAlt:
      en: "Large soldier ant facing the queen in a dimly lit chamber, solemn mood, other ants watching in the background, warm amber light, council of war atmosphere"
      es: "Gran hormiga soldado frente a la reina en una camara tenuemente iluminada, ambiente solemne, otras hormigas observando al fondo"
      ru: "Большой муравей-солдат перед королевой в тускло освещённой камере, торжественная атмосфера, другие муравьи наблюдают на заднем плане"

  # The Tunnel Defenders
  - id: tunnel-defenders
    mood: [epic-skies, soft-intimate]
    use_characters: ["${major-guards-gate.image}"]
    action: "inside an ant tunnel, several large soldier ants are PLUGGING the tunnel entrance with their own bodies, their massive heads and mandibles facing outward toward approaching enemy ants, their bodies wedged tightly into the tunnel opening forming a living wall, the defenders' eyes show determination not fear, dramatic amber and red lighting, heroic and heartbreaking scene"
    title:
      en: "The Living Wall"
      es: "La Pared Viviente"
      ru: "Живая стена"
    content:
      en: "This is the part of the story that is hardest to tell, because it is true. When army ants invade a colony, defender ants plug the tunnel entrances with their own bodies. They wedge themselves into the openings — head first, mandibles facing outward — and they HOLD. The raiders bite them, pull at them, spray acid on them. The defenders do not move. Behind them, the colony evacuates. Workers carry eggs and larvae through deeper tunnels. Major is the first to plug the main entrance. His massive head fills the gap perfectly. 'Go,' he says calmly to the ants streaming past behind him. 'Take the children and go.' He can feel the raiders' mandibles on his exoskeleton. He does not flinch. This is what he was born for."
      es: "Esta es la parte de la historia mas dificil de contar, porque es verdad. Cuando las hormigas legionarias invaden una colonia, las hormigas defensoras tapan las entradas de los tuneles con sus propios cuerpos. Se incrustan en las aberturas — cabeza primero, mandibulas hacia afuera — y RESISTEN. Las invasoras las muerden, las jalan, les rocian acido. Las defensoras no se mueven. Detras de ellas, la colonia evacua. Las obreras cargan huevos y larvas por tuneles mas profundos. Mayor es el primero en tapar la entrada principal. Su cabeza masiva llena el espacio perfectamente. 'Vayan,' dice calmadamente a las hormigas que pasan detras de el. 'Lleven a los ninos y vayan.' Puede sentir las mandibulas de las invasoras en su exoesqueleto. No se inmuta. Para esto nacio."
      ru: "Это самая тяжёлая часть истории, потому что она правдива. Когда кочевые муравьи вторгаются в колонию, муравьи-защитники затыкают входы в тоннели собственными телами. Они вклиниваются в проёмы — головой вперёд, челюстями наружу — и ДЕРЖАТСЯ. Захватчики кусают их, тянут, брызгают кислотой. Защитники не двигаются. Позади них колония эвакуируется. Рабочие несут яйца и личинки через более глубокие тоннели. Майор первым затыкает главный вход. Его массивная голова идеально заполняет проём. 'Идите,' спокойно говорит он муравьям, бегущим мимо позади него. 'Берите детей и идите.' Он чувствует челюсти захватчиков на своём экзоскелете. Он не вздрагивает. Для этого он родился."
    image: "tunnel-defenders.jpg"
    imageAlt:
      en: "Soldier ants plugging tunnel entrance with their bodies, massive heads and mandibles facing outward, enemy ants approaching, heroic and heartbreaking, dramatic lighting"
      es: "Hormigas soldado tapando la entrada del tunel con sus cuerpos, cabezas masivas y mandibulas hacia afuera, hormigas enemigas acercandose, heroico y desgarrador"
      ru: "Муравьи-солдаты затыкают вход в тоннель своими телами, массивные головы и челюсти направлены наружу, вражеские муравьи приближаются, героическая и душераздирающая сцена"

  # Chemical Warfare
  - id: chemical-warfare
    mood: [epic-skies]
    use_characters: ["${meet-scout.image}"]
    action: "an intense battle scene between defender ants and invading army ants on the surface near the anthill, defender ants spraying formic acid from their abdomens creating visible misty clouds, the acid spray is shown as a dramatic mist, invading ants recoiling from the chemical attack, the ground is churned up from the battle, harsh dramatic lighting with red and orange tones, chaotic and intense"
    title:
      en: "Chemical Warfare"
      es: "Guerra Quimica"
      ru: "Химическая война"
    content:
      en: "Above ground, the battle is even more brutal. Defender ants have a weapon the raiders don't expect: formic acid. They spray it from their abdomens in desperate clouds, and where the acid lands, it burns. The raiders reel back, confused and in pain. But there are so many of them. For every raider that falls, ten more take her place. Scout leads a flanking team, striking at the edges of the army column, trying to disrupt their scent trails and cause confusion. It works — for a while. Separated from the chemical trail, groups of raiders mill in circles, lost. But the main column adapts. It always adapts. This is what army ants do. They don't think. They don't strategize. They simply overwhelm. And against that, even courage has limits."
      es: "Sobre la superficie, la batalla es aun mas brutal. Las hormigas defensoras tienen un arma que las invasoras no esperan: acido formico. Lo rocian desde sus abdomenes en nubes desesperadas, y donde el acido cae, quema. Las invasoras retroceden, confundidas y adoloridas. Pero son tantas. Por cada invasora que cae, diez mas toman su lugar. Exploradora lidera un equipo de flanqueo, golpeando los bordes de la columna del ejercito, tratando de interrumpir sus rastros de olor y causar confusion. Funciona — por un tiempo. Separados del rastro quimico, grupos de invasoras giran en circulos, perdidos. Pero la columna principal se adapta. Siempre se adapta. Esto es lo que hacen las hormigas legionarias. No piensan. No planifican estrategias. Simplemente abruman. Y contra eso, incluso el coraje tiene limites."
      ru: "На поверхности битва ещё более жестокая. У защитников есть оружие, которого захватчики не ожидают: муравьиная кислота. Они распыляют её из брюшек отчаянными облаками, и там, где кислота попадает, она жжёт. Захватчики отшатываются, сбитые с толку и от боли. Но их так много. На каждого павшего захватчика приходят десять новых. Разведчица ведёт фланговую группу, нанося удары по краям армейской колонны, пытаясь нарушить их тропы запахов и посеять хаос. Это работает — какое-то время. Отрезанные от химической тропы, группы захватчиков кружат на месте, потерянные. Но основная колонна адаптируется. Она всегда адаптируется. Это то, что делают кочевые муравьи. Они не думают. Не строят стратегий. Они просто подавляют числом. И против этого даже мужество имеет пределы."
    image: "chemical-warfare.jpg"
    imageAlt:
      en: "Intense battle between defender ants spraying formic acid mist and invading army ants recoiling, churned earth, harsh red-orange lighting, chaotic scene"
      es: "Batalla intensa entre hormigas defensoras rociando acido formico y hormigas invasoras retrocediendo, tierra revuelta, iluminacion rojo-naranja"
      ru: "Ожесточённая битва между защитниками, распыляющими муравьиную кислоту, и отступающими захватчиками, разрытая земля, резкое красно-оранжевое освещение"

  # The Nursery Evacuation
  - id: nursery-evacuation
    mood: [soft-intimate, translucency]
    use_characters: ["${tinys-big-job.image}", "${meet-queen-terra.image}"]
    action: "inside a deep underground tunnel, a small dark ant carefully carries a cluster of white ant eggs in her mandibles, running through the tunnel with other worker ants also carrying eggs and larvae, the tunnel is narrow and the ants are urgent but gentle with their cargo, behind them the distant sounds of battle are suggested by dust falling from the tunnel ceiling, warm amber light fading to darkness, desperate but tender scene"
    title:
      en: "Save the Children"
      es: "Salven a los Ninos"
      ru: "Спасите детей"
    content:
      en: "Deep in the colony, Tiny has the most important job she's ever had. While the soldiers fight and die above, the workers are evacuating the nursery. Every egg, every larva, every pupa must be carried to the deepest emergency chambers — tunnels so far down that the raiders may never reach them. Tiny cradles a cluster of eggs in her mandibles, more gently than she has ever held anything. These eggs are the colony's future. If the soldiers buy enough time, if the tunnels hold, these tiny white eggs will become the ants who rebuild everything. Tiny runs. The tunnel shakes as battle rages above. Dust falls from the ceiling. She shields the eggs with her body and keeps running. She is small. She has always been small. But right now, carrying the future in her jaws, she has never felt more important."
      es: "En lo profundo de la colonia, Diminuta tiene el trabajo mas importante que ha tenido. Mientras las soldados luchan y mueren arriba, las obreras estan evacuando la guarderia. Cada huevo, cada larva, cada pupa debe ser llevada a las camaras de emergencia mas profundas — tuneles tan abajo que las invasoras quiza nunca lleguen. Diminuta acuna un grupo de huevos en sus mandibulas, mas delicadamente de lo que ha sostenido nada jamas. Estos huevos son el futuro de la colonia. Si las soldados ganan suficiente tiempo, si los tuneles resisten, estos pequenos huevos blancos se convertiran en las hormigas que reconstruiran todo. Diminuta corre. El tunel tiembla mientras la batalla ruge arriba. Polvo cae del techo. Protege los huevos con su cuerpo y sigue corriendo. Es pequena. Siempre ha sido pequena. Pero ahora, cargando el futuro en sus mandibulas, nunca se ha sentido mas importante."
      ru: "Глубоко в колонии у Крошки самая важная работа в её жизни. Пока солдаты сражаются и гибнут наверху, рабочие эвакуируют детскую. Каждое яйцо, каждая личинка, каждая куколка должна быть перенесена в самые глубокие аварийные камеры — тоннели так глубоко, что захватчики, может быть, никогда туда не доберутся. Крошка бережно несёт гроздь яиц в челюстях, нежнее, чем когда-либо что-то держала. Эти яйца — будущее колонии. Если солдаты выиграют достаточно времени, если тоннели выдержат, эти крошечные белые яйца станут муравьями, которые всё отстроят заново. Крошка бежит. Тоннель содрогается от битвы наверху. Пыль сыплется с потолка. Она прикрывает яйца своим телом и продолжает бежать. Она маленькая. Она всегда была маленькой. Но сейчас, неся будущее в своих челюстях, она никогда не чувствовала себя важнее."
    image: "nursery-evacuation.jpg"
    imageAlt:
      en: "Small dark ant carrying white eggs through a narrow underground tunnel, other worker ants with larvae, dust falling from ceiling, urgent but tender, amber light"
      es: "Pequena hormiga oscura cargando huevos blancos por un estrecho tunel subterraneo, otras obreras con larvas, polvo cayendo del techo, urgente pero tierno"
      ru: "Маленький тёмный муравей несёт белые яйца через узкий подземный тоннель, другие рабочие с личинками, пыль сыплется с потолка, срочно но нежно"

  # The Soldier's Sacrifice
  - id: soldiers-sacrifice
    mood: [epic-skies, soft-intimate]
    use_characters: ["${major-guards-gate.image}"]
    action: "a powerful and emotional scene — a large dark soldier ant with massive mandibles wedged into a tunnel entrance, his exoskeleton battered and cracked, still holding firm as invading ants press against him, behind him the tunnel stretches into safe darkness where the colony has escaped, his eyes show peace not pain, golden light filtering from behind him like a halo, heroic and deeply moving, the feeling of a last stand"
    title:
      en: "The Soldier's Sacrifice"
      es: "El Sacrificio del Soldado"
      ru: "Жертва солдата"
    content:
      en: "Major has been holding the main tunnel for hours. His exoskeleton is cracked in three places. One mandible is chipped. The raiders have thrown everything at him — bites, acid, sheer numbers pushing against his body. He has not moved one inch. Behind him, the tunnel is empty. The evacuation is complete. Every egg is safe. Every worker is deep below. Queen Terra herself sent the last message through the pheromone chain: 'The children are safe. Thank you.' Major feels the message reach him and something inside him lets go — not his grip, never his grip — but the tension he didn't know he was carrying. He did his job. Every defender did their job. Some will not survive the night. Major may not survive the night. But the colony will live. And in the ant world, that is everything."
      es: "Mayor ha estado sosteniendo el tunel principal por horas. Su exoesqueleto esta agrietado en tres lugares. Una mandibula esta astillada. Las invasoras han lanzado todo contra el — mordidas, acido, el puro numero presionando contra su cuerpo. No se ha movido ni un centimetro. Detras de el, el tunel esta vacio. La evacuacion esta completa. Cada huevo esta a salvo. Cada obrera esta en las profundidades. La Reina Terra misma envio el ultimo mensaje por la cadena de feromonas: 'Los ninos estan a salvo. Gracias.' Mayor siente que el mensaje lo alcanza y algo dentro de el se afloja — no su agarre, nunca su agarre — sino la tension que no sabia que cargaba. Hizo su trabajo. Cada defensor hizo su trabajo. Algunos no sobreviviran la noche. Mayor quiza no sobreviva la noche. Pero la colonia vivira. Y en el mundo de las hormigas, eso es todo."
      ru: "Майор держит главный тоннель уже несколько часов. Его экзоскелет треснул в трёх местах. Одна челюсть сколота. Захватчики бросили на него всё — укусы, кислоту, чистую массу тел, давящих на него. Он не сдвинулся ни на сантиметр. За ним тоннель пуст. Эвакуация завершена. Каждое яйцо в безопасности. Каждый рабочий глубоко внизу. Сама Королева Терра послала последнее сообщение по цепочке феромонов: 'Дети в безопасности. Спасибо.' Майор чувствует, как сообщение достигает его, и что-то внутри отпускает — не хватка, никогда не хватка — но напряжение, о котором он не знал. Он выполнил свою работу. Каждый защитник выполнил свою. Некоторые не переживут эту ночь. Майор, может быть, не переживёт эту ночь. Но колония будет жить. А в мире муравьёв это — всё."
    image: "soldiers-sacrifice.jpg"
    imageAlt:
      en: "Battered soldier ant wedged in tunnel entrance still holding firm, cracked exoskeleton, raiders pressing against him, golden light behind like a halo, heroic last stand"
      es: "Hormiga soldado maltratada incrustada en la entrada del tunel resistiendo, exoesqueleto agrietado, invasoras presionando contra el, luz dorada detras como un halo"
      ru: "Побитый муравей-солдат, вклинившийся во вход тоннеля и держащийся, треснутый экзоскелет, захватчики давят на него, золотистый свет позади как ореол"

  # The Aftermath
  - id: the-aftermath
    mood: [soft-intimate]
    action: "the anthill after the army ants have passed — the surface is scarred and churned, broken tunnel entrances visible, a few exhausted defender ants limp across the damaged ground, the sky is grey dawn light after a storm, devastation but also stillness, some wildflowers are crushed but a few still stand, solemn and quiet aftermath of battle"
    title:
      en: "The Aftermath"
      es: "Las Consecuencias"
      ru: "Последствия"
    content:
      en: "By dawn, the raiders have moved on. Army ants never stay — they are a storm, not a siege. They swept through the upper tunnels, took what they could reach, and continued their endless march. The surface is scarred. Tunnel entrances are collapsed or torn open. The ground looks like a battlefield because it was one. Scout emerges first, her bent antenna testing the air for danger. Nothing. The chemical traces are fading. The raiders are gone. Slowly, cautiously, other ants begin to appear from the deep tunnels. They look at the devastation in silence. The meadow that was so beautiful yesterday is churned and scarred. Some of the defenders who held the tunnels are still there — motionless now, still wedged in their positions, still facing outward. They held. To the very end, they held."
      es: "Al amanecer, las invasoras se han ido. Las hormigas legionarias nunca se quedan — son una tormenta, no un asedio. Barrieron los tuneles superiores, tomaron lo que pudieron alcanzar, y continuaron su marcha interminable. La superficie esta marcada. Las entradas de los tuneles estan colapsadas o destrozadas. El suelo parece un campo de batalla porque lo fue. Exploradora emerge primero, su antena doblada probando el aire en busca de peligro. Nada. Los rastros quimicos se desvanecen. Las invasoras se fueron. Lentamente, cautelosamente, otras hormigas comienzan a aparecer de los tuneles profundos. Miran la devastacion en silencio. El prado que era tan hermoso ayer esta revuelto y marcado. Algunas de las defensoras que sostuvieron los tuneles siguen ahi — inmoviles ahora, aun incrustadas en sus posiciones, aun mirando hacia afuera. Resistieron. Hasta el final, resistieron."
      ru: "К рассвету захватчики ушли. Кочевые муравьи никогда не остаются — они буря, не осада. Они прошли через верхние тоннели, взяли что смогли, и продолжили свой бесконечный марш. Поверхность изранена. Входы в тоннели обрушены или разорваны. Земля выглядит как поле битвы, потому что им и была. Разведчица выходит первой, её изогнутый усик проверяет воздух на опасность. Ничего. Химические следы тают. Захватчики ушли. Медленно, осторожно, другие муравьи начинают появляться из глубоких тоннелей. Они молча смотрят на разрушения. Луг, который был таким красивым вчера, изрыт и изранен. Некоторые защитники, державшие тоннели, всё ещё там — неподвижные теперь, всё ещё вклиненные в свои позиции, всё ещё лицом наружу. Они выстояли. До самого конца они выстояли."
    image: "the-aftermath.jpg"
    imageAlt:
      en: "Devastated anthill at grey dawn, scarred earth, collapsed tunnel entrances, exhausted ants emerging, crushed wildflowers, solemn quiet aftermath"
      es: "Hormiguero devastado al amanecer gris, tierra marcada, entradas de tuneles colapsadas, hormigas exhaustas emergiendo, flores aplastadas"
      ru: "Разорённый муравейник на фоне серого рассвета, израненная земля, обрушенные входы, измотанные муравьи выходят, помятые цветы"

  # Rebuilding
  - id: rebuilding
    mood: [golden-hour, lush-botanical]
    use_characters: ["${tinys-big-job.image}", "${meet-scout.image}", "${meet-queen-terra.image}"]
    action: "ants rebuilding their colony in warm golden morning light, some repairing tunnel entrances carrying balls of earth, some clearing debris, a small dark ant carrying a huge leaf piece is leading a line of workers, the anthill is being reconstructed, new green shoots growing through the damaged earth, hope and determination in the scene, sunrise golden light breaking through clouds"
    title:
      en: "Rebuilding from Ashes"
      es: "Reconstruyendo de las Cenizas"
      ru: "Возрождение из пепла"
    content:
      en: "Before the morning sun has fully risen, the rebuilding begins. This is perhaps the most remarkable thing about ants: they do not mourn long. They do not give up. They BUILD. Tiny is the first to start carrying earth to repair the tunnels. Her load is too big — it's always too big — but she carries it anyway. Scout maps new routes around the damaged sections. Workers stream out in organized lines, clearing debris, reopening passages, reinforcing walls. Deep below, Queen Terra begins laying eggs again. New life. New soldiers. New workers. The colony's answer to destruction is not despair — it is creation. Within days, the tunnels will be deeper and stronger than before. The colony learns from every invasion. It adapts. It endures."
      es: "Antes de que el sol de la manana haya salido completamente, la reconstruccion comienza. Esto es quiza lo mas notable de las hormigas: no lloran mucho tiempo. No se rinden. CONSTRUYEN. Diminuta es la primera en empezar a cargar tierra para reparar los tuneles. Su carga es demasiado grande — siempre es demasiado grande — pero la carga de todas formas. Exploradora traza nuevas rutas alrededor de las secciones danadas. Las obreras salen en filas organizadas, limpiando escombros, reabriendo pasajes, reforzando paredes. En las profundidades, la Reina Terra comienza a poner huevos de nuevo. Nueva vida. Nuevas soldados. Nuevas obreras. La respuesta de la colonia a la destruccion no es la desesperacion — es la creacion."
      ru: "Ещё до того, как утреннее солнце полностью взошло, начинается восстановление. Это, пожалуй, самое замечательное в муравьях: они не горюют долго. Они не сдаются. Они СТРОЯТ. Крошка первой начинает носить землю для ремонта тоннелей. Её ноша слишком велика — она всегда слишком велика — но она несёт её всё равно. Разведчица прокладывает новые маршруты вокруг повреждённых участков. Рабочие выходят организованными колоннами, расчищая завалы, открывая проходы, укрепляя стены. Глубоко внизу Королева Терра снова начинает откладывать яйца. Новая жизнь. Новые солдаты. Новые рабочие. Ответ колонии на разрушение — не отчаяние, а созидание. За несколько дней тоннели будут глубже и крепче, чем прежде."
    image: "rebuilding.jpg"
    imageAlt:
      en: "Ants rebuilding their colony in golden morning light, carrying earth, clearing debris, new green shoots growing, sunrise breaking through clouds, hope and determination"
      es: "Hormigas reconstruyendo su colonia en luz dorada matutina, cargando tierra, limpiando escombros, nuevos brotes verdes creciendo, amanecer"
      ru: "Муравьи восстанавливают свою колонию в золотистом утреннем свете, несут землю, расчищают завалы, новые зелёные ростки, рассвет пробивается сквозь тучи"

  # The Colony Endures
  - id: colony-endures
    mood: [epic-skies, golden-hour, lush-botanical]
    use_characters: ["${meet-queen-terra.image}", "${meet-scout.image}", "${tinys-big-job.image}", "${major-guards-gate.image}"]
    action: "a magnificent wide shot at golden sunset — the ant colony restored and thriving again, the anthill is larger and stronger than before, organized lines of ants streaming in and out, new wildflowers blooming around the mound, Queen Terra visible in an underground cutaway chamber with new eggs, Scout on a high grass blade surveying the land, a large soldier ant standing guard at the rebuilt entrance, a small dark ant carrying an oversized leaf, golden sunset light, clouds parting to reveal blue sky, triumphant and hopeful, the feeling of endurance and rebirth"
    title:
      en: "The Colony Endures"
      es: "La Colonia Perdura"
      ru: "Колония выстоит"
    content:
      en: "Weeks later, you would never know a war was fought here. The anthill is bigger than before. The tunnels go deeper. A new generation of soldiers guards the gates — their mandibles even larger, their instincts sharper. Scout has mapped escape routes in every direction. Tiny trains the new young workers, showing them how to carry loads bigger than themselves. 'It's all about heart,' she tells them, and she means it. Queen Terra sits in her chamber, surrounded by thousands of new eggs, and she remembers. She remembers every defender who held a tunnel. Every soldier who didn't come home. In the ant world, there are no monuments, no names carved in stone. But the colony itself is the monument — every tunnel dug, every egg tended, every enemy turned away. The colony endures. It has endured for fifty million years. And it will endure long after we are gone."
      es: "Semanas despues, nunca sabrias que se libro una guerra aqui. El hormiguero es mas grande que antes. Los tuneles son mas profundos. Una nueva generacion de soldados custodia las puertas — sus mandibulas aun mas grandes, sus instintos mas agudos. Exploradora ha mapeado rutas de escape en todas direcciones. Diminuta entrena a las nuevas obreras jovenes, mostrandoles como cargar cosas mas grandes que ellas mismas. 'Todo es cuestion de corazon,' les dice, y lo dice en serio. La Reina Terra se sienta en su camara, rodeada de miles de nuevos huevos, y recuerda. Recuerda a cada defensora que sostuvo un tunel. Cada soldado que no volvio a casa. En el mundo de las hormigas, no hay monumentos, no hay nombres grabados en piedra. Pero la colonia misma es el monumento. La colonia perdura. Ha perdurado por cincuenta millones de anos. Y perdurara mucho despues de que nosotros nos hayamos ido."
      ru: "Спустя недели вы бы никогда не узнали, что здесь была война. Муравейник больше прежнего. Тоннели глубже. Новое поколение солдат охраняет ворота — их челюсти ещё больше, инстинкты острее. Разведчица проложила пути отступления во все стороны. Крошка обучает новых молодых рабочих, показывая, как нести груз больше себя. 'Всё дело в сердце,' говорит она, и говорит серьёзно. Королева Терра сидит в своей камере, окружённая тысячами новых яиц, и помнит. Она помнит каждого защитника, державшего тоннель. Каждого солдата, не вернувшегося домой. В мире муравьёв нет памятников, нет имён, высеченных в камне. Но сама колония — это памятник. Колония выстоит. Она выстояла пятьдесят миллионов лет. И выстоит долго после того, как нас не станет."
    image: "colony-endures.jpg"
    imageAlt:
      en: "Magnificent restored ant colony at golden sunset, larger and stronger anthill, organized ant lines, new wildflowers, all four characters visible, triumphant golden light, clouds parting"
      es: "Magnifica colonia restaurada al atardecer dorado, hormiguero mas grande y fuerte, lineas organizadas, nuevas flores, los cuatro personajes visibles, luz dorada triunfante"
      ru: "Великолепная восстановленная колония на фоне золотого заката, увеличенный и укреплённый муравейник, организованные колонны, новые цветы, все четыре персонажа видны, триумфальный золотистый свет"

  # Nature's Lesson
  - id: natures-lesson
    mood: [golden-hour, soft-intimate]
    action: "a contemplative final scene — a single ant standing on the tip of a tall grass blade at golden sunset, looking out over the vast meadow, the rebuilt anthill visible below, the horizon stretches endlessly, the ant is small against the enormous sky but stands tall and resolute, golden light creates a silhouette effect, the mood is philosophical and profound, the contrast between tiny creature and vast world"
    title:
      en: "Nature's Lesson"
      es: "La Leccion de la Naturaleza"
      ru: "Урок природы"
    content:
      en: "There is a lesson in the ants, if we choose to see it. Some colonies are democracies — every worker contributes freely, the queen is a mother not a tyrant, and the colony thrives because each member serves willingly. Other colonies are empires — slave-making ants that raid, enslave, and exploit. Army ants that destroy without building. Nature shows us both paths, and it shows us which one endures. The colonies built on cooperation — on every ant doing her part, on soldiers who choose to sacrifice, on workers who carry loads too heavy because they refuse to let their sisters down — these are the colonies that survive for millions of years. The raiders come and go like storms. But the builders remain. Perhaps the smallest creatures on Earth have the biggest lesson to teach us: that what we build together is always stronger than what we destroy alone."
      es: "Hay una leccion en las hormigas, si elegimos verla. Algunas colonias son democracias — cada obrera contribuye libremente, la reina es una madre no una tirana, y la colonia prospera porque cada miembro sirve voluntariamente. Otras colonias son imperios — hormigas esclavistas que asaltan, esclavizan y explotan. Hormigas legionarias que destruyen sin construir. La naturaleza nos muestra ambos caminos, y nos muestra cual perdura. Las colonias construidas sobre la cooperacion — donde cada hormiga hace su parte, donde los soldados eligen sacrificarse, donde las obreras cargan cargas demasiado pesadas porque se niegan a decepcionar a sus hermanas — estas son las colonias que sobreviven por millones de anos. Las invasoras vienen y van como tormentas. Pero las constructoras permanecen. Quiza las criaturas mas pequenas de la Tierra tienen la leccion mas grande que ensenarnos: que lo que construimos juntos siempre es mas fuerte que lo que destruimos solos."
      ru: "В муравьях есть урок, если мы решим его увидеть. Некоторые колонии — демократии: каждый рабочий вносит вклад добровольно, королева — мать, а не тиран, и колония процветает, потому что каждый член служит по своей воле. Другие колонии — империи: муравьи-рабовладельцы, которые нападают, порабощают и эксплуатируют. Кочевые муравьи, которые разрушают, не строя. Природа показывает нам оба пути и показывает, какой из них выдерживает. Колонии, построенные на сотрудничестве — где каждый муравей делает свою часть, где солдаты выбирают жертвовать собой, где рабочие несут непосильный груз, потому что отказываются подвести своих сестёр — это колонии, которые выживают миллионы лет. Захватчики приходят и уходят как бури. Но строители остаются. Может быть, самые маленькие создания на Земле преподают нам самый великий урок: то, что мы строим вместе, всегда сильнее того, что мы разрушаем поодиночке."
    image: "natures-lesson.jpg"
    imageAlt:
      en: "Single ant silhouetted on a tall grass blade at golden sunset, vast meadow and rebuilt anthill below, enormous sky, small creature against vast world, philosophical and profound"
      es: "Hormiga sola silueteada en una hoja de hierba alta al atardecer dorado, vasto prado y hormiguero reconstruido abajo, cielo enorme, pequena criatura contra el vasto mundo"
      ru: "Одинокий муравей на фоне заката на высокой травинке, бескрайний луг и восстановленный муравейник внизу, огромное небо, маленькое существо на фоне огромного мира"

