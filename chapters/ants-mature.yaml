      personality: "The immovable guardian — willing to give everything, speaks softly but holds absolutely, peace in his eyes even in his final stand"
      notLike: "NOT lean like Scout, NOT small like Tiny, NOT regal like Queen Terra"

  style:
    global: "Classic hand-drawn Disney animation style inspired by the Golden Age (Snow White, Bambi). Warm organic flowing lines with natural variation in line weight. Large soulful expressive eyes. Painterly brushstrokes visible in earth, leaves, and tunnel walls. Soft rounded character proportions. Vintage animation cel warmth with gentle watercolor-like backgrounds. Meadow and underground settings with rich browns, dramatic golden and red lighting, epic atmosphere. Emotional depth and gravitas appropriate for mature themes of sacrifice and endurance."

viewerDetails:
- title:
    en: "Mandible Power"
    es: "Poder de las Mandibulas"
    ru: "Сила челюстей"
  description:
    en: "Look at Major's massive mandibles — those are his jaws! Ant mandibles are like a Swiss Army knife: they can cut leaves, dig tunnels, carry food, feed baby ants, and fight off enemies. Major's mandibles are especially large because he's a soldier ant. The inside edges are serrated like a tiny saw blade, perfect for gripping and cutting. In battle, soldier ants can snap their mandibles shut with enough force to fling an enemy ant through the air. Some trap-jaw ants can close their jaws at speeds of up to 230 kilometers per hour — one of the fastest movements in nature."
    es: "Mira las mandibulas masivas de Mayor — esas son sus quijadas! Las mandibulas de las hormigas son como una navaja suiza: pueden cortar hojas, cavar tuneles, cargar comida, alimentar bebes y luchar contra enemigos. Las mandibulas de Mayor son especialmente grandes porque es un soldado. En batalla, las hormigas soldado pueden cerrar sus mandibulas con suficiente fuerza para lanzar a una hormiga enemiga por el aire."
    ru: "Посмотрите на массивные мандибулы Майора — это его челюсти! Челюсти муравья как швейцарский нож: ими можно резать листья, копать тоннели, переносить еду, кормить малышей и отбиваться от врагов. В бою муравьи-солдаты могут захлопнуть челюсти с силой, достаточной, чтобы отбросить врага. Некоторые муравьи-капканчики закрывают челюсти со скоростью до 230 км/ч — одно из самых быстрых движений в природе."
  image: "detail-mandible-closeup.jpg"

- title:
    en: "Amazing Antennae"
    es: "Antenas Asombrosas"
    ru: "Удивительные усики"
  description:
    en: "Scout's antennae are her most critical survival tools. Each antenna has a special elbow joint that lets it bend and sweep in all directions. The tip contains thousands of scent receptors that can detect chemical signals — including the alarm pheromones that saved the colony. When Scout detected the army ants, her antennae picked up their chemical signature from hundreds of body lengths away. Ants can distinguish between dozens of different pheromone messages: food trails, alarm signals, colony identification, and even death signals that tell workers to remove fallen colony-mates."
    es: "Las antenas de Exploradora son sus herramientas de supervivencia mas criticas. Cada antena tiene una articulacion que le permite doblarse y barrer en todas direcciones. La punta contiene miles de receptores de olor que detectan senales quimicas — incluyendo las feromonas de alarma que salvaron la colonia. Los muravьi pueden distinguir entre docenas de mensajes de feromonas diferentes."
    ru: "Усики Разведчицы — её важнейшие инструменты выживания. На каждом есть локтевой сустав для сгибания во всех направлениях. Кончик содержит тысячи рецепторов запаха, улавливающих химические сигналы — включая тревожные феромоны, спасшие колонию. Когда Разведчица обнаружила кочевых муравьёв, её усики уловили их химическую подпись за сотни длин тела. Муравьи различают десятки разных феромонных сигналов: пищевые тропы, тревогу, опознание колонии и даже сигналы смерти."
  image: "detail-antenna-closeup.jpg"

- title:
    en: "Armor Exoskeleton"
    es: "Exoesqueleto Armadura"
    ru: "Экзоскелет-броня"
  description:
    en: "Queen Terra's body is encased in chitin — a material so strong that it inspired human engineers to develop new armor technologies. The exoskeleton is divided into plates connected by flexible joints, allowing full mobility while providing protection. In battle, Major's thicker exoskeleton can withstand multiple bites from raider mandibles. The chitin also serves as chemical armor — its surface properties can neutralize some of the formic acid sprayed by enemy ants. After millions of years of evolution, ant armor is one of nature's most sophisticated defense systems."
    es: "El cuerpo de la Reina Terra esta envuelto en quitina — un material tan fuerte que inspiro a los ingenieros humanos a desarrollar nuevas tecnologias de armadura. El exoesqueleto esta dividido en placas conectadas por articulaciones flexibles. En batalla, el exoesqueleto mas grueso de Mayor puede resistir multiples mordidas de mandibulas invasoras."
    ru: "Тело Королевы Терры заключено в хитин — материал настолько прочный, что вдохновил инженеров на создание новых технологий брони. Экзоскелет разделён на пластины с гибкими суставами, обеспечивая подвижность и защиту. В бою более толстый экзоскелет Майора выдерживает множество укусов. Хитин также служит химической бронёй — его поверхность может нейтрализовать часть муравьиной кислоты противника."
  image: "detail-exoskeleton-texture.jpg"

- title:
    en: "Grip and Climb"
    es: "Agarre y Escalada"
    ru: "Хватка и лазание"
  description:
    en: "Each ant foot has two tarsal claws plus a sticky arolium pad — a dual-grip system that lets ants walk on almost any surface. During the colony evacuation, Tiny used these grips to run at full speed through vertical tunnel sections while carrying eggs heavier than herself. The tarsal claws hook into rough surfaces while the arolium creates wet adhesion on smooth ones. This system is so effective that engineers study it to design better climbing robots. Even on surfaces covered in formic acid from battle, an ant's grip rarely fails — a matter of life and death when carrying the colony's future."
    es: "Cada pata de hormiga tiene dos garras tarsales mas una almohadilla adhesiva — un sistema de doble agarre que permite a las hormigas caminar sobre casi cualquier superficie. Durante la evacuacion, Diminuta uso estos agarres para correr a toda velocidad por secciones verticales mientras cargaba huevos mas pesados que ella misma."
    ru: "На каждой лапке два тарзальных коготка плюс липкая подушечка-аролиум — двойная система захвата, позволяющая ходить почти по любой поверхности. Во время эвакуации Крошка использовала эту хватку, чтобы бежать на полной скорости по вертикальным участкам тоннелей, неся яйца тяжелее себя. Коготки цепляются за шероховатости, а аролиум создаёт влажную адгезию на гладких поверхностях. Эта система настолько эффективна, что инженеры изучают её для создания роботов-альпинистов."
  image: "detail-leg-grip.jpg"

