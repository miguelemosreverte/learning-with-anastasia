funFacts:
  title:
    en: "Amazing Ant Facts!"
    es: "Datos Asombrosos sobre Hormigas!"
    ru: "Удивительные факты о муравьях!"
  facts:
    - title:
        en: "Super Strength"
        es: "Super Fuerza"
        ru: "Суперсила"
      content:
        en: "Ants can carry objects 50 times their own body weight! That's like a human picking up a car and carrying it over their head. Their secret is their exoskeleton — a hard outer shell that acts like a suit of armor and gives their muscles incredible leverage. Some species can even carry 100 times their weight when working together!"
        es: "Las hormigas pueden cargar objetos 50 veces su propio peso! Eso es como si un humano levantara un auto y lo cargara sobre su cabeza. Su secreto es su exoesqueleto — una cubierta exterior dura que actua como una armadura y da a sus musculos una palanca increible. Algunas especies pueden incluso cargar 100 veces su peso cuando trabajan juntas!"
        ru: "Муравьи могут нести предметы в 50 раз тяжелее собственного веса! Это как если бы человек поднял автомобиль и нёс его над головой. Их секрет — экзоскелет, твёрдая внешняя оболочка, которая действует как доспехи и даёт их мышцам невероятный рычаг. Некоторые виды могут нести даже в 100 раз больше своего веса, работая вместе!"
      image: "fun-fact-strength.jpg"

    - title:
        en: "Mega Colonies"
        es: "Mega Colonias"
        ru: "Мегаколонии"
      content:
        en: "Some ant colonies can have MILLIONS of members! The largest known ant supercolony stretches over 6,000 kilometers across southern Europe — that's wider than the United States! These massive colonies have multiple queens and billions of workers. A single colony of leafcutter ants can strip a whole tree of its leaves in one night!"
        es: "Algunas colonias de hormigas pueden tener MILLONES de miembros! La supercolonia de hormigas mas grande conocida se extiende por mas de 6,000 kilometros a traves del sur de Europa — eso es mas ancho que los Estados Unidos! Estas colonias masivas tienen multiples reinas y miles de millones de trabajadoras."
        ru: "Некоторые колонии муравьёв могут насчитывать МИЛЛИОНЫ членов! Самая большая известная суперколония муравьёв простирается на более чем 6 000 километров через южную Европу — это шире, чем США! Эти огромные колонии имеют множество королев и миллиарды рабочих."
      image: "fun-fact-colony-size.jpg"

    - title:
        en: "Scent Language"
        es: "Lenguaje de Olores"
        ru: "Язык запахов"
      content:
        en: "Ants talk to each other using special chemicals called pheromones! They leave scent trails on the ground to say 'food this way,' release alarm scents that mean 'danger!', and even have a special smell that says 'I'm from this colony.' An ant's antennae can detect incredibly tiny amounts of these chemicals — it's like having a super-powered nose on your head!"
        es: "Las hormigas hablan entre si usando quimicos especiales llamados feromonas! Dejan rastros de olor en el suelo para decir 'comida por aqui,' liberan olores de alarma que significan 'peligro!', e incluso tienen un olor especial que dice 'soy de esta colonia.'"
        ru: "Муравьи разговаривают друг с другом с помощью особых химических веществ — феромонов! Они оставляют пахучие следы на земле, чтобы сказать 'еда тут,' выпускают тревожные запахи, означающие 'опасность!', и даже имеют особый запах, говорящий 'я из этой колонии.'"
      image: "fun-fact-scent-trails.jpg"

    - title:
        en: "Tiny Farmers"
        es: "Pequenas Granjeras"
        ru: "Крошечные фермеры"
      content:
        en: "Leafcutter ants have been farming fungus for over 50 MILLION years — that's way before humans even existed! They cut leaves, carry them underground, chew them into a paste, and grow a special fungus on top. They even use natural antibiotics to keep their gardens disease-free. They were the world's first farmers, and they're still some of the best!"
        es: "Las hormigas cortadoras de hojas han cultivado hongos por mas de 50 MILLONES de anos — eso es mucho antes de que los humanos existieran! Cortan hojas, las llevan bajo tierra, las mastican hasta hacer una pasta y cultivan un hongo especial encima. Fueron las primeras granjeras del mundo!"
        ru: "Муравьи-листорезы выращивают грибы уже более 50 МИЛЛИОНОВ лет — это задолго до появления людей! Они срезают листья, несут их под землю, пережёвывают в пасту и выращивают на ней особый гриб. Они были первыми фермерами в мире и до сих пор одни из лучших!"
      image: "fun-fact-fungus-farming.jpg"

