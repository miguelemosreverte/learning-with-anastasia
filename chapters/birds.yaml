    prompt: "Show a weaver bird looking sadly at a torn-apart nest that has been rejected and dismantled. A few grass strips hanging from the branch where a nest used to be. Same art style as reference."
    hidden: true

  - id: "fun-fact-sociable-weaver"
    image: "fun-fact-sociable-weaver.jpg"
    prompt: "A massive communal nest of sociable weaver birds covering an entire tree, like an apartment building made of grass. Hundreds of entrance holes visible. African savanna setting. Studio Ghibli warmth, Pixar quality, child-friendly."
    hidden: true

  - id: "fun-fact-tailorbird"
    image: "fun-fact-tailorbird.jpg"
    prompt: "A tiny common tailorbird stitching two large leaves together with plant fibers to create a cradle-shaped nest. Show the sewing action clearly. Tropical forest setting. Studio Ghibli warmth, Pixar quality, child-friendly."
    hidden: true

  # Magazine Cover
  - id: magazine-cover
