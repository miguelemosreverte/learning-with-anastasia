    prompt: "Using the weaver bird from reference, show this character at high speed weaving strips into a nest, motion blur on wings. Dynamic action scene showing the speed of construction. Same character and art style."
    hidden: true

  - id: "fun-fact-nest-rejection"
    image: "fun-fact-nest-rejection.jpg"
