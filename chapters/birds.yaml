      es: "Zuri la tejedora en su nido completado con Rosie y Boris al fondo, portada de revista"
      ru: "Зури-ткач на своём готовом гнезде с Рози и Борисом на заднем плане, обложка журнала"

funFacts:
  title:
    en: "Amazing Bird Builder Facts!"
    es: "¡Datos Asombrosos sobre Aves Constructoras!"
    ru: "Удивительные факты о птицах-строителях!"
  facts:
    - title:
        en: "Speed Builders"
        es: "Constructoras Veloces"
        ru: "Скоростные строители"
      content:
        en: "A village weaver bird can build an entire nest in just 9 to 14 hours! They weave over 300 individual grass strips, making thousands of precise movements with their beak and feet."
        es: "¡Un ave tejedora puede construir un nido entero en solo 9 a 14 horas! Tejen más de 300 tiras individuales de hierba, haciendo miles de movimientos precisos con su pico y patas."
        ru: "Птица-ткач может построить целое гнездо всего за 9-14 часов! Они вплетают более 300 отдельных травинок, совершая тысячи точных движений клювом и лапками."
      image: "fun-fact-weaving-speed.jpg"

    - title:
        en: "Quality Control"
        es: "Control de Calidad"
        ru: "Контроль качества"
      content:
        en: "Female weavers are very picky! They inspect the male's nest carefully, tugging at the weave to test its strength. If the nest isn't good enough, they tear it apart and the male must start over!"
        es: "¡Las hembras tejedoras son muy exigentes! Inspeccionan el nido del macho cuidadosamente, tirando del tejido para probar su resistencia. ¡Si el nido no es lo suficientemente bueno, lo deshacen y el macho debe empezar de nuevo!"
        ru: "Самки-ткачи очень придирчивы! Они тщательно осматривают гнездо самца, дёргая за плетение, чтобы проверить его прочность. Если гнездо недостаточно хорошее, они его разрывают, и самец должен начать заново!"
      image: "fun-fact-nest-rejection.jpg"

    - title:
        en: "Bird Apartments"
        es: "Apartamentos de Aves"
        ru: "Птичьи квартиры"
      content:
        en: "Sociable weaver birds build the largest nests of any bird — communal structures up to 20 feet long that house over 500 birds! These 'apartment buildings' can last over 100 years."
        es: "¡Las aves tejedoras sociables construyen los nidos más grandes de cualquier ave — estructuras comunales de hasta 6 metros de largo que albergan a más de 500 aves! Estos 'edificios de apartamentos' pueden durar más de 100 años."
        ru: "Общественные ткачи строят самые большие гнёзда среди всех птиц — общие сооружения до 6 метров длиной, в которых живут более 500 птиц! Эти «многоквартирные дома» могут простоять более 100 лет."
      image: "fun-fact-sociable-weaver.jpg"

    - title:
        en: "The Tailor Bird"
        es: "El Ave Costurera"
        ru: "Птица-портной"
      content:
        en: "The common tailorbird literally sews its nest! It pierces holes in large leaves with its sharp beak, then stitches them together with plant fibers or spider silk to create a cozy leaf cradle."
        es: "¡El ave costurera literalmente cose su nido! Perfora agujeros en hojas grandes con su pico afilado, luego las cose con fibras vegetales o seda de araña para crear una acogedora cuna de hojas."
        ru: "Птица-портной буквально сшивает своё гнездо! Она прокалывает отверстия в больших листьях острым клювом, затем сшивает их растительными волокнами или паутиной, создавая уютную колыбельку из листьев."
      image: "fun-fact-tailorbird.jpg"

