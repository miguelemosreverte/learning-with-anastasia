viewerDetails:
- title:
    en: "Weaving Technique"
    es: "Técnica de Tejido"
    ru: "Техника плетения"
  description:
    en: "Look closely at the nest wall — each grass strip goes over one strip and under the next, just like weaving fabric! This interlocking pattern makes the nest incredibly strong despite being made of simple grass."
    es: "¡Mira de cerca la pared del nido — cada tira de hierba pasa por encima de una tira y por debajo de la siguiente, igual que tejer tela! Este patrón entrelazado hace que el nido sea increíblemente fuerte a pesar de estar hecho de hierba simple."
    ru: "Присмотритесь к стенке гнезда — каждая травинка проходит поверх одной полоски и под следующей, точно как плетение ткани! Этот переплетённый узор делает гнездо невероятно прочным, несмотря на то что оно сделано из простой травы."
  image: "detail-weaving-closeup.jpg"

- title:
    en: "The Entrance Tube"
    es: "El Tubo de Entrada"
    ru: "Входная трубка"
  description:
    en: "The nest entrance points downward like a tube — this is brilliant engineering! Rain rolls off instead of dripping in, and predators like snakes have a very hard time climbing up into the nest."
    es: "La entrada del nido apunta hacia abajo como un tubo — ¡esto es ingeniería brillante! La lluvia se escurre en lugar de gotear adentro, y los depredadores como las serpientes tienen mucha dificultad para trepar al nido."
    ru: "Вход в гнездо направлен вниз, как трубка — это гениальная инженерия! Дождь стекает, а не капает внутрь, и хищникам, таким как змеи, очень сложно забраться в гнездо."
  image: "detail-entrance-tube.jpg"

- title:
    en: "Spider Silk Magic"
    es: "Magia de la Seda de Araña"
    ru: "Магия паутины"
  description:
    en: "Rosie's hummingbird nest uses spider silk as both glue and thread — and it's stretchy! As her chicks grow bigger, the silk stretches so the nest expands. It's like a nest that grows with the babies!"
    es: "¡El nido de colibrí de Rosie usa seda de araña como pegamento e hilo — y es elástica! A medida que sus polluelos crecen, la seda se estira para que el nido se expanda. ¡Es como un nido que crece con los bebés!"
    ru: "Гнездо колибри Рози использует паутину как клей и нить — и она эластичная! По мере роста птенцов паутина растягивается, и гнездо расширяется. Это как гнездо, которое растёт вместе с малышами!"
  image: "detail-spider-silk.jpg"

- title:
    en: "Boris's Blue Collection"
    es: "La Colección Azul de Boris"
    ru: "Синяя коллекция Бориса"
  description:
    en: "Boris collects ONLY blue objects for his bower — he's very particular! Blue flowers, blue berries, blue bottle caps, blue feathers. Scientists think this shows females how good he is at finding rare things."
    es: "¡Boris colecciona SOLO objetos azules para su glorieta — es muy particular! Flores azules, bayas azules, tapas de botellas azules, plumas azules. Los científicos creen que esto muestra a las hembras lo bueno que es encontrando cosas raras."
    ru: "Борис собирает ТОЛЬКО синие предметы для своей беседки — он очень избирательный! Синие цветы, синие ягоды, синие крышечки от бутылок, синие перья. Учёные считают, что так он показывает самкам, как хорошо он умеет находить редкие вещи."
  image: "detail-bower-decoration.jpg"

