sections:
  # The King's Territory
  - id: meet-kazi
    generate_character: true
    mood: [epic-skies, golden-hour]
    title:
      en: "The King's Territory"
      es: "El Territorio del Rey"
      ru: "Территория короля"
    content:
      en: "Kazi surveys his kingdom from the highest kopje — a rocky island rising from the sea of golden grass. His dark brown mane, thick and full, cascades around his scarred face like a crown forged in battle. Every scratch tells a story. Every scar is a victory. For three years, Kazi has held this territory — fifteen square miles of prime savanna with the best watering holes, the richest hunting grounds, and the safest denning sites. His pride numbers twelve: eight lionesses, two adolescents, and his two young cubs. He earned every one of them through strength, vigilance, and the thunderous roar that shakes the earth each dusk. But Kazi knows what every king knows — his reign has an expiration date. Somewhere out there, a younger, hungrier male is watching. Waiting."
      es: "Kazi inspecciona su reino desde el kopje más alto — una isla rocosa que se eleva del mar de hierba dorada. Su melena marrón oscura, espesa y abundante, cae alrededor de su rostro cicatrizado como una corona forjada en batalla. Cada rasguño cuenta una historia. Cada cicatriz es una victoria. Durante tres años, Kazi ha mantenido este territorio — veinticuatro kilómetros cuadrados de sabana principal con los mejores abrevaderos, los terrenos de caza más ricos y los sitios de guarida más seguros. Su manada cuenta doce: ocho leonas, dos adolescentes y sus dos cachorros pequeños. Se ganó a cada uno con fuerza, vigilancia y el atronador rugido que sacude la tierra cada atardecer. Pero Kazi sabe lo que todo rey sabe — su reinado tiene fecha de vencimiento. En algún lugar allá afuera, un macho más joven y hambriento está observando. Esperando."
      ru: "Кази осматривает своё королевство с самого высокого копье — скалистого острова, поднимающегося из моря золотой травы. Его тёмно-коричневая грива, густая и пышная, ниспадает вокруг его испещрённого шрамами лица как корона, выкованная в бою. Каждая царапина рассказывает историю. Каждый шрам — это победа. Три года Кази удерживает эту территорию — двадцать четыре квадратных километра лучшей саванны с лучшими водопоями, богатейшими охотничьими угодьями и самыми безопасными логовами. Его прайд насчитывает двенадцать: восемь львиц, два подростка и двое его маленьких львят. Он заслужил каждого из них силой, бдительностью и громовым рыком, сотрясающим землю на каждом закате. Но Кази знает то, что знает каждый король — у его правления есть срок годности. Где-то там, снаружи, более молодой, более голодный самец наблюдает. Ждёт."
    image: "kazi-portrait.jpg"
    imageAlt:
      en: "Battle-scarred magnificent male lion with huge dark brown mane standing on a rocky kopje, golden amber eyes surveying vast territory, dramatic sky, powerful and weathered"
      es: "Magnífico león macho marcado por la batalla con enorme melena marrón oscura de pie en un kopje rocoso, ojos dorados de ámbar inspeccionando vasto territorio, cielo dramático, poderoso y curtido"
      ru: "Великолепный покрытый шрамами лев-самец с огромной тёмно-коричневой гривой стоит на скалистом копье, золотисто-янтарные глаза осматривают обширную территорию, драматичное небо, мощный и закалённый"

  # The Challenger Arrives
  - id: challenger-arrives
    generate_character: true
    mood: [epic-skies]
    use_character: "${meet-kazi.image}"
    action: "two male lions facing each other across a dusty savanna clearing — one older with a huge dark brown mane and battle scars, the other younger with a wild tawny mane, lean and hungry-looking. They stare each other down with intense aggression. Dust swirls between them. Dramatic stormy sky, tension palpable, African savanna. Both lions are large and muscular."
    title:
      en: "The Challenger Arrives"
      es: "El Retador Llega"
      ru: "Появление претендента"
    content:
      en: "He comes at dusk, when the sky burns orange. A young male, lean and wild, with a tawny mane still growing in. His name doesn't matter — what matters is his hunger. Not for food, but for what Kazi has: a pride, a territory, a legacy. The young male has been wandering alone for two years since his own father drove him out — as all pride males eventually do to their sons, to prevent competition. He's survived hyenas, starvation, and other nomad males. He is hardened. He is desperate. He roars from the eastern boundary, and the sound rolls across the savanna like a declaration of war. Kazi hears it. His mane bristles. His amber eyes narrow. 'Stay with the cubs,' he tells Dalila. And he walks toward the sound. A king does not hide from a challenge."
      es: "Llega al anochecer, cuando el cielo arde en naranja. Un macho joven, delgado y salvaje, con una melena leonada aún creciendo. Su nombre no importa — lo que importa es su hambre. No de comida, sino de lo que Kazi tiene: una manada, un territorio, un legado. El joven macho ha vagado solo durante dos años desde que su propio padre lo expulsó — como todos los machos de manada eventualmente hacen con sus hijos, para prevenir competencia. Ha sobrevivido hienas, hambre y otros machos nómadas. Está endurecido. Está desesperado. Ruge desde el límite oriental, y el sonido rueda por la sabana como una declaración de guerra. Kazi lo escucha. Su melena se eriza. Sus ojos ámbar se estrechan. 'Quédate con los cachorros,' le dice a Dalila. Y camina hacia el sonido."
      ru: "Он приходит на закате, когда небо горит оранжевым. Молодой самец, поджарый и дикий, с рыжеватой гривой, ещё растущей. Его имя не важно — важен его голод. Не по еде, а по тому, что есть у Кази: прайд, территория, наследие. Молодой самец скитался один два года с тех пор, как его собственный отец изгнал его — как все вожаки прайдов в конце концов поступают со своими сыновьями, чтобы предотвратить конкуренцию. Он пережил гиен, голод и других бродячих самцов. Он закалён. Он отчаян. Он рычит с восточной границы, и звук катится по саванне как объявление войны. Кази слышит. Его грива встаёт дыбом. Янтарные глаза сужаются. 'Оставайся с львятами,' говорит он Далиле. И идёт навстречу звуку. Король не прячется от вызова."
    image: "challenger-arrives.jpg"
    imageAlt:
      en: "Two male lions facing off across dusty savanna clearing, one older with dark mane and scars, one younger with tawny mane, intense staredown, dramatic stormy sky"
      es: "Dos leones machos enfrentándose en un claro polvoriento de la sabana, uno mayor con melena oscura y cicatrices, otro más joven con melena leonada, mirada intensa, cielo tormentoso dramático"
      ru: "Два льва-самца стоят друг напротив друга на пыльной поляне саванны, один старше с тёмной гривой и шрамами, другой моложе с рыжеватой гривой, напряжённое противостояние, драматичное грозовое небо"

  # Battle for the Pride
  - id: battle-for-pride
    mood: [epic-skies]
    use_characters: ["${meet-kazi.image}", "${challenger-arrives.image}"]
    action: "two massive male lions locked in ferocious combat — rearing up on hind legs, paws striking at each other, mouths open showing teeth, manes tangled, dust exploding around them. One has a dark brown mane, the other a tawny wild mane. Raw power and fury. Dramatic sky with storm clouds, African savanna, the ground torn up beneath them"
    title:
      en: "Battle for the Pride"
      es: "Batalla por la Manada"
      ru: "Битва за прайд"
    content:
      en: "The battle is unlike anything the savanna has seen in years. Two titans collide in an explosion of dust, muscle, and fury. They rear up on their hind legs — each over 400 pounds of pure power — and slam into each other. Claws rake across manes. Teeth find flesh. Their roars shake the ground. The lionesses watch from the ridge, cubs pressed between their paws. Dalila's eyes never leave Kazi. The fight lasts nearly thirty minutes — an eternity in lion warfare. Kazi is stronger, more experienced. But the challenger is younger, faster, and has nothing to lose. They break apart, panting. Blood mats both manes. Then the young male charges again. Kazi meets him head-on. This is not about pride or ego. This is about everything — his lionesses, his cubs, his bloodline. This is the law of the savanna: only the strongest may lead."
      es: "La batalla es como nada que la sabana haya visto en años. Dos titanes chocan en una explosión de polvo, músculo y furia. Se elevan sobre sus patas traseras — cada uno más de 180 kilos de puro poder — y se estrellan uno contra otro. Las garras rasgan las melenas. Los dientes encuentran carne. Sus rugidos sacuden la tierra. Las leonas observan desde la cresta, cachorros presionados entre sus patas. Los ojos de Dalila nunca dejan a Kazi. La pelea dura casi treinta minutos — una eternidad en la guerra leonina. Kazi es más fuerte, más experimentado. Pero el retador es más joven, más rápido, y no tiene nada que perder. Se separan, jadeando. La sangre apelmaza ambas melenas. Entonces el joven macho carga de nuevo. Kazi lo enfrenta de lleno. Esto no se trata de orgullo o ego. Se trata de todo — sus leonas, sus cachorros, su linaje."
      ru: "Битва не похожа ни на что, что саванна видела за последние годы. Два титана сталкиваются во взрыве пыли, мышц и ярости. Они встают на задние лапы — каждый более 180 килограммов чистой мощи — и обрушиваются друг на друга. Когти рвут гривы. Зубы находят плоть. Их рык сотрясает землю. Львицы наблюдают с гребня, львята прижаты между их лапами. Глаза Далилы не отрываются от Кази. Бой длится почти тридцать минут — вечность в львиной войне. Кази сильнее, опытнее. Но претендент моложе, быстрее, и ему нечего терять. Они расходятся, задыхаясь. Кровь склеивает обе гривы. Затем молодой самец атакует снова. Кази встречает его в лоб. Речь не о гордости или эго. Речь обо всём — его львицах, его львятах, его родословной. Таков закон саванны: только сильнейший может вести."
    image: "battle-pride.jpg"
    imageAlt:
      en: "Two massive male lions locked in ferocious combat, rearing up on hind legs, claws and teeth, dust exploding, dark mane versus tawny mane, dramatic storm sky"
      es: "Dos enormes leones machos trabados en feroz combate, erguidos sobre las patas traseras, garras y dientes, polvo explotando, melena oscura contra melena leonada, cielo tormentoso dramático"
      ru: "Два огромных льва-самца в яростной схватке, встав на задние лапы, когти и зубы, взрыв пыли, тёмная грива против рыжеватой, драматичное грозовое небо"

  # The Pride's Many Mothers
  - id: pride-mothers
    mood: [soft-intimate, golden-hour]
    use_characters: ["${meet-dalila.image}"]
    action: "group of five lionesses resting together in golden grass with several small cubs of different ages nursing, playing, and being groomed — one lioness with a small notch on her left ear nursing two cubs while another lioness grooms a different cub nearby. Warm intimate scene, golden hour light, communal and nurturing, African savanna with acacia shade"
    title:
      en: "The Pride's Many Mothers"
      es: "Las Muchas Madres de la Manada"
      ru: "Множество матерей прайда"
    content:
      en: "While males fight for dominance, the true backbone of the pride is its lionesses. A pride is a matrilineal society — the females are all related: mothers, daughters, sisters, aunts. They are born into the pride and stay for life. Unlike males, who come and go, the lionesses are the permanent residents, the keepers of knowledge — which watering holes are safe, where the best hunting routes lie, when the migrations pass through. Dalila nurses her cubs alongside her sister and two cousins. The cubs feed from any willing mother — in a pride, every cub belongs to every female. If Dalila falls in a hunt, her sister will raise Taji and Zuri as her own. This communal motherhood is not sentiment — it is survival strategy, refined over millions of years."
      es: "Mientras los machos luchan por la dominancia, la verdadera columna vertebral de la manada son las leonas. Una manada es una sociedad matrilineal — las hembras están todas emparentadas: madres, hijas, hermanas, tías. Nacen en la manada y se quedan de por vida. A diferencia de los machos, que vienen y van, las leonas son las residentes permanentes, las guardianas del conocimiento — qué abrevaderos son seguros, dónde están las mejores rutas de caza, cuándo pasan las migraciones. Dalila amamanta a sus cachorros junto a su hermana y dos primas. Los cachorros se alimentan de cualquier madre dispuesta — en una manada, cada cachorro pertenece a todas las hembras. Si Dalila cae en una cacería, su hermana criará a Taji y Zuri como propios. Esta maternidad comunal no es sentimentalismo — es estrategia de supervivencia, refinada durante millones de años."
      ru: "Пока самцы сражаются за господство, истинный стержень прайда — его львицы. Прайд — это матрилинейное общество: все самки — родственницы: матери, дочери, сёстры, тётки. Они рождаются в прайде и остаются на всю жизнь. В отличие от самцов, которые приходят и уходят, львицы — постоянные жительницы, хранительницы знаний: какие водопои безопасны, где лучшие охотничьи маршруты, когда проходят миграции. Далила кормит своих львят рядом со своей сестрой и двумя кузинами. Детёныши кормятся у любой согласной матери — в прайде каждый львёнок принадлежит каждой самке. Если Далила погибнет на охоте, её сестра вырастит Таджи и Зури как своих. Это коллективное материнство — не сентиментальность, а стратегия выживания, отточенная миллионами лет."
    image: "pride-mothers.jpg"

  # Mating Season
  - id: mating-season
    mood: [golden-hour, soft-intimate]
    use_characters: ["${meet-kazi.image}", "${meet-dalila.image}"]
    action: "male lion with huge dark brown mane and sleek golden lioness with notched ear standing very close together, nuzzling affectionately, in golden savanna grass at warm sunset. Tender but powerful moment, both looking at each other with intensity. African savanna, warm golden light, intimate natural moment"
    title:
      en: "Mating Season"
      es: "Temporada de Apareamiento"
      ru: "Брачный сезон"
    content:
      en: "When a lioness comes into estrus, a remarkable biological event unfolds. For four to five days, the mating pair becomes inseparable. They leave the pride, finding a private spot on the savanna. The intensity of their pairing is staggering by any standard in the animal kingdom: lions mate approximately every 15 to 20 minutes, day and night, totaling 20 to 40 couplings per day — sometimes as many as 50. Each coupling is brief, lasting only seconds, but the sheer frequency serves an essential biological purpose: it stimulates ovulation in the lioness, which does not occur without repeated mating. Kazi stays close to Dalila throughout, guarding her from rival males and refusing to eat or drink. He may lose significant body weight during these few days. This exhausting ritual ensures his genes — and his alone — will pass to the next generation. It is nature at its most demanding and purposeful."
      es: "Cuando una leona entra en celo, se desarrolla un evento biológico notable. Durante cuatro a cinco días, la pareja reproductora se vuelve inseparable. Dejan la manada, encontrando un lugar privado en la sabana. La intensidad de su apareamiento es asombrosa por cualquier estándar del reino animal: los leones se aparean aproximadamente cada 15 a 20 minutos, día y noche, totalizando de 20 a 40 apareamientos por día — a veces hasta 50. Cada apareamiento es breve, durando solo segundos, pero la pura frecuencia sirve un propósito biológico esencial: estimula la ovulación en la leona, que no ocurre sin el apareamiento repetido. Kazi permanece cerca de Dalila todo el tiempo, protegiéndola de machos rivales y negándose a comer o beber. Puede perder peso corporal significativo durante estos días. Este ritual agotador asegura que sus genes — y solo los suyos — pasarán a la siguiente generación."
      ru: "Когда у львицы наступает течка, разворачивается замечательное биологическое событие. В течение четырёх-пяти дней пара становится неразлучной. Они покидают прайд, находя уединённое место в саванне. Интенсивность их спаривания поразительна по любым меркам животного мира: львы спариваются примерно каждые 15-20 минут, днём и ночью, в общей сложности от 20 до 40 раз в день — иногда до 50. Каждое спаривание кратко, длится лишь секунды, но сама частота служит важнейшей биологической цели: она стимулирует овуляцию у львицы, которая не происходит без многократного спаривания. Кази остаётся рядом с Далилой всё время, охраняя её от соперников и отказываясь от еды и воды. Он может значительно потерять в весе за эти дни. Этот изнурительный ритуал гарантирует, что его гены — и только его — перейдут к следующему поколению."
    image: "mating-season.jpg"

  # New Life and Danger
  - id: new-life-danger
    mood: [soft-intimate]
    use_characters: ["${meet-dalila.image}"]
    action: "golden lioness with notched left ear lying protectively in a hidden rocky den with two very small newborn lion cubs pressed against her, one lighter colored and one darker. The den is secluded and sheltered. Mother's expression is fierce and watchful. Dramatic lighting, contrast between the warmth inside the den and the harsh landscape outside"
    title:
      en: "New Life and Danger"
      es: "Nueva Vida y Peligro"
      ru: "Новая жизнь и опасность"
    content:
      en: "Three and a half months after mating, Dalila slips away from the pride to a hidden rocky den. Alone and in secret, she gives birth to Taji and Zuri. They are tiny — barely two pounds each — blind, helpless, and utterly dependent on her warmth and milk. For the first six weeks, Dalila hides them from everything — even the pride. This is not paranoia. Male lions — including the pride male himself in rare cases — may kill cubs that are not their own. Nomad males sneaking through the territory pose the greatest threat. Hyenas will take unguarded cubs without hesitation. Even eagles can snatch a newborn. Dalila eats little, drinks little, and barely sleeps. Every sound makes her ears swivel, every shadow makes her tense. She is mother, guardian, and fortress. When she finally introduces the cubs to the pride, she watches every interaction with fierce, unblinking attention."
      es: "Tres meses y medio después del apareamiento, Dalila se escabulle de la manada a una guarida rocosa oculta. Sola y en secreto, da a luz a Taji y Zuri. Son diminutos — apenas un kilo cada uno — ciegos, indefensos y completamente dependientes de su calor y su leche. Durante las primeras seis semanas, Dalila los esconde de todo — incluso de la manada. Esto no es paranoia. Los leones machos — incluyendo el propio macho de la manada en casos raros — pueden matar cachorros que no son suyos. Los machos nómadas que se cuelan por el territorio representan la mayor amenaza. Las hienas tomarán cachorros desprotegidos sin dudarlo. Incluso las águilas pueden arrebatar a un recién nacido. Dalila come poco, bebe poco y apenas duerme. Cada sonido hace girar sus orejas, cada sombra la tensa. Ella es madre, guardiana y fortaleza."
      ru: "Через три с половиной месяца после спаривания Далила ускользает от прайда в скрытое скалистое логово. Одна и в тайне она рожает Таджи и Зури. Они крошечные — едва по килограмму каждый — слепые, беспомощные и полностью зависимые от её тепла и молока. Первые шесть недель Далила прячет их от всего — даже от прайда. Это не паранойя. Львы-самцы — включая самого вожака прайда в редких случаях — могут убить чужих детёнышей. Бродячие самцы, пробирающиеся через территорию, представляют наибольшую угрозу. Гиены заберут неохраняемых львят без колебаний. Даже орлы могут схватить новорождённого. Далила мало ест, мало пьёт и почти не спит. Каждый звук заставляет её уши повернуться, каждая тень заставляет её напрячься. Она — мать, страж и крепость."
    image: "new-life-danger.jpg"

  # The Fallen King
  - id: fallen-king
    mood: [epic-skies]
    use_characters: ["${meet-kazi.image}"]
    action: "old battle-scarred male lion with dark brown mane walking slowly away from a savanna landscape at dusk, limping slightly, dignity in his posture despite defeat. His mane is matted and torn. He walks alone toward the setting sun. The savanna behind him shows the pride in the far distance. Bittersweet, dramatic golden and purple sky, solitary and powerful in his solitude"
    title:
      en: "The Fallen King"
      es: "El Rey Caído"
      ru: "Павший король"
    content:
      en: "It happens on a night with no moon. The challenger returns — this time not alone. He has found a coalition partner, another young nomad. Two against one. Even Kazi, with all his strength and fury, cannot hold against two prime males. The battle is savage and brief. When it ends, Kazi stands bloody and broken at the edge of his own territory. He has lost. The law of the savanna is absolute — there is no appeal, no second chance, no graceful retirement. A deposed pride male must leave immediately or risk being killed. Kazi limps away into the darkness, alone for the first time in three years. Behind him, his roar still echoes across the land he once ruled. The pride watches him go. The lionesses do not follow — they belong to the territory, not the male. This is how it has always been. A king's reign lasts, on average, just two to three years. Kazi's time is over. But his story is not."
      es: "Ocurre en una noche sin luna. El retador regresa — esta vez no solo. Ha encontrado un compañero de coalición, otro joven nómada. Dos contra uno. Incluso Kazi, con toda su fuerza y furia, no puede resistir contra dos machos en su plenitud. La batalla es salvaje y breve. Cuando termina, Kazi se mantiene de pie, sangriento y quebrantado, al borde de su propio territorio. Ha perdido. La ley de la sabana es absoluta — no hay apelación, no hay segunda oportunidad, no hay jubilación digna. Un macho de manada destronado debe irse inmediatamente o arriesgarse a ser asesinado. Kazi cojea hacia la oscuridad, solo por primera vez en tres años. Detrás de él, su rugido todavía resuena por la tierra que una vez gobernó. La manada lo ve irse. Las leonas no lo siguen — pertenecen al territorio, no al macho. Así ha sido siempre."
      ru: "Это случается в безлунную ночь. Претендент возвращается — на этот раз не один. Он нашёл партнёра по коалиции, другого молодого бродягу. Двое против одного. Даже Кази, со всей его силой и яростью, не может устоять против двух самцов в расцвете сил. Битва жестока и коротка. Когда она заканчивается, Кази стоит окровавленный и сломленный на краю собственной территории. Он проиграл. Закон саванны абсолютен — нет апелляции, нет второго шанса, нет почётной отставки. Свергнутый вожак должен немедленно уйти или рискует быть убитым. Кази хромает прочь в темноту, один впервые за три года. Позади него его рык всё ещё разносится по земле, которой он когда-то правил. Прайд смотрит, как он уходит. Львицы не следуют — они принадлежат территории, не самцу. Так было всегда."
    image: "fallen-king.jpg"
    imageAlt:
      en: "Battle-scarred male lion walking alone into the sunset, dark mane matted and torn, limping with dignity, vast empty savanna behind him, bittersweet golden and purple sky"
      es: "León macho marcado por la batalla caminando solo hacia el atardecer, melena oscura apelmazada y rasgada, cojeando con dignidad, vasta sabana vacía detrás, cielo agridulce dorado y púrpura"
      ru: "Покрытый шрамами лев-самец уходит один в закат, тёмная грива спутана и порвана, хромает с достоинством, бескрайняя пустая саванна позади, горько-сладкое золотисто-пурпурное небо"

  # A Mother's Fierce Defense
  - id: mothers-defense
    mood: [epic-skies]
    use_characters: ["${meet-dalila.image}", "${challenger-arrives.image}"]
    action: "fierce golden lioness with notched left ear standing protectively over two cowering lion cubs, snarling with teeth bared at an approaching male lion with tawny mane. The lioness is between the male and the cubs, body tense and ready to fight. Dramatic lighting, dust in the air, African savanna, intense confrontation"
    title:
      en: "A Mother's Fierce Defense"
      es: "La Feroz Defensa de una Madre"
      ru: "Яростная защита матери"
    content:
      en: "The new males waste no time. Their biological imperative is clear: eliminate the former king's cubs so the lionesses will come into estrus again and bear their offspring instead. This is not cruelty — it is evolution's cold arithmetic. A male's window of dominance is short; he cannot afford to spend it raising another male's genes. The new coalition approaches Taji and Zuri. But they did not account for Dalila. She stands over her cubs, teeth bared, every muscle coiled like a spring. Her snarl could freeze blood. She is smaller than either male, outweighed by a hundred pounds, but she does not flinch. She swipes at the first male's face, drawing blood. He recoils, stunned. No kill is worth losing an eye. The other lionesses join Dalila, forming a wall of teeth and claws. Together, the mothers hold the line. Not every lioness succeeds in this defense — in many prides, cubs are lost to new males. But Dalila's ferocity, backed by her sisters, gives Taji and Zuri a chance. Nature does not guarantee survival. It guarantees opportunity."
      es: "Los nuevos machos no pierden tiempo. Su imperativo biológico es claro: eliminar a los cachorros del antiguo rey para que las leonas entren en celo nuevamente y tengan su descendencia. Esto no es crueldad — es la fría aritmética de la evolución. La ventana de dominancia de un macho es corta; no puede permitirse gastarla criando genes de otro macho. La nueva coalición se acerca a Taji y Zuri. Pero no contaron con Dalila. Ella se para sobre sus cachorros, dientes al descubierto, cada músculo enrollado como un resorte. Su gruñido podría helar la sangre. Es más pequeña que cualquiera de los machos, con cien kilos menos, pero no retrocede. Golpea la cara del primer macho, sacando sangre. Él retrocede, aturdido. Ninguna presa vale perder un ojo. Las otras leonas se unen a Dalila, formando un muro de dientes y garras. Juntas, las madres mantienen la línea."
      ru: "Новые самцы не теряют времени. Их биологический императив ясен: уничтожить детёнышей прежнего короля, чтобы львицы снова вошли в течку и произвели уже их потомство. Это не жестокость — это холодная арифметика эволюции. Окно доминирования самца коротко; он не может позволить себе тратить его на воспитание чужих генов. Новая коалиция приближается к Таджи и Зури. Но они не учли Далилу. Она стоит над своими львятами, зубы обнажены, каждый мускул скручен как пружина. Её рычание может заморозить кровь. Она меньше любого из самцов, легче на пятьдесят килограммов, но не отступает. Она бьёт первого самца по морде, пуская кровь. Он отшатывается, ошеломлённый. Никакая добыча не стоит потери глаза. Другие львицы присоединяются к Далиле, образуя стену из зубов и когтей. Вместе матери держат оборону."
    image: "mothers-defense.jpg"

  # The Cubs' Survival
  - id: cubs-survival
    mood: [golden-hour, soft-intimate]
    use_characters: ["${meet-dalila.image}", "${meet-cubs.image}"]
    action: "two young lion cubs — one lighter with big paws, one darker and smaller — cautiously emerging from hiding in tall grass, looking wary but brave. Their lioness mother with notched ear walks close beside them, alert and protective. Early morning golden light, African savanna, the cubs are growing but still young and vulnerable, mood of cautious hope"
    title:
      en: "The Cubs' Survival"
      es: "La Supervivencia de los Cachorros"
      ru: "Выживание львят"
    content:
      en: "The weeks that follow the takeover are the most dangerous of Taji and Zuri's lives. The new males tolerate them — barely — thanks to the lionesses' united front. But tolerance is not acceptance. The cubs must stay close to their mothers at all times. They learn to read the males' moods — when to approach, when to hide, when to freeze. Roughly one in four lion cubs does not survive their first year. Starvation, predators, disease, and pride takeovers all take their toll. Taji and Zuri survive because Dalila never rests. She hunts harder, stays more alert, and positions herself between danger and her cubs at every moment. Slowly, as the cubs grow larger and the new males' own offspring begin to arrive, the threat diminishes. The new coalition begins to accept the older cubs as part of their pride. Survival in the savanna is not guaranteed by strength alone — it is earned through endurance, timing, and an unbreakable mother's will."
      es: "Las semanas que siguen a la toma de poder son las más peligrosas de las vidas de Taji y Zuri. Los nuevos machos los toleran — apenas — gracias al frente unido de las leonas. Pero tolerancia no es aceptación. Los cachorros deben permanecer cerca de sus madres en todo momento. Aprenden a leer los estados de ánimo de los machos — cuándo acercarse, cuándo esconderse, cuándo quedarse inmóviles. Aproximadamente uno de cada cuatro cachorros de león no sobrevive su primer año. El hambre, los depredadores, las enfermedades y las tomas de poder cobran su precio. Taji y Zuri sobreviven porque Dalila nunca descansa. Caza más duro, permanece más alerta, y se posiciona entre el peligro y sus cachorros en cada momento. Lentamente, a medida que los cachorros crecen y comienzan a llegar las crías propias de los nuevos machos, la amenaza disminuye."
      ru: "Недели после смены власти — самые опасные в жизни Таджи и Зури. Новые самцы терпят их — едва-едва — благодаря единому фронту львиц. Но терпимость — не принятие. Львята должны всё время оставаться рядом с матерями. Они учатся читать настроение самцов — когда приближаться, когда прятаться, когда замереть. Примерно каждый четвёртый львёнок не переживает первый год. Голод, хищники, болезни и смены власти берут своё. Таджи и Зури выживают, потому что Далила никогда не отдыхает. Она охотится усерднее, остаётся более бдительной и в каждый момент становится между опасностью и своими львятами. Постепенно, когда львята подрастают и у новых самцов начинает появляться собственное потомство, угроза уменьшается."
    image: "cubs-survival.jpg"

  # Nature's Harsh Balance
  - id: natures-balance
    mood: [epic-skies, golden-hour]
    action: "vast sweeping African savanna landscape at sunrise showing the cycle of life — in the foreground lush green grass with flowers, in the middle ground a herd of wildebeest grazing, in the background a distant lion pride resting near an acacia tree, vultures circling high in the sky, a river reflecting golden light. The image conveys the interconnectedness of all life, beautiful and harsh simultaneously. Dramatic wide-angle composition"
    title:
      en: "Nature's Harsh Balance"
      es: "El Duro Equilibrio de la Naturaleza"
      ru: "Суровое равновесие природы"
    content:
      en: "Why does nature permit such brutality? Why must cubs die and kings fall? The answer lies in the merciless efficiency of natural selection. When only the strongest males breed, the pride's genetic fitness improves. When weak or sick cubs are lost, resources flow to those most likely to survive and reproduce. When old males are replaced, genetic diversity increases, preventing the problems of inbreeding. This system produces lions that are faster, stronger, and more resilient with every generation. The savanna wastes nothing — the fallen feed the vultures, the vultures clean the land, the clean land grows the grass, the grass feeds the herds, the herds feed the lions. Every death serves life. Every ending enables a beginning. This is not a comfortable truth, and it should not be. But it is the truth that has sustained the African ecosystem for millions of years — a truth far older and wiser than human morality."
      es: "¿Por qué la naturaleza permite tal brutalidad? ¿Por qué deben morir cachorros y caer reyes? La respuesta está en la eficiencia despiadada de la selección natural. Cuando solo los machos más fuertes se reproducen, la aptitud genética de la manada mejora. Cuando los cachorros débiles o enfermos se pierden, los recursos fluyen hacia aquellos con más probabilidades de sobrevivir y reproducirse. Cuando los machos viejos son reemplazados, la diversidad genética aumenta, previniendo los problemas de la endogamia. Este sistema produce leones más rápidos, más fuertes y más resistentes con cada generación. La sabana no desperdicia nada — los caídos alimentan a los buitres, los buitres limpian la tierra, la tierra limpia hace crecer la hierba, la hierba alimenta las manadas, las manadas alimentan a los leones. Cada muerte sirve a la vida."
      ru: "Почему природа допускает такую жестокость? Почему должны гибнуть львята и падать короли? Ответ — в безжалостной эффективности естественного отбора. Когда размножаются только сильнейшие самцы, генетическая приспособленность прайда улучшается. Когда слабые или больные детёныши погибают, ресурсы достаются тем, кто скорее выживет и размножится. Когда старых самцов заменяют, генетическое разнообразие возрастает, предотвращая проблемы инбридинга. Эта система производит львов быстрее, сильнее и устойчивее с каждым поколением. Саванна не расточительна — павшие кормят стервятников, стервятники очищают землю, чистая земля растит траву, трава кормит стада, стада кормят львов. Каждая смерть служит жизни. Каждый конец делает возможным начало."
    image: "natures-balance.jpg"
    imageAlt:
      en: "Vast African savanna landscape at sunrise showing the interconnected cycle of life — green grass, grazing herds, distant lion pride, circling vultures, golden river, dramatic sky"
      es: "Vasto paisaje de sabana africana al amanecer mostrando el ciclo interconectado de la vida — hierba verde, manadas pastando, manada de leones distante, buitres circulando, río dorado, cielo dramático"
      ru: "Бескрайний пейзаж африканской саванны на рассвете, показывающий взаимосвязанный круг жизни — зелёная трава, пасущиеся стада, далёкий прайд львов, кружащие стервятники, золотая река, драматичное небо"

  # The Circle Continues
  - id: circle-continues
    mood: [epic-skies, golden-hour, soft-intimate]
    use_characters: ["${meet-dalila.image}", "${meet-cubs.image}"]
    action: "two young adult lions — a male with a growing mane standing on a rocky kopje surveying the savanna at sunrise, and a sleek young lioness beside a golden lioness with notched ear. The young male is in the exact same pose as Kazi was in the opening scene. Dawn light, hope and continuation, vast African savanna stretching to the horizon, dramatic orange and gold sky"
    title:
      en: "The Circle Continues"
      es: "El Círculo Continúa"
      ru: "Круг продолжается"
    content:
      en: "Two years later. Taji stands on the same kopje where Kazi once surveyed his kingdom. His mane, lighter than his father's but growing thicker every month, catches the dawn light. He is not the king here — not yet. Soon, the new pride males will drive him out, as all pride males do to maturing sons. He will become a nomad, wandering the savanna, building strength, waiting for his chance to challenge for a pride of his own. Zuri hunts beside Dalila now, already nearly as fast and twice as fearless. She will stay with the pride forever, raising the next generation, passing on Dalila's knowledge and Dalila's courage. And somewhere far away, an old lion with a dark, matted mane lies in the shade of a lone acacia. Kazi is thinner now, his scars more prominent, his roar quieter. But he is alive. And sometimes, when the wind blows just right, he hears a young roar rising from the east — and he knows. His son is becoming a king. The circle continues."
      es: "Dos años después. Taji se para en el mismo kopje donde Kazi una vez inspeccionaba su reino. Su melena, más clara que la de su padre pero cada mes más espesa, capta la luz del amanecer. No es el rey aquí — todavía no. Pronto, los nuevos machos de la manada lo expulsarán, como todos los machos hacen con los hijos que maduran. Se convertirá en nómada, vagando por la sabana, fortalecién dose, esperando su oportunidad de desafiar por una manada propia. Zuri caza junto a Dalila ahora, casi tan rápida y el doble de valiente. Ella se quedará con la manada para siempre, criando la siguiente generación, transmitiendo el conocimiento y el coraje de Dalila. Y en algún lugar lejano, un viejo león con una melena oscura y apelmazada yace a la sombra de una acacia solitaria. Kazi está más delgado ahora, sus cicatrices más prominentes, su rugido más callado. Pero está vivo. Y a veces, cuando el viento sopla justo, escucha un joven rugido elevándose desde el este — y lo sabe. Su hijo se está convirtiendo en rey."
      ru: "Два года спустя. Таджи стоит на том же копье, где Кази когда-то осматривал своё королевство. Его грива, светлее отцовской, но густеющая с каждым месяцем, ловит свет зари. Он не король здесь — пока нет. Скоро новые самцы прайда изгонят его, как все вожаки поступают с взрослеющими сыновьями. Он станет бродягой, скитающимся по саванне, набирающим силу, ждущим своего шанса бросить вызов за собственный прайд. Зури охотится рядом с Далилой теперь, почти такая же быстрая и вдвое бесстрашнее. Она останется в прайде навсегда, выращивая следующее поколение, передавая знания и мужество Далилы. А где-то далеко старый лев с тёмной, спутанной гривой лежит в тени одинокой акации. Кази стал худее, шрамы заметнее, рык тише. Но он жив. И иногда, когда ветер дует как надо, он слышит молодой рык, поднимающийся с востока — и знает. Его сын становится королём. Круг продолжается."
    image: "circle-continues.jpg"
    imageAlt:
      en: "Young male lion with growing mane standing on rocky kopje at sunrise in the same pose as his father, young lioness and older lioness with notched ear nearby, vast savanna at dawn, hope and continuation"
      es: "Joven león macho con melena creciente de pie en un kopje rocoso al amanecer en la misma pose que su padre, joven leona y leona mayor con oreja muescada cerca, vasta sabana al amanecer, esperanza y continuación"
      ru: "Молодой лев-самец с растущей гривой стоит на скалистом копье на рассвете в той же позе, что и его отец, молодая львица и старшая львица с зарубкой на ухе рядом, бескрайняя саванна на рассвете, надежда и продолжение"

