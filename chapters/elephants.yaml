      - "${meet-kippy.image}"
    image: "magazine-cover.jpg"
    imageAlt:
      en: "Tembo spraying water playfully with Grandmother Nyota and Kippy in background, African savanna at golden hour"
      es: "Tembo rociando agua juguetonamente con Abuela Nyota y Kippy al fondo, sabana africana a la hora dorada"
      ru: "Тембо игриво брызгает водой, бабушка Ньота и Киппи на заднем плане, африканская саванна в золотой час"

funFacts:
  title:
    en: "Amazing Elephant Facts!"
    es: "¡Datos Asombrosos sobre Elefantes!"
    ru: "Удивительные факты о слонах!"
  facts:
    - title:
        en: "Hearing Through Their Feet"
        es: "Escuchando a Través de sus Patas"
        ru: "Слышат через ноги"
      content:
        en: "Elephants can detect seismic vibrations through the ground using special sensors in their feet! They can 'hear' other elephants' calls from up to 10 miles away through the earth, long before the sound reaches their ears through the air."
        es: "¡Los elefantes pueden detectar vibraciones sísmicas a través del suelo usando sensores especiales en sus patas! Pueden 'escuchar' las llamadas de otros elefantes desde hasta 16 kilómetros de distancia a través de la tierra, mucho antes de que el sonido llegue a sus oídos por el aire."
        ru: "Слоны могут улавливать сейсмические вибрации через землю с помощью специальных рецепторов в ногах! Они могут 'слышать' зовы других слонов на расстоянии до 16 километров через землю, задолго до того, как звук достигнет их ушей по воздуху."
      image: "fun-fact-seismic-hearing.jpg"

    - title:
        en: "Elephant Hugs"
        es: "Abrazos de Elefante"
        ru: "Слоновьи обнимашки"
      content:
        en: "Elephants hug each other with their trunks! When two elephants meet, they wrap their trunks together in a warm greeting — just like people shaking hands or giving a hug. Baby elephants even hold their mama's tail with their trunk while walking, like a toddler holding their parent's hand!"
        es: "¡Los elefantes se abrazan con sus trompas! Cuando dos elefantes se encuentran, entrelazan sus trompas en un cálido saludo — igual que las personas que se dan la mano o un abrazo. ¡Los elefantitos incluso sostienen la cola de su mamá con su trompa al caminar, como un niño pequeño agarrando la mano de su padre!"
        ru: "Слоны обнимаются хоботами! Когда два слона встречаются, они обвивают хоботы друг друга в тёплом приветствии — как люди пожимают руки или обнимаются. Слонята даже держатся хоботом за хвост мамы во время ходьбы, как малыш держит за руку родителя!"
      image: "fun-fact-elephant-hugs.jpg"

    - title:
        en: "Trunk-Sucking Babies"
        es: "Bebés que Chupan su Trompa"
        ru: "Малыши, сосущие хобот"
      content:
        en: "Just like human babies suck their thumbs for comfort, baby elephants suck on the tips of their trunks! It calms them down and helps them feel safe. They usually grow out of this habit by age two, just like human toddlers stop sucking their thumbs."
        es: "¡Al igual que los bebés humanos se chupan el pulgar para tranquilizarse, los elefantitos chupan las puntas de sus trompas! Los calma y les ayuda a sentirse seguros. Generalmente superan este hábito a los dos años, igual que los niños humanos dejan de chuparse el pulgar."
        ru: "Как человеческие младенцы сосут палец для успокоения, слонята сосут кончики своих хоботов! Это их успокаивает и помогает чувствовать себя в безопасности. Обычно они перерастают эту привычку к двум годам, так же как человеческие малыши перестают сосать палец."
      image: "fun-fact-thumb-sucking.jpg"

    - title:
        en: "Swimming Champions"
        es: "Campeones de Natación"
        ru: "Чемпионы по плаванию"
      content:
        en: "Did you know elephants are amazing swimmers? They can swim for hours without stopping, using their trunk as a snorkel to breathe while their body is completely underwater! Baby elephants learn to swim when they are very young, and they love splashing in deep water with their families. Some elephants have even been spotted swimming between islands!"
        es: "¿Sabías que los elefantes son increíbles nadadores? ¡Pueden nadar durante horas sin parar, usando su trompa como esnórquel para respirar mientras su cuerpo está completamente bajo el agua! Los elefantitos aprenden a nadar cuando son muy pequeños, y les encanta chapotear en aguas profundas con sus familias."
        ru: "Знали ли вы, что слоны — потрясающие пловцы? Они могут плавать часами без остановки, используя хобот как трубку для дыхания, пока тело полностью под водой! Слонята учатся плавать с раннего возраста и обожают плескаться в глубокой воде со своими семьями."
      image: "fun-fact-swimming.jpg"

