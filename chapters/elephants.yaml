  # Fun fact images
  - id: "fun-fact-seismic-hearing"
    image: "fun-fact-seismic-hearing.jpg"
    referenceImage: "${meet-tembo.image}"
    prompt: "Using the elephant from reference, show this character standing very still on the savanna with one foot slightly raised, as if listening through the ground. Subtle vibration waves emanating from the earth below. Same character and Pixar-quality 3D rendering style with lush green environment."
