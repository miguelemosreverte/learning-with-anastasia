viewerDetails:
- title:
    en: "The Amazing Trunk"
    es: "La Increíble Trompa"
    ru: "Удивительный хобот"
  description:
    en: "Look at Tembo's trunk tip — see those two finger-like projections? African elephants have two 'fingers' at the tip of their trunk (Asian elephants have just one). With over 40,000 muscles, the trunk can pick up something as tiny as a single blade of grass or as heavy as a tree branch!"
    es: "¡Mira la punta de la trompa de Tembo — ves esas dos proyecciones como dedos? Los elefantes africanos tienen dos 'dedos' en la punta de su trompa (los elefantes asiáticos tienen solo uno). ¡Con más de 40,000 músculos, la trompa puede recoger algo tan pequeño como una brizna de hierba o tan pesado como una rama de árbol!"
    ru: "Посмотрите на кончик хобота Тембо — видите два пальцеобразных выроста? У африканских слонов два 'пальца' на кончике хобота (у азиатских — только один). С более чем 40 000 мышц хобот может поднять нечто крошечное, как одна травинка, или тяжёлое, как ветка дерева!"
  image: "detail-trunk-anatomy.jpg"

- title:
    en: "Shock-Absorbing Feet"
    es: "Patas Amortiguadoras"
    ru: "Амортизирующие ноги"
  description:
    en: "An elephant's foot hides a remarkable secret — a thick, spongy pad of fatty tissue that acts like a natural shock absorber! This pad spreads their enormous weight evenly and lets them walk almost silently despite weighing up to 6 tons. That's why elephants can sneak up on you!"
    es: "¡El pie de un elefante esconde un secreto notable — una gruesa y esponjosa almohadilla de tejido graso que actúa como un amortiguador natural! Esta almohadilla distribuye su enorme peso uniformemente y les permite caminar casi en silencio a pesar de pesar hasta 6 toneladas. ¡Por eso los elefantes pueden acercarse sigilosamente!"
    ru: "Нога слона скрывает замечательный секрет — толстую, губчатую подушечку из жировой ткани, которая действует как натуральный амортизатор! Эта подушечка равномерно распределяет их огромный вес и позволяет им ходить почти бесшумно, несмотря на вес до 6 тонн. Вот почему слоны могут подкрасться незаметно!"
  image: "detail-foot-pad.jpg"

- title:
    en: "Built-In Air Conditioning"
    es: "Aire Acondicionado Incorporado"
    ru: "Встроенный кондиционер"
  description:
    en: "See the network of blood vessels in Tembo's ears? An elephant's ears are filled with a web of blood vessels just beneath the thin skin. When it's hot, blood flows through these vessels and heat radiates out through the large ear surface. By flapping their ears, elephants can cool their blood by up to 5°C!"
    es: "¿Ves la red de vasos sanguíneos en las orejas de Tembo? Las orejas de un elefante están llenas de una red de vasos sanguíneos justo debajo de la delgada piel. Cuando hace calor, la sangre fluye a través de estos vasos y el calor se irradia por la gran superficie de la oreja. ¡Al agitar sus orejas, los elefantes pueden enfriar su sangre hasta 5°C!"
    ru: "Видите сеть кровеносных сосудов в ушах Тембо? Уши слона пронизаны сетью кровеносных сосудов прямо под тонкой кожей. Когда жарко, кровь проходит через эти сосуды и тепло излучается через большую поверхность уха. Хлопая ушами, слоны могут охладить свою кровь на 5°C!"
  image: "detail-ear-vessels.jpg"

- title:
    en: "Tusk Growth Rings"
    es: "Anillos de Crecimiento de Colmillos"
    ru: "Кольца роста бивней"
  description:
    en: "Just like trees have growth rings, elephant tusks have rings too! By studying these rings, scientists can learn an elephant's age, health, and even what food was available in different years. Grandmother Nyota's broken tusk shows rings from sixty years of savanna life."
    es: "¡Al igual que los árboles tienen anillos de crecimiento, los colmillos de los elefantes también los tienen! Al estudiar estos anillos, los científicos pueden conocer la edad, la salud e incluso qué alimentos estaban disponibles en diferentes años. El colmillo roto de la Abuela Nyota muestra anillos de sesenta años de vida en la sabana."
    ru: "Как и у деревьев есть годовые кольца, у бивней слонов тоже! Изучая эти кольца, учёные могут узнать возраст, здоровье слона и даже какая пища была доступна в разные годы. Сломанный бивень Бабушки Ньоты показывает кольца шестидесяти лет жизни в саванне."
  image: "detail-tusk-rings.jpg"

