    hidden: true

  - id: "fun-fact-thumb-sucking"
    image: "fun-fact-thumb-sucking.jpg"
    referenceImage: "${meet-tembo.image}"
    prompt: "Using the elephant calf from reference, show this baby elephant adorably sucking on the tip of his own trunk, just like a human baby sucking a thumb. Cozy, cute, heartwarming scene. Same character and Pixar-quality 3D rendering style with lush green environment."
    hidden: true

  - id: "fun-fact-swimming"
    image: "fun-fact-swimming.jpg"
    referenceImage: "${meet-tembo.image}"
    prompt: "Using the elephant calf from reference, show a baby elephant happily swimming in a deep river with only its trunk sticking out above the water like a snorkel, adult elephants swimming alongside. Joyful, playful water scene. Same character and Pixar-quality 3D rendering style with lush green riverbanks."
    hidden: true

  # Magazine Cover
  - id: magazine-cover
