  issueNumber: 8
  date: "February 2026"
  folderName: "elephants"
  title:
    en: "Elephants: Giants with Big Hearts"
    es: "Elefantes: Gigantes con Gran Corazón"
    ru: "Слоны: Гиганты с большим сердцем"
  subtitle:
    en: "A Journey Through Tembo's First Year"
    es: "Un Viaje a Través del Primer Año de Tembo"
    ru: "Путешествие через первый год жизни Тембо"
  magazineText:
    en: "Follow Tembo, a young African elephant calf, through his first year of wonder! Discover the remarkable intelligence, unbreakable family bonds, and incredible ecosystem engineering of the world's largest land animals."
    es: "¡Sigue a Tembo, un joven elefante africano, a través de su primer año de maravillas! Descubre la notable inteligencia, los lazos familiares inquebrantables y la increíble ingeniería ecosistémica de los animales terrestres más grandes del mundo."
    ru: "Следуйте за Тембо, молодым африканским слонёнком, через его первый год чудес! Откройте замечательный интеллект, нерушимые семейные узы и невероятную экосистемную инженерию крупнейших наземных животных мира."
  magazineCover: "magazine-cover.jpg"
  hasGeneratedContent: true
  footerSubtitle:
    en: "Celebrating the gentle giants who shape the African savanna"
    es: "Celebrando a los gigantes gentiles que moldean la sabana africana"
    ru: "Celebrating нежных гигантов, формирующих африканскую саванну"
  description: "Follow Tembo the young elephant calf through his first year learning from his mother and the matriarch of the herd"
  preface:
    en:
      - "Welcome to the magnificent world of African elephants! In this adventure, we'll follow Tembo, a curious young elephant calf, as he takes his first wobbly steps on the golden savanna and learns everything from his loving family."
      - "Elephants are among the most intelligent animals on Earth. They mourn their dead, use tools, communicate over vast distances, and form family bonds that last a lifetime. Their herds are led by wise matriarchs who remember water sources from decades past."
      - "Through Tembo's first year, you'll discover how elephants shape entire landscapes by pushing trees and digging for water, how they protect each other through the darkest nights, and why these gentle giants truly deserve to be called nature's greatest engineers!"
    es:
      - "¡Bienvenidos al magnífico mundo de los elefantes africanos! En esta aventura, seguiremos a Tembo, un curioso elefante bebé, mientras da sus primeros pasos tambaleantes en la dorada sabana y aprende todo de su amorosa familia."
      - "Los elefantes están entre los animales más inteligentes de la Tierra. Lloran a sus muertos, usan herramientas, se comunican a través de vastas distancias y forman lazos familiares que duran toda la vida. Sus manadas son lideradas por sabias matriarcas que recuerdan fuentes de agua de hace décadas."
      - "A través del primer año de Tembo, descubrirás cómo los elefantes moldean paisajes enteros empujando árboles y cavando en busca de agua, cómo se protegen mutuamente durante las noches más oscuras, y por qué estos gigantes gentiles verdaderamente merecen ser llamados los mayores ingenieros de la naturaleza."
    ru:
      - "Добро пожаловать в величественный мир африканских слонов! В этом приключении мы последуем за Тембо, любопытным маленьким слонёнком, когда он делает свои первые неуверенные шаги по золотой саванне и учится всему у своей любящей семьи."
      - "Слоны — одни из самых умных животных на Земле. Они оплакивают умерших, используют орудия, общаются на огромных расстояниях и создают семейные связи, которые длятся всю жизнь. Их стадами руководят мудрые матриархи, помнящие источники воды десятилетней давности."
      - "Через первый год Тембо вы узнаете, как слоны формируют целые ландшафты, толкая деревья и копая в поисках воды, как они защищают друг друга в самые тёмные ночи, и почему эти нежные гиганты по праву заслуживают звания величайших инженеров природы!"

hero:
  title:
