    es: "Elefantes"
    ru: "Слоны"
  subtitle:
    en: "Giants with Big Hearts"
    es: "Gigantes con Gran Corazón"
    ru: "Гиганты с большим сердцем"
  image: "hero-savanna-sunrise.jpg"
  imageType: "landscape"
  imageAlt:
    en: "Breathtaking lush green African savanna at golden sunrise with a majestic elephant herd, acacia trees and tropical vegetation dotting the landscape, warm golden light flooding the green plains"
    es: "Impresionante sabana africana al amanecer dorado con una majestuosa manada de elefantes en silueta contra el cielo, árboles de acacia salpicando el paisaje, cálida luz naranja y dorada inundando las llanuras"
    ru: "Захватывающая африканская саванна на золотом рассвете с величественным стадом слонов в силуэте на фоне неба, акации, раскинувшиеся по ландшафту, тёплый оранжево-золотой свет, заливающий равнины"

sections:
  # Meet Tembo — main character
  - id: meet-tembo
    generate_character: true
    title:
      en: "Meet Tembo"
      es: "Conoce a Tembo"
      ru: "Знакомьтесь: Тембо"
    content:
      en: "Tembo is a young African elephant calf with the biggest, most curious eyes on the savanna! His oversized ears flap like sails in the wind, and his tiny trunk wiggles in every direction as he tries to figure out how to use it. Born just weeks ago under the shade of an ancient baobab tree during the late dry season, Tembo has never seen rain — but everyone keeps talking about it!"
      es: "¡Tembo es un joven elefante africano con los ojos más grandes y curiosos de la sabana! Sus enormes orejas se agitan como velas al viento, y su pequeña trompa se mueve en todas direcciones mientras intenta descifrar cómo usarla. Nacido hace apenas semanas bajo la sombra de un antiguo baobab, ¡Tembo está listo para explorar el mundo!"
      ru: "Тембо — молодой африканский слонёнок с самыми большими и любопытными глазами во всей саванне! Его огромные уши хлопают, как паруса на ветру, а маленький хобот крутится во все стороны, пока он пытается понять, как им пользоваться. Рождённый всего несколько недель назад под тенью древнего баобаба, Тембо готов исследовать мир!"
    image: "tembo-portrait.jpg"
    imageAlt:
      en: "Adorable young grey African elephant calf with big curious eyes, oversized floppy ears, and a playful expression, standing on golden savanna grass"
      es: "Adorable joven elefante africano gris con grandes ojos curiosos, enormes orejas caídas y una expresión juguetona, de pie sobre hierba dorada de la sabana"
      ru: "Очаровательный молодой серый африканский слонёнок с большими любопытными глазами, огромными висячими ушами и игривым выражением, стоящий на золотой траве саванны"

  # First steps with Mama
  - id: first-steps
    use_character: "${meet-tembo.image}"
    action: "baby elephant calf taking wobbly first steps on lush green savanna grass surrounded by tropical plants and wildflowers, legs slightly unsteady, a large gentle mother elephant guiding him with her trunk, warm morning light filtering through acacia leaves"
    title:
      en: "First Steps on the Savanna"
      es: "Primeros Pasos en la Sabana"
      ru: "Первые шаги по саванне"
    content:
      en: "Tembo's legs are still a bit wobbly as he takes his first steps across the golden grass. Mama Amara walks right beside him, her strong trunk gently guiding him whenever he stumbles. Each step is an adventure — the ground is warm, the grass tickles his belly, and there are so many interesting smells!"
      es: "Las piernas de Tembo aún están un poco tambaleantes mientras da sus primeros pasos por la hierba dorada. Mamá Amara camina justo a su lado, su fuerte trompa guiándolo suavemente cada vez que tropieza. ¡Cada paso es una aventura — el suelo está cálido, la hierba le hace cosquillas en la barriga, y hay tantos olores interesantes!"
      ru: "Ножки Тембо ещё немного дрожат, когда он делает первые шаги по золотой траве. Мама Амара идёт рядом, её сильный хобот нежно направляет его, когда он спотыкается. Каждый шаг — приключение: земля тёплая, трава щекочет животик, и вокруг столько интересных запахов!"
    image: "tembo-first-steps.jpg"

  # The watering hole
  - id: the-watering-hole
    use_characters: ["${meet-tembo.image}"]
    action: "baby elephant calf at a sparkling watering hole surrounded by lush green reeds and lily pads, trying to drink with his short trunk, splashing water, mother elephant standing nearby watching lovingly, verdant African landscape with green trees and plants reflected in the water"
    title:
      en: "The Watering Hole"
      es: "El Abrevadero"
      ru: "Водопой"
    content:
      en: "At the watering hole, Tembo discovers his trunk has a very important job — drinking! But it's harder than it looks. He dips his little trunk in the water, tries to suck it up, and... splashes himself right in the face! Mama Amara shows him how: curl the trunk, fill it up, then lift it to your mouth. 'Mama, where does the water come from?' asks Tembo. 'From the rain, little one,' she smiles. 'You'll see it soon.'"
      es: "¡En el abrevadero, Tembo descubre que su trompa tiene un trabajo muy importante — beber! Pero es más difícil de lo que parece. Mete su pequeña trompa en el agua, intenta absorberla y... ¡se salpica en la cara! Mamá Amara le muestra cómo: enrolla la trompa, llénala y luego levántala hasta la boca. ¡Requiere práctica!"
      ru: "У водопоя Тембо обнаруживает, что у его хобота очень важная работа — пить! Но это сложнее, чем кажется. Он опускает маленький хобот в воду, пытается набрать её и... брызгает себе прямо в лицо! Мама Амара показывает как: сверни хобот, набери воду, затем подними ко рту. Нужна практика!"
    image: "tembo-watering-hole.jpg"

  # Meet Grandmother Nyota
  - id: meet-grandmother
    generate_character: true
    use_character: "${meet-tembo.image}"
    action: "elderly African elephant matriarch with weathered grey skin, one broken tusk, and deep wise eyes, gently touching trunks with a small elephant calf in greeting, herd visible in lush green background with tall grass, scattered trees, and flowering bushes"
    title:
      en: "Grandmother Nyota, the Matriarch"
      es: "Abuela Nyota, la Matriarca"
      ru: "Бабушка Ньота, матриарх"
    content:
      en: "Grandmother Nyota is the oldest and wisest elephant in the herd. Her weathered grey skin tells stories of sixty years on the savanna. One of her tusks broke long ago in a drought, when she dug deep into dry riverbeds to find water for the family. Every elephant in the herd trusts her — when Nyota walks, everyone follows. She looks at little Tembo and rumbles softly: 'Come, little one. It is time I taught you the Memory Map.'"
      es: "La abuela Nyota es la elefante más vieja y sabia de la manada. Su piel gris curtida cuenta historias de sesenta años en la sabana. Uno de sus colmillos se rompió hace mucho tiempo durante una sequía, cuando cavó profundamente en lechos de ríos secos para encontrar agua para la familia. Cada elefante de la manada confía en ella — cuando Nyota camina, todos la siguen."
      ru: "Бабушка Ньота — старейшая и мудрейшая слониха в стаде. Её обветренная серая кожа хранит истории шестидесяти лет в саванне. Один из её бивней сломался давным-давно во время засухи, когда она копала глубоко в высохших руслах рек, чтобы найти воду для семьи. Каждый слон в стаде доверяет ей — когда Ньота идёт, все следуют за ней."
    image: "grandmother-nyota-portrait.jpg"
    imageAlt:
      en: "Wise elderly African elephant matriarch with deep wrinkled grey skin, one broken tusk, and kind wise eyes, standing majestically on the savanna"
      es: "Sabia matriarca elefante africana anciana con piel gris profundamente arrugada, un colmillo roto y ojos sabios y amables, de pie majestuosamente en la sabana"
      ru: "Мудрая пожилая матриарх африканских слонов с глубоко морщинистой серой кожей, одним сломанным бивнем и добрыми мудрыми глазами, величественно стоящая в саванне"

  # The Memory Map
  - id: the-memory-map
    use_characters: ["${meet-tembo.image}", "${meet-grandmother.image}"]
    action: "elderly elephant matriarch standing beside a small elephant calf under a massive ancient baobab tree, the matriarch's trunk gently pointing toward the horizon as if teaching, warm golden light, lush green savanna with paths visible stretching into the distance"
    title:
      en: "The Memory Map"
      es: "El Mapa de la Memoria"
      ru: "Карта памяти"
    content:
      en: "'What is a Memory Map?' asks Tembo, his big eyes wide with wonder. Grandmother Nyota touches her forehead with her trunk. 'It lives right here, little one. My grandmother taught it to my mother, and my mother taught it to me. Every path, every watering hole, every safe place — all stored inside our heads. And now, I will teach it to you.' Tembo stands very still. This feels important."
      es: "'¿Qué es un Mapa de la Memoria?' pregunta Tembo, con sus grandes ojos muy abiertos de asombro. La abuela Nyota se toca la frente con su trompa. 'Vive justo aquí, pequeño. Mi abuela se lo enseñó a mi madre, y mi madre me lo enseñó a mí. Cada camino, cada abrevadero, cada lugar seguro — todo guardado dentro de nuestras cabezas. Y ahora, te lo enseñaré a ti.' Tembo se queda muy quieto. Esto se siente importante."
      ru: "'Что такое Карта Памяти?' спрашивает Тембо, широко раскрыв большие глаза от удивления. Бабушка Ньота касается лба хоботом. 'Она живёт прямо здесь, малыш. Моя бабушка научила мою маму, а мама научила меня. Каждая тропа, каждый водопой, каждое безопасное место — всё хранится внутри наших голов. И теперь я научу тебя.' Тембо стоит очень тихо. Это кажется важным."
    image: "memory-map-lesson.jpg"

  # Trunk lessons — Lesson 1
  - id: trunk-lessons
    use_character: "${meet-tembo.image}"
    action: "baby elephant calf practicing with his trunk — trying to grasp a small stick, sniffing colorful wildflowers, spraying a little water from his trunk, playful learning moments on a lush green meadow with abundant vegetation and tropical plants"
    title:
      en: "Lesson 1: Your Trunk Remembers"
      es: "Lección 1: Tu Trompa Recuerda"
      ru: "Урок 1: Твой хобот помнит"
    content:
      en: "'First lesson,' says Grandmother. 'Your trunk can smell water from very far away. It remembers every flower, every fruit, every friend.' Tembo's trunk has over 40,000 muscles — more than a human's entire body! He practices sniffing wildflowers (and sneezes!), grasping tiny sticks (and drops them), and spraying water (mostly on himself). 'One day,' Grandmother promises, 'your trunk will remember the smell of rain before it arrives.'"
      es: "¡La trompa de Tembo tiene más de 40,000 músculos — más que todo el cuerpo humano! Pero controlar todos esos músculos lleva tiempo. Practica agarrando pequeños palos (y los deja caer), olfateando flores silvestres (¡y estornuda!), y rociando agua (sobre todo sobre sí mismo). Cada día, su trompa se vuelve un poco más obediente."
      ru: "В хоботе Тембо более 40 000 мышц — больше, чем во всём человеческом теле! Но научиться управлять всеми этими мышцами нужно время. Он практикуется хватать маленькие палочки (и роняет их), нюхать полевые цветы (и чихает!), и брызгать водой (в основном на себя). Каждый день его хобот становится чуточку послушнее."
    image: "tembo-trunk-lessons.jpg"

  # Meet Kippy
  - id: meet-kippy
    generate_character: true
    use_character: "${meet-tembo.image}"
    action: "two young elephant calves playing together in shallow mud near a green riverbank, one slightly bigger than the other, splashing and pushing each other playfully, joyful scene surrounded by lush green vegetation and tropical plants"
    title:
      en: "Meet Kippy, the Mud Champion"
      es: "Conoce a Kippy, el Campeón del Barro"
      ru: "Знакомьтесь: Киппи, чемпион по грязи"
    content:
      en: "Kippy is Tembo's best friend — a slightly older calf who is ALWAYS covered in mud. 'You've NEVER seen rain?!' Kippy gasps. 'Rain turns everything into MUD! Glorious, wonderful, splashy MUD!' Kippy discovered early that mud is the greatest invention in the world: it keeps you cool, protects from sunburn, and makes you look absolutely magnificent (at least Kippy thinks so). When Kippy charges at Tembo for a play-wrestle, mud flies everywhere!"
      es: "Kippy es el mejor amigo de Tembo — un elefantito un poco mayor que SIEMPRE está cubierto de barro. Kippy descubrió pronto que el barro es el mayor invento del mundo: te mantiene fresco, protege de las quemaduras solares y te hace lucir absolutamente magnífico (al menos Kippy piensa así). ¡Cuando Kippy carga contra Tembo para jugar a luchar, el barro vuela por todas partes!"
      ru: "Киппи — лучший друг Тембо, слонёнок чуть постарше, который ВСЕГДА покрыт грязью. Киппи рано обнаружил, что грязь — величайшее изобретение в мире: она охлаждает, защищает от солнечных ожогов и делает тебя абсолютно великолепным (по крайней мере, Киппи так считает). Когда Киппи бросается на Тембо поиграть в борьбу, грязь летит во все стороны!"
    image: "kippy-portrait.jpg"
    imageAlt:
      en: "Playful young elephant calf slightly bigger than Tembo, covered in dried mud, with a mischievous expression, standing on savanna grass"
      es: "Juguetón joven elefante un poco más grande que Tembo, cubierto de barro seco, con una expresión traviesa, de pie sobre hierba de sabana"
      ru: "Игривый молодой слонёнок чуть крупнее Тембо, покрытый засохшей грязью, с озорным выражением, стоящий на траве саванны"

  # Dust bath
  - id: dust-bath
    use_characters: ["${meet-tembo.image}", "${meet-kippy.image}"]
    action: "two young elephant calves throwing dust over their backs with their trunks for sun protection, playful dust bath scene, golden dust clouds in warm sunlight, surrounded by lush green savanna with green grass and scattered bushes"
    title:
      en: "The Great Dust Bath"
      es: "El Gran Baño de Polvo"
      ru: "Великое пылевое купание"
    content:
      en: "Today's lesson: sun protection, elephant-style! Tembo and Kippy scoop up trunkfuls of fine red dust and toss it over their backs. The dust sticks to their skin and acts like natural sunscreen, protecting them from the fierce African sun. Plus, it feels amazing — like a full-body tickle!"
      es: "¡La lección de hoy: protección solar, al estilo elefante! Tembo y Kippy recogen trompadas de fino polvo rojo y lo lanzan sobre sus espaldas. El polvo se adhiere a su piel y actúa como protector solar natural, protegiéndolos del feroz sol africano. Además, se siente increíble — ¡como un cosquilleo en todo el cuerpo!"
      ru: "Сегодняшний урок: защита от солнца по-слоновьи! Тембо и Киппи набирают хоботами мелкую красную пыль и подбрасывают её на спины. Пыль прилипает к коже и действует как натуральный солнцезащитный крем, защищая их от палящего африканского солнца. К тому же, это потрясающе приятно — как щекотка по всему телу!"
    image: "tembo-kippy-dust-bath.jpg"

  # Lesson 2: Your Feet Hear the Earth
  - id: lesson-feet-hear
    use_characters: ["${meet-tembo.image}", "${meet-grandmother.image}"]
    action: "elderly elephant matriarch and small elephant calf standing very still on open green savanna, both with eyes closed and one foot slightly lifted, feeling vibrations through the ground, subtle golden ripple lines emanating from the earth beneath their feet, warm golden light, lush green landscape"
    title:
      en: "Lesson 2: Your Feet Hear the Earth"
      es: "Lección 2: Tus Patas Escuchan la Tierra"
      ru: "Урок 2: Твои ноги слышат землю"
    content:
      en: "'Lesson two,' says Grandmother Nyota. 'Stand very still.' Tembo freezes. 'Now close your eyes. Can you feel that?' Tembo concentrates hard. Through the soles of his feet, he feels something... a tiny rumble. 'That is your Auntie Zara, calling from beyond the hill,' says Grandmother. 'Elephants can hear through the earth itself. Our feet catch messages from far, far away. This is how the Memory Map talks to us.'"
      es: "'Lección dos,' dice la abuela Nyota. '¡Quédate muy quieto!' Tembo se congela. 'Ahora cierra los ojos. ¿Puedes sentir eso?' Tembo se concentra mucho. A través de las suelas de sus patas, siente algo... un pequeño retumbo. 'Esa es tu tía Zara, llamando desde más allá de la colina,' dice la abuela. 'Los elefantes pueden escuchar a través de la tierra misma. Nuestras patas captan mensajes de muy, muy lejos.'"
      ru: "'Урок второй,' говорит бабушка Ньота. 'Стой совсем тихо.' Тембо замирает. 'Теперь закрой глаза. Чувствуешь?' Тембо очень сосредоточен. Через подошвы своих ног он чувствует что-то... лёгкую вибрацию. 'Это твоя тётя Зара, зовёт из-за холма,' говорит бабушка. 'Слоны могут слышать через саму землю. Наши ноги ловят послания издалека. Так Карта Памяти говорит с нами.'"
    image: "feet-listening.jpg"

  # The migration — Lesson 3
  - id: the-migration
    title:
      en: "Lesson 3: The Herd Walks as One"
      es: "Lección 3: La Manada Camina Como Una"
      ru: "Урок 3: Стадо идёт как одно целое"
    content:
      en: "'Lesson three,' says Grandmother, 'is the biggest lesson of all.' When the dry season comes, she leads the herd on an ancient path her own grandmother showed her decades ago. Dozens of elephants walk in a long line, their massive silhouettes painting shadows on the earth. 'Watch carefully, Tembo. This path is now part of YOUR Memory Map. One day, you will lead this walk.' Tembo tries to memorize every tree, every hill, every bend in the trail."
      es: "'Lección tres,' dice la abuela, 'es la lección más grande de todas.' Cuando llega la estación seca, guía a la manada por un camino antiguo que su propia abuela le mostró hace décadas. Docenas de elefantes caminan en una larga fila, sus enormes siluetas pintando sombras en la tierra. '¡Observa con cuidado, Tembo! Este camino ahora es parte de TU Mapa de la Memoria.'"
      ru: "'Урок третий,' говорит бабушка, 'самый важный урок из всех.' Когда наступает сухой сезон, она ведёт стадо по древней тропе, которую ей показала собственная бабушка десятилетия назад. Десятки слонов идут длинной цепочкой, их массивные силуэты рисуют тени на земле. 'Смотри внимательно, Тембо. Эта тропа теперь часть ТВОЕЙ Карты Памяти.'"
    image: "migration-landscape.jpg"
    imageAlt:
      en: "Majestic elephant herd walking in a long line across a lush green savanna at golden hour, adults flanking calves in the center, green vegetation and acacia trees lining the path, warm golden sky"
      es: "Majestuosa manada de elefantes caminando en una larga fila a través de la sabana dorada al atardecer, adultos flanqueando a los bebés en el centro, cielo dramático con cálidos colores naranja y púrpura"
      ru: "Величественное стадо слонов, идущее длинной цепочкой по золотой саванне на закате, взрослые по бокам, малыши в центре, драматичное небо в тёплых оранжево-фиолетовых тонах"

  # Finding water — The Memory Map in action
  - id: finding-water
    use_character: "${meet-grandmother.image}"
    action: "elderly elephant matriarch with broken tusk digging in a sandy riverbed with her foot and trunk, water starting to seep up from underground, small elephant calf watching in amazement, other elephants waiting hopefully behind her, riverbanks lined with green vegetation and overhanging trees"
    title:
      en: "The Memory Map in Action"
      es: "El Mapa de la Memoria en Acción"
      ru: "Карта Памяти в действии"
    content:
      en: "The rivers have dried up, but Grandmother Nyota closes her eyes and remembers. 'This is why we keep the Memory Map,' she tells Tembo. She leads the herd to a sandy riverbed and begins digging with her powerful feet and trunk. Deeper and deeper she digs, until — miracle! — water begins seeping up from underground. 'My grandmother showed me this spot during a drought forty years ago,' she says. Tembo's eyes go wide. The Memory Map just saved the entire herd!"
      es: "Los ríos se han secado, pero la abuela Nyota cierra los ojos y recuerda. 'Por esto guardamos el Mapa de la Memoria,' le dice a Tembo. Guía a la manada hacia un lecho de río arenoso y comienza a cavar con sus poderosas patas y trompa. Cada vez más profundo cava, hasta que — ¡milagro! — el agua comienza a brotar del subsuelo. 'Mi abuela me mostró este lugar durante una sequía hace cuarenta años,' dice."
      ru: "Реки высохли, но бабушка Ньота закрывает глаза и вспоминает. 'Вот зачем мы храним Карту Памяти,' говорит она Тембо. Она ведёт стадо к песчаному руслу реки и начинает копать своими мощными ногами и хоботом. Всё глубже и глубже она копает, пока — чудо! — вода не начинает просачиваться из-под земли. 'Моя бабушка показала мне это место во время засухи сорок лет назад,' говорит она."
    image: "nyota-finding-water.jpg"

  # Tree pushers — Lesson 4
  - id: tree-pushers
    title:
      en: "Lesson 4: We Shape the Land"
      es: "Lección 4: Nosotros Moldeamos la Tierra"
      ru: "Урок 4: Мы создаём ландшафт"
    content:
      en: "'Last lesson,' says Grandmother. 'We don't just live on the land — we shape it.' Elephants are nature's landscape architects! By pushing over old trees, they create open clearings where grass can grow — feeding zebras, wildebeest, and antelopes. The fallen trees become homes for lizards, insects, and small mammals. 'Even your footprints matter, Tembo. They fill with rainwater and become tiny ponds for frogs!' Tembo looks down at his own feet with new wonder."
      es: "'Última lección,' dice la abuela. '¡No solo vivimos en la tierra — la moldeamos!' ¡Los elefantes son los arquitectos paisajistas de la naturaleza! Al empujar árboles viejos, crean claros abiertos donde puede crecer hierba — alimentando cebras, ñus y antílopes. Los árboles caídos se convierten en hogares para lagartijas, insectos y pequeños mamíferos. '¡Incluso tus huellas importan, Tembo!'"
      ru: "'Последний урок,' говорит бабушка. 'Мы не просто живём на этой земле — мы формируем её.' Слоны — ландшафтные архитекторы природы! Толкая старые деревья, они создают открытые поляны, где может расти трава — кормя зебр, антилоп гну и газелей. Упавшие деревья становятся домами для ящериц, насекомых и мелких млекопитающих. 'Даже твои следы важны, Тембо!'"
    image: "tree-pushers.jpg"
    imageAlt:
      en: "African elephants pushing against a large tree trunk, creating a clearing, with smaller animals like zebras grazing in a lush green area nearby, abundant vegetation and warm golden light"
      es: "Elefantes africanos empujando un gran tronco de árbol, creando un claro, con animales más pequeños como cebras pastando en un área ya despejada cercana, cálida luz de sabana"
      ru: "Африканские слоны толкают большой ствол дерева, создавая поляну, рядом в уже расчищенной зоне пасутся более мелкие животные, такие как зебры, тёплый свет саванны"

  # Night watch — First Thunder
  - id: night-watch
    use_characters: ["${meet-tembo.image}"]
    action: "baby elephant calf pressing close against mother elephant's leg on green grass under a dramatic night sky, distant lightning bolt illuminating purple-grey storm clouds on the horizon, starry sky above, warm protective scene, lush green foliage glowing in moonlight"
    title:
      en: "Thunder in the Night"
      es: "Truenos en la Noche"
      ru: "Гром в ночи"
    content:
      en: "That night, Tembo curls up against Mama Amara's huge leg. Above them, millions of stars sparkle. Then — BOOM! A deep rumble shakes the sky. Tembo jumps up, trembling. 'What was THAT?!' 'That is the rain talking,' Mama whispers. 'It is far away now, but it is coming.' On the horizon, lightning flickers behind purple clouds. Tembo's heart pounds. The rain is coming. He can almost feel it in his feet."
      es: "Esa noche, Tembo se acurruca contra la enorme pierna de Mamá Amara. Sobre ellos, millones de estrellas brillan. Entonces — ¡BOOM! Un profundo retumbo sacude el cielo. Tembo salta, temblando. '¡¿Qué fue ESO?!' 'Esa es la lluvia hablando,' susurra Mamá. 'Está lejos ahora, pero viene.' En el horizonte, los relámpagos parpadean detrás de nubes moradas."
      ru: "Той ночью Тембо прижимается к огромной ноге Мамы Амары. Над ними сверкают миллионы звёзд. И вдруг — БУМ! Глубокий гул сотрясает небо. Тембо вскакивает, дрожа. 'Что это БЫЛО?!' 'Это дождь разговаривает,' шепчет Мама. 'Он далеко сейчас, но он идёт.' На горизонте молнии мерцают за фиолетовыми облаками. Сердце Тембо колотится."
    image: "tembo-night-watch.jpg"

  # Clouds Gather — the rain approaches
  - id: clouds-gather
    use_characters: ["${meet-tembo.image}", "${meet-grandmother.image}"]
    action: "elephant herd on a lush green savanna looking up at a dramatic sky where massive dark rain clouds are building on the horizon, wind blowing the grass and trees, elderly matriarch elephant standing tall with trunk raised sniffing the wind, small elephant calf beside her looking up excitedly, golden light breaking through cloud edges"
    title:
      en: "The Sky Changes"
      es: "El Cielo Cambia"
      ru: "Небо меняется"
    content:
      en: "The next morning, the wind changes. Grandmother Nyota lifts her trunk high and breathes in deeply. Her eyes twinkle. 'Can you smell it, Tembo?' Tembo raises his little trunk. There IS something different in the air — something cool, something fresh, something he has never smelled before. The sky is turning grey and purple. The grass bends in the wind. 'It's coming,' whispers Grandmother, and she smiles the biggest smile Tembo has ever seen."
      es: "A la mañana siguiente, el viento cambia. La abuela Nyota levanta su trompa y respira profundamente. Sus ojos brillan. '¿Puedes olerlo, Tembo?' Tembo levanta su pequeña trompa. HAY algo diferente en el aire — algo fresco, algo nuevo, algo que nunca antes ha olido. El cielo se está poniendo gris y morado. '¡Viene!' susurra la abuela, con la sonrisa más grande que Tembo ha visto jamás."
      ru: "На следующее утро ветер меняется. Бабушка Ньота поднимает хобот высоко и глубоко вдыхает. Её глаза сверкают. 'Чувствуешь, Тембо?' Тембо поднимает свой маленький хобот. В воздухе ДЕЙСТВИТЕЛЬНО что-то новое — прохладное, свежее, то, чего он никогда раньше не ощущал. Небо становится серым и фиолетовым. 'Идёт!' шепчет бабушка с самой широкой улыбкой, которую Тембо когда-либо видел."
    image: "clouds-gathering.jpg"

  # The First Rain — CLIMAX
  - id: the-first-rain
    use_characters: ["${meet-tembo.image}", "${meet-kippy.image}"]
    action: "baby elephant calf dancing joyfully in the rain with trunk raised high catching raindrops, another mud-covered elephant calf splashing in fresh puddles beside him, heavy warm rain falling on the lush green savanna transforming the landscape, fresh green grass springing up, wildflowers blooming, rainbow forming in background, pure joy and wonder, cinematic golden rain light"
    title:
      en: "Tembo's First Rain!"
      es: "¡La Primera Lluvia de Tembo!"
      ru: "Первый дождь Тембо!"
    content:
      en: "And then it comes. The first drop lands on Tembo's nose. Then another. Then ten. Then a THOUSAND! The sky opens up and warm, beautiful rain pours down over the savanna. Tembo stands frozen for one perfect moment — and then he DANCES! He spins, he splashes, he raises his trunk to catch the drops! Kippy charges through the puddles screaming 'MUD! GLORIOUS MUD!' The whole herd rumbles with joy. The grass turns green before their eyes. Flowers spring up overnight. Tembo's trunk remembers this smell forever."
      es: "Y entonces llega. La primera gota cae en la nariz de Tembo. Luego otra. Luego diez. ¡Luego MIL! El cielo se abre y una lluvia cálida y hermosa cae sobre la sabana. Tembo se queda congelado por un momento perfecto — ¡y luego BAILA! ¡Gira, salpica, levanta su trompa para atrapar las gotas! Kippy corre por los charcos gritando '¡BARRO! ¡GLORIOSO BARRO!' Toda la manada retumba de alegría."
      ru: "И вот он идёт. Первая капля падает на нос Тембо. Потом ещё одна. Потом десять. Потом ТЫСЯЧА! Небо раскрывается и тёплый, прекрасный дождь льётся на саванну. Тембо застывает на один идеальный момент — а потом ТАНЦУЕТ! Он кружится, плещется, поднимает хобот, ловя капли! Киппи мчится по лужам крича 'ГРЯЗЬ! ВЕЛИКОЛЕПНАЯ ГРЯЗЬ!' Всё стадо гудит от радости."
    image: "first-rain-dance.jpg"
    imageAlt:
      en: "Baby elephant calf dancing joyfully in the rain with trunk raised high, another calf splashing in puddles, lush green savanna transforming with fresh growth, rainbow in background"
      es: "Elefantito bailando alegremente bajo la lluvia con la trompa levantada, otro elefantito salpicando en charcos, sabana verde transformándose con crecimiento fresco, arcoíris al fondo"
      ru: "Слонёнок радостно танцует под дождём с поднятым хоботом, другой слонёнок плещется в лужах, зелёная саванна преображается свежей растительностью, радуга на фоне"

  # Carry the Map — passing the knowledge
  - id: carry-the-map
    use_characters: ["${meet-tembo.image}", "${meet-grandmother.image}"]
    action: "elderly elephant matriarch gently touching trunks with a young elephant calf in a tender moment after the rain, wet lush green savanna glistening in fresh sunlight, puddles reflecting golden sky, wildflowers blooming everywhere, a tiny newborn calf peeking from behind the young elephant, warm emotional scene"
    title:
      en: "Carry the Map"
      es: "Lleva el Mapa"
      ru: "Неси Карту"
    content:
      en: "After the rain, the world sparkles. Grandmother Nyota touches her trunk to Tembo's forehead, very gently. 'You smelled it before it came,' she says proudly. 'The rain, the paths, the water — it is all inside you now.' She looks at the tiny newborn calf peeking out from behind Tembo's legs. 'And one day, little Tembo, you will teach the Memory Map to someone new.' Tembo stands tall. He is ready."
      es: "Después de la lluvia, el mundo brilla. La abuela Nyota toca su trompa a la frente de Tembo, muy suavemente. 'Lo oliste antes de que llegara,' dice con orgullo. 'La lluvia, los caminos, el agua — todo está dentro de ti ahora.' Ella mira al pequeño recién nacido espiando detrás de las piernas de Tembo. 'Y un día, pequeño Tembo, tú enseñarás el Mapa de la Memoria a alguien nuevo.'"
      ru: "После дождя мир сверкает. Бабушка Ньота касается хоботом лба Тембо, очень нежно. 'Ты почувствовал его до того, как он пришёл,' говорит она с гордостью. 'Дождь, тропы, вода — всё это теперь внутри тебя.' Она смотрит на крошечного новорождённого, выглядывающего из-за ног Тембо. 'И однажды, маленький Тембо, ты научишь Карте Памяти кого-то нового.'"
    image: "carry-the-map.jpg"

  # Tembo grows up — post-rain
  - id: tembo-grows
    use_character: "${meet-tembo.image}"
    action: "young elephant calf, now visibly bigger and more confident than before, gently guiding an even smaller newborn calf with his trunk across a lush green rain-washed savanna, showing leadership, fresh puddles and blooming wildflowers everywhere, warm golden light after the rain"
    title:
      en: "Tembo Grows Up"
      es: "Tembo Crece"
      ru: "Тембо взрослеет"
    content:
      en: "A year has passed, and Tembo is no longer the littlest calf in the herd! He's grown strong and confident. The Memory Map lives inside his head now — every path, every watering hole, every safe place. And when the tiny newborn stumbles on the wet grass, Tembo is right there, guiding her gently with his trunk, just as Mama Amara once guided him. The circle of life continues."
      es: "Ha pasado un año, ¡y Tembo ya no es el bebé más pequeño de la manada! Ha crecido fuerte y seguro. El Mapa de la Memoria vive dentro de su cabeza ahora — cada camino, cada abrevadero, cada lugar seguro. Y cuando la pequeña recién nacida tropieza en la hierba mojada, Tembo está ahí, guiándola suavemente con su trompa, tal como Mamá Amara lo guió a él."
      ru: "Прошёл год, и Тембо больше не самый маленький в стаде! Он вырос сильным и уверенным. Карта Памяти живёт внутри его головы — каждая тропа, каждый водопой, каждое безопасное место. И когда крошечная новорождённая спотыкается на мокрой траве, Тембо тут как тут, нежно направляя её хоботом, точно так же, как когда-то Мама Амара направляла его."
    image: "tembo-grows-up.jpg"

  # Family together — celebration after the rain
  - id: family-together
    title:
      en: "The Herd Together"
      es: "La Manada Unida"
      ru: "Стадо вместе"
    content:
      en: "As the sun breaks through the last rain clouds, painting the sky in shades of gold and amber, the entire herd gathers at the overflowing watering hole. Grandmother Nyota stands tall at the center, surrounded by three generations of her family. Tembo, Kippy, and the other calves splash joyfully at the water's edge. The savanna is green and alive, flowers blooming everywhere. Grandmother rumbles a deep, contented call — and thirty elephants answer back. The Memory Map is safe. The rain has come. And tomorrow, there will be new paths to learn."
      es: "Mientras el sol atraviesa las últimas nubes de lluvia, pintando el cielo en tonos de oro y ámbar, toda la manada se reúne en el abrevadero desbordante. La abuela Nyota se mantiene erguida en el centro, rodeada por tres generaciones de su familia. Tembo, Kippy y los otros bebés salpican alegremente al borde del agua. La sabana está verde y viva, flores brotando por todas partes."
      ru: "Когда солнце пробивается сквозь последние дождевые облака, окрашивая небо в оттенки золота и янтаря, всё стадо собирается у переполненного водопоя. Бабушка Ньота стоит высоко в центре, окружённая тремя поколениями своей семьи. Тембо, Киппи и другие малыши радостно плещутся у кромки воды. Саванна зелёная и живая, цветы распускаются повсюду."
    image: "family-together-panorama.jpg"
    imageAlt:
      en: "Full elephant herd gathered at a watering hole during golden hour, elderly matriarch in center, calves playing at water's edge, lush green panoramic savanna with abundant vegetation"
      es: "Manada completa de elefantes reunida en un abrevadero durante la hora dorada, matriarca anciana en el centro, bebés jugando al borde del agua, cálida escena panorámica de sabana"
      ru: "Полное стадо слонов, собравшееся у водопоя в золотой час, пожилая матриарх в центре, малыши играют у кромки воды, тёплая панорамная сцена саванны"

