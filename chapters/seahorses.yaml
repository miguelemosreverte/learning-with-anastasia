funFacts:
  title:
    en: "Amazing Seahorse Facts!"
    es: "¡Datos Asombrosos sobre Caballitos de Mar!"
    ru: "Удивительные факты о морских коньках!"
  facts:
    - title:
        en: "Papa Power"
        es: "Poder de Papá"
        ru: "Сила Папы"
      content:
        en: "Male seahorses carry and give birth to all the babies — they're one of the only species in the world where the father does this! Papa seahorse has a special pouch on his belly where the eggs grow for 2-4 weeks. When the babies are ready, he pushes them out into the water in a magical cloud of tiny seahorses. One papa can have up to 2,000 babies at once!"
        es: "¡Los caballitos de mar macho cargan y dan a luz a todos los bebés — son una de las únicas especies del mundo donde el padre hace esto! Papá caballito de mar tiene un bolsillo especial en su barriga donde los huevos crecen durante 2-4 semanas. Cuando los bebés están listos, los empuja al agua en una nube mágica de diminutos caballitos. ¡Un papá puede tener hasta 2,000 bebés a la vez!"
        ru: "Самцы морских коньков вынашивают и рожают всех малышей — они одни из единственных видов в мире, где это делает отец! У папы-конька есть специальный мешочек на животе, где яйца растут 2-4 недели. Когда малыши готовы, он выпускает их в воду волшебным облачком крошечных коньков. Один папа может родить до 2000 малышей за раз!"
      image: "fun-fact-papa-power.jpg"

    - title:
        en: "Super Snouts"
        es: "Súper Hocicos"
        ru: "Супер-мордочки"
      content:
        en: "Seahorses suck food up through their long tubular snouts like a tiny vacuum cleaner — SLURP! They have no teeth at all, so they swallow their food whole. A single seahorse can eat up to 3,000 tiny brine shrimp in one day! Their snouts are so powerful they can suck up food from over an inch away."
        es: "¡Los caballitos de mar succionan la comida a través de sus largos hocicos tubulares como una pequeña aspiradora — SLURP! No tienen dientes en absoluto, así que tragan su comida entera. ¡Un solo caballito de mar puede comer hasta 3,000 pequeños camarones de salmuera en un día! Sus hocicos son tan poderosos que pueden succionar comida desde más de dos centímetros de distancia."
        ru: "Морские коньки всасывают еду через длинные трубчатые мордочки как крошечный пылесос — ХЛЮП! У них совсем нет зубов, поэтому они глотают еду целиком. Один морской конёк может съесть до 3000 крошечных рачков за день! Их мордочки настолько мощные, что могут всасывать еду с расстояния более двух сантиметров."
      image: "fun-fact-super-snouts.jpg"

    - title:
        en: "No Stomach!"
        es: "¡Sin Estómago!"
        ru: "Без желудка!"
      content:
        en: "Seahorses have no stomach at all! Food passes straight through their digestive system very quickly, which means they barely absorb any nutrients from each meal. That's why they need to eat almost constantly — all day long, every day! It's like having a never-ending snack time. Coral would approve!"
        es: "¡Los caballitos de mar no tienen estómago en absoluto! La comida pasa directamente por su sistema digestivo muy rápidamente, lo que significa que apenas absorben nutrientes de cada comida. ¡Por eso necesitan comer casi constantemente — todo el día, todos los días! Es como tener una merienda interminable. ¡Coral lo aprobaría!"
        ru: "У морских коньков совсем нет желудка! Еда проходит через пищеварительную систему очень быстро, а это значит, что они почти не усваивают питательных веществ из каждого приёма пищи. Вот почему им нужно есть почти постоянно — весь день, каждый день! Это как бесконечный перекус. Коралл бы одобрила!"
      image: "fun-fact-no-stomach.jpg"

    - title:
        en: "Tiny Swimmers"
        es: "Nadadores Diminutos"
        ru: "Крошечные пловцы"
      content:
        en: "Seahorses are the slowest fish in the entire ocean! The dwarf seahorse moves at only about 5 feet per hour — a garden snail is faster! But their tiny dorsal fin is incredible: it flutters up to 35 times per second, so fast it becomes almost invisible. They steer with their tiny pectoral fins behind their head, like little underwater helicopters."
        es: "¡Los caballitos de mar son los peces más lentos de todo el océano! El caballito de mar enano se mueve a solo unos 1.5 metros por hora — ¡un caracol de jardín es más rápido! Pero su diminuta aleta dorsal es increíble: aletea hasta 35 veces por segundo, tan rápido que se vuelve casi invisible. Se dirigen con sus pequeñas aletas pectorales detrás de la cabeza, como pequeños helicópteros submarinos."
        ru: "Морские коньки — самые медленные рыбы во всём океане! Карликовый морской конёк двигается со скоростью всего 1,5 метра в час — садовая улитка быстрее! Но их крошечный спинной плавник невероятен: он трепещет до 35 раз в секунду, так быстро, что становится почти невидимым. Они управляют крошечными грудными плавниками за головой, как маленькие подводные вертолёты."
      image: "fun-fact-tiny-swimmers.jpg"

