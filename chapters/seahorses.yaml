        - "SLIGHTLY TALLER than Papa Sol — elegant and elongated build"
        - "Delicate ALMOST-TRANSPARENT fins — catch light like stained glass windows"
        - "Graceful curved posture — always poised and elegant"
        - "More SLENDER build than Papa — no belly pouch"
      personality: "Elegant and loving — moves with flowing grace, always initiating the morning dance, affectionate"
      notLike: "NOT orange like Papa Sol, NOT stocky or round-bellied like Papa, NOT tiny like babies"

    coral:
      name: "Coral"
      description: "Tiny baby seahorse in bright sunny yellow with baby-pink spots, enormous round curious eyes, always curling tail around things"
      uniqueFeatures:
        - "Bright SUNNY YELLOW body — vivid and warm like sunshine"
        - "A few BABY-PINK SPOTS scattered across body — cute freckle-like markings"
        - "ENORMOUS round curious eyes — disproportionately large, always wide open"
        - "TINY size — much much smaller than both parents"
        - "Tail always CURLING around something — seagrass, coral, other tails"
        - "Lively energetic posture — leaning forward, always exploring"
      personality: "Curious and adventurous — first to explore, always pointing snout at new things, excitable"
      notLike: "NOT purple like Bubbles, NOT round like Bubbles, much SMALLER than parents, NOT orange or pink"

    bubbles:
      name: "Bubbles"
      description: "Slightly rounder baby seahorse in soft lavender-purple with white belly, tall coronet, shy, always gripping Papa's tail"
      uniqueFeatures:
        - "Soft LAVENDER-PURPLE body color — distinctly different from yellow Coral"
        - "WHITE BELLY — visible contrast against the purple"
        - "Distinctively TALL CORONET on head — the crown-like bump is her signature feature"
        - "Slightly ROUNDER build than Coral — chubbier, softer shape"
        - "SHY posture — often partially hidden behind Papa's tail"
        - "TINY size — same generation as Coral, much smaller than parents"
      personality: "Shy and sweet — always gripping Papa's tail, peeks out cautiously, gentle and quiet"
      notLike: "NOT yellow like Coral, NOT as bold or forward-leaning as Coral, NOT orange like Papa, NOT pink like Mama"

  style:
    global: "Classic hand-drawn Disney animation style inspired by the Golden Age (Snow White, Bambi). Warm organic flowing lines with natural variation in line weight. Large soulful expressive eyes. Painterly brushstrokes visible in scales and fins. Soft rounded character proportions. Vintage animation cel warmth with gentle watercolor-like backgrounds. Vivid tropical coral reef setting with sparkling turquoise water, colorful corals in pink purple orange and yellow, golden sunbeams filtering through the surface, and swaying sea plants. Child-friendly and inviting."

viewerDetails:
- title:
    en: "The Brood Pouch"
    es: "El Bolsillo de Cría"
    ru: "Выводковый мешочек"
  description:
    en: "Look at Papa Sol's round belly — see that special pouch? That's the brood pouch, and it's one of the most amazing things in nature! Only papa seahorses have it. Mama places her eggs inside, and Papa carries them for 2-4 weeks. The pouch provides oxygen and nutrients to the growing babies, just like a nursery. When the babies are ready, Papa pumps his body back and forth to push them out into the world!"
    es: "¡Mira la barriga redonda de Papá Sol — ves ese bolsillo especial? ¡Ese es el bolsillo de cría, y es una de las cosas más asombrosas de la naturaleza! Solo los papás caballitos de mar lo tienen. Mamá coloca sus huevos adentro, y Papá los carga durante 2-4 semanas. El bolsillo proporciona oxígeno y nutrientes a los bebés en crecimiento, como una guardería. Cuando los bebés están listos, ¡Papá bombea su cuerpo hacia adelante y atrás para empujarlos al mundo!"
    ru: "Посмотрите на круглый животик Папы Сола — видите этот особый мешочек? Это выводковый мешочек, и он — одно из самых удивительных чудес природы! Только папы-коньки его имеют. Мама помещает яйца внутрь, а Папа вынашивает их 2-4 недели. Мешочек обеспечивает кислородом и питательными веществами растущих малышей, как настоящие ясли. Когда малыши готовы, Папа раскачивает тело вперёд-назад, выталкивая их в мир!"
  image: "detail-brood-pouch.jpg"

- title:
    en: "Prehensile Tail"
    es: "Cola Prensil"
    ru: "Хватательный хвост"
  description:
    en: "A seahorse's tail is one of nature's cleverest inventions! Unlike most fish tails, it can curl and grip like a monkey's tail. Seahorses use it to anchor themselves to seagrass, coral, and even each other so they don't get swept away by the current. The tail has a square cross-section (not round!) which makes it even stronger for gripping. Coral loves wrapping her tail around everything she finds!"
    es: "¡La cola de un caballito de mar es una de las invenciones más inteligentes de la naturaleza! A diferencia de la mayoría de las colas de pez, puede rizarse y agarrar como la cola de un mono. Los caballitos de mar la usan para anclarse a la hierba marina, coral e incluso entre ellos para no ser arrastrados por la corriente. ¡La cola tiene una sección transversal cuadrada (no redonda!) lo que la hace aún más fuerte para agarrar! ¡A Coral le encanta envolver su cola alrededor de todo lo que encuentra!"
    ru: "Хвост морского конька — одно из самых хитрых изобретений природы! В отличие от большинства рыбьих хвостов, он может закручиваться и хвататься как хвост обезьяны. Морские коньки используют его, чтобы прикрепляться к морской траве, кораллам и даже друг другу, чтобы их не унесло течением. У хвоста квадратное сечение (не круглое!), что делает его ещё крепче для хватания. Коралл обожает обвивать хвостиком всё, что находит!"
  image: "detail-prehensile-tail.jpg"

- title:
    en: "The Coronet"
    es: "La Coronita"
    ru: "Коронка"
  description:
    en: "See the little crown on top of Bubbles' head? That's called a coronet! Every single seahorse has one, and no two are exactly alike — it's like a seahorse fingerprint! Scientists use coronets to tell individual seahorses apart. The coronet is made of bone and grows with the seahorse throughout its life. Bubbles has an especially tall, distinctive coronet that makes her easy to spot."
    es: "¿Ves la pequeña corona en la cabeza de Bubbles? ¡Se llama coronita! Cada caballito de mar tiene una, y no hay dos exactamente iguales — ¡es como una huella digital de caballito de mar! Los científicos usan las coronitas para distinguir a los caballitos de mar individuales. La coronita está hecha de hueso y crece con el caballito de mar durante toda su vida. Bubbles tiene una coronita especialmente alta y distintiva que la hace fácil de identificar."
    ru: "Видите маленькую корону на голове Баблс? Это называется коронка! У каждого морского конька она есть, и нет двух абсолютно одинаковых — это как отпечаток пальца морского конька! Учёные используют коронки, чтобы различать отдельных морских коньков. Коронка сделана из кости и растёт вместе с коньком всю жизнь. У Баблс особенно высокая, заметная коронка, по которой её легко узнать."
  image: "detail-coronet.jpg"

- title:
    en: "The Dorsal Fin"
    es: "La Aleta Dorsal"
    ru: "Спинной плавник"
  description:
    en: "Papa Sol's beautiful fan-like dorsal fin is a tiny marvel of engineering! This single small fin on the seahorse's back is their main engine — it flutters an incredible 35 times per second, so fast it looks like a hummingbird wing! Despite this amazing speed, seahorses are still the slowest fish in the ocean. They also have two tiny pectoral fins behind their head that help them steer. It's like having a tiny propeller and two little rudders!"
    es: "¡La hermosa aleta dorsal en forma de abanico de Papá Sol es una pequeña maravilla de ingeniería! Esta única aleta pequeña en la espalda del caballito de mar es su motor principal — ¡aletea increíbles 35 veces por segundo, tan rápido que parece un ala de colibrí! A pesar de esta velocidad asombrosa, los caballitos de mar siguen siendo los peces más lentos del océano. También tienen dos pequeñas aletas pectorales detrás de la cabeza que les ayudan a dirigirse. ¡Es como tener una pequeña hélice y dos pequeños timones!"
    ru: "Красивый веерообразный спинной плавник Папы Сола — крошечное чудо инженерии! Этот единственный маленький плавник на спине морского конька — их главный двигатель — он трепещет невероятные 35 раз в секунду, так быстро, что похож на крыло колибри! Несмотря на эту потрясающую скорость, морские коньки всё ещё самые медленные рыбы в океане. У них также есть два крошечных грудных плавника за головой, которые помогают рулить. Это как маленький пропеллер и два маленьких руля!"
  image: "detail-dorsal-fin.jpg"

