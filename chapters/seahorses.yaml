# Seahorses Chapter Definition - Coral's First Day in the Reef
meta:
  id: seahorses
  issueNumber: 12
  date: "February 2026"
  folderName: "seahorses"
  title:
    en: "Seahorses: The Tiniest Dance in the Sea"
    es: "Caballitos de Mar: La Danza Más Pequeña del Mar"
    ru: "Морские коньки: Самый крошечный танец в море"
  subtitle:
    en: "Coral's First Day in the Reef"
    es: "El Primer Día de Coral en el Arrecife"
    ru: "Первый день Коралла на рифе"
  magazineText:
    en: "Meet Coral, a tiny sunny-yellow baby seahorse who discovers the wonders of the reef on her very first day! Watch her swirl out of Papa Sol's magical pouch, learn to grip with her curly tail, and discover that seahorse families have the most beautiful dance in all the ocean."
    es: "¡Conoce a Coral, un diminuto caballito de mar amarillo que descubre las maravillas del arrecife en su primer día! Mírala salir del mágico bolsillo de Papá Sol, aprender a agarrarse con su cola rizada y descubrir que las familias de caballitos de mar tienen la danza más hermosa de todo el océano."
    ru: "Познакомьтесь с Коралл, крошечным солнечно-жёлтым морским коньком, который открывает чудеса рифа в свой самый первый день! Смотрите, как она выплывает из волшебного мешочка Папы Сола, учится хвататься закрученным хвостиком и узнаёт, что семьи морских коньков исполняют самый красивый танец во всём океане."
  magazineCover: "magazine-cover.jpg"
  hasGeneratedContent: true
  footerSubtitle:
    en: "Celebrating the most magical dancers in the ocean"
    es: "Celebrando a los bailarines más mágicos del océano"
    ru: "Celebrating самых волшебных танцоров океана"
  description: "Follow Coral the baby seahorse through her first day in the tropical reef, from swirling out of Papa's pouch to learning to grip, eat, and dance with her family"
  preface:
    en:
      - "Welcome to the sparkling coral reef, where the tiniest and most magical fish in the sea live — seahorses! In this adventure, we'll follow Coral, a sunny little baby seahorse, as she discovers the wonders of her colorful underwater home with her devoted Papa Sol and graceful Mama Pearl."
      - "Seahorses are truly one of nature's greatest surprises. Did you know that seahorse papas carry all the babies in a special pouch? And that seahorse parents dance together every single morning, changing colors and intertwining their tails? They are some of the most loving families in the ocean!"
      - "Through Coral's first day, you'll discover how seahorses grip with their curly tails, eat with their tubular snouts, look in two directions at once, and perform the most beautiful sunset dance you've ever seen. Get ready for a tiny, magical adventure!"
    es:
      - "¡Bienvenidos al brillante arrecife de coral, donde viven los peces más diminutos y mágicos del mar — los caballitos de mar! En esta aventura, seguiremos a Coral, un pequeño y soleado caballito de mar bebé, mientras descubre las maravillas de su colorido hogar submarino con su dedicado Papá Sol y su elegante Mamá Pearl."
      - "Los caballitos de mar son verdaderamente una de las mayores sorpresas de la naturaleza. ¿Sabías que los papás caballitos de mar cargan a todos los bebés en un bolsillo especial? ¿Y que los padres caballitos de mar bailan juntos cada mañana, cambiando de colores y entrelazando sus colas? ¡Son una de las familias más amorosas del océano!"
      - "A través del primer día de Coral, descubrirás cómo los caballitos de mar se agarran con sus colas rizadas, comen con sus hocicos tubulares, miran en dos direcciones a la vez y realizan la danza del atardecer más hermosa que hayas visto. ¡Prepárate para una pequeña aventura mágica!"
    ru:
      - "Добро пожаловать на сверкающий коралловый риф, где живут самые крошечные и волшебные рыбки моря — морские коньки! В этом приключении мы последуем за Коралл, маленьким солнечным морским коньком, пока она открывает чудеса своего красочного подводного дома вместе с преданным Папой Солом и грациозной Мамой Перл."
      - "Морские коньки — поистине одно из величайших чудес природы. Знаете ли вы, что папы морских коньков вынашивают всех малышей в специальном мешочке? И что родители морских коньков танцуют вместе каждое утро, меняя цвета и переплетая хвостики? Они — одни из самых любящих семей в океане!"
      - "Через первый день Коралл вы узнаете, как морские коньки хватаются закрученными хвостиками, едят трубчатыми мордочками, смотрят в двух направлениях одновременно и исполняют самый прекрасный танец на закате. Готовьтесь к крошечному волшебному приключению!"

hero:
  title:
    en: "Seahorses"
    es: "Caballitos de Mar"
    ru: "Морские коньки"
  subtitle:
    en: "The Tiniest Dance in the Sea"
    es: "La Danza Más Pequeña del Mar"
    ru: "Самый крошечный танец в море"
  image: "hero-coral-reef.jpg"
  imageType: "landscape"
  imageAlt:
    en: "Breathtaking tropical coral reef at dawn with shafts of golden sunlight filtering through turquoise water, vivid pink purple orange and yellow corals, swaying sea fans, colorful tropical fish, and sparkling particles floating in the warm water"
    es: "Impresionante arrecife de coral tropical al amanecer con rayos de luz dorada filtrándose a través del agua turquesa, corales vívidos en rosa púrpura naranja y amarillo, abanicos de mar meciéndose, peces tropicales coloridos y partículas brillantes flotando en el agua cálida"
    ru: "Захватывающий тропический коралловый риф на рассвете с лучами золотистого света, проникающими сквозь бирюзовую воду, яркие кораллы в розовых фиолетовых оранжевых и жёлтых тонах, покачивающиеся морские веера, разноцветные тропические рыбки и сверкающие частички, парящие в тёплой воде"

sections:
  # Meet Papa Sol
  - id: meet-papa
    generate_character: true
    mood: [soft-intimate, golden-hour]
    title:
      en: "Meet Papa Sol"
      es: "Conoce a Papá Sol"
      ru: "Знакомьтесь: Папа Сол"
    content:
      en: "Papa Sol is the proudest seahorse in all the reef! He is a handsome fellow in deep warm orange with golden speckles that shimmer like tiny stars whenever the sunlight touches him. His beautiful fan-like dorsal fin flutters so fast it's almost invisible. But the most special thing about Papa is his rounded belly pouch — because inside, dozens of tiny babies are growing! Papa holds onto a piece of swaying seagrass with his curly tail and rocks gently in the current. 'Almost time, little ones,' he whispers to his belly. 'Almost time.'"
      es: "¡Papá Sol es el caballito de mar más orgulloso de todo el arrecife! Es un apuesto ejemplar de color naranja cálido profundo con motas doradas que brillan como pequeñas estrellas cada vez que la luz del sol lo toca. Su hermosa aleta dorsal en forma de abanico aletea tan rápido que es casi invisible. ¡Pero lo más especial de Papá es su bolsillo redondeado en la barriga — porque adentro, docenas de pequeños bebés están creciendo! Papá se sujeta a una rama de hierba marina con su cola rizada y se mece suavemente en la corriente. 'Ya casi es hora, pequeños,' le susurra a su barriga. 'Ya casi.'"
      ru: "Папа Сол — самый гордый морской конёк на всём рифе! Он красавец глубокого тёплого оранжевого цвета с золотистыми крапинками, которые мерцают как крошечные звёзды, когда солнечный свет касается его. Его красивый веерообразный спинной плавник трепещет так быстро, что почти невидим. Но самое особенное в Папе — его округлый мешочек на животе — потому что внутри растут десятки крошечных малышей! Папа держится за покачивающуюся морскую траву закрученным хвостиком и мягко качается на течении. 'Уже скоро, малыши,' шепчет он своему животику. 'Уже скоро.'"
    image: "papa-sol-portrait.jpg"
    imageAlt:
      en: "Proud handsome seahorse in deep warm orange with golden speckles, rounded belly pouch, long elegant snout, beautiful fan-like dorsal fin, holding onto seagrass with curly tail, warm sunlight in turquoise water"
      es: "Orgulloso y apuesto caballito de mar en naranja cálido profundo con motas doradas, bolsillo redondeado en la barriga, hocico largo y elegante, hermosa aleta dorsal en forma de abanico, sujetándose a hierba marina con cola rizada, luz cálida en agua turquesa"
      ru: "Гордый красивый морской конёк глубокого тёплого оранжевого цвета с золотистыми крапинками, округлый мешочек на животе, длинная элегантная мордочка, красивый веерообразный спинной плавник, держащийся за морскую траву закрученным хвостиком, тёплый солнечный свет в бирюзовой воде"

  # Meet Mama Pearl
  - id: meet-mama
    generate_character: true
    mood: [translucency, lush-botanical]
    title:
      en: "Meet Mama Pearl"
      es: "Conoce a Mamá Pearl"
      ru: "Знакомьтесь: Мама Перл"
    content:
      en: "Here comes Mama Pearl, the most graceful seahorse in the reef! She glides through the water like a dancer, her shimmering rose-pink body catching the light in every direction. Pearlescent white highlights run along her ridges like tiny opals, and her delicate fins are so thin and beautiful they look like stained glass windows when the sun shines through them. Mama is slightly taller than Papa — elegant and poised. She swims toward Papa with the biggest smile. 'Good morning, my love,' she calls. 'Are you ready for our dance?'"
      es: "¡Aquí viene Mamá Pearl, la caballita de mar más elegante del arrecife! Se desliza por el agua como una bailarina, su cuerpo rosa brillante capturando la luz en todas las direcciones. Reflejos blancos nacarados recorren sus crestas como pequeños ópalos, y sus delicadas aletas son tan finas y hermosas que parecen vitrales cuando el sol brilla a través de ellas. Mamá es un poco más alta que Papá — elegante y distinguida. Nada hacia Papá con la sonrisa más grande. '¡Buenos días, mi amor!' llama. '¿Estás listo para nuestro baile?'"
      ru: "А вот и Мама Перл, самая грациозная морская конька на рифе! Она скользит по воде как танцовщица, её мерцающее розовое тело ловит свет со всех сторон. Перламутровые белые блики бегут вдоль её гребней как маленькие опалы, а её нежные плавники настолько тонкие и прекрасные, что похожи на витражи, когда сквозь них светит солнце. Мама немного выше Папы — элегантная и грациозная. Она плывёт к Папе с самой широкой улыбкой. 'Доброе утро, любимый,' зовёт она. 'Ты готов к нашему танцу?'"
    image: "mama-pearl-portrait.jpg"
    imageAlt:
      en: "Graceful seahorse in shimmering rose-pink with pearlescent white highlights along ridges, delicate almost-transparent fins catching light like stained glass, slightly taller build, elegant expression, surrounded by colorful coral"
      es: "Elegante caballita de mar en rosa brillante con reflejos blancos nacarados a lo largo de las crestas, aletas delicadas casi transparentes capturando la luz como vitrales, complexión un poco más alta, expresión elegante, rodeada de coral colorido"
      ru: "Грациозная морская конька мерцающего розового цвета с перламутровыми белыми бликами вдоль гребней, нежные почти прозрачные плавники ловящие свет как витражи, чуть более высокая фигура, элегантное выражение, окружённая красочными кораллами"

  # The Morning Dance
  - id: morning-dance
    mood: [golden-hour, translucency]
    use_characters: ["${meet-papa.image}", "${meet-mama.image}"]
    action: "two seahorses — one deep orange with golden speckles, one shimmering rose-pink — meeting at dawn in a coral reef, intertwining their curly tails together, both changing colors with swirls of pastel hues rippling across their bodies, golden sunbeams filtering through turquoise water, romantic and magical, tiny bubbles floating around them"
    title:
      en: "The Morning Dance"
      es: "La Danza Matutina"
      ru: "Утренний танец"
    content:
      en: "Every single morning, Mama Pearl and Papa Sol perform the most beautiful dance in the ocean. They swim toward each other through the golden water, and when they meet — they intertwine their curly tails! Then something magical happens: colors begin to ripple across their bodies! Papa flushes from orange to bright gold. Mama shimmers from pink to glowing peach. They spin together slowly, tails linked, changing colors like a living sunset. 'This is how we say I love you,' Mama whispers. They've danced every morning since they met — and they always will."
      es: "Cada mañana, Mamá Pearl y Papá Sol realizan la danza más hermosa del océano. Nadan uno hacia el otro a través del agua dorada, y cuando se encuentran — ¡entrelazan sus colas rizadas! Entonces algo mágico sucede: ¡los colores comienzan a ondular por sus cuerpos! Papá cambia de naranja a dorado brillante. Mamá brilla de rosa a melocotón luminoso. Giran juntos lentamente, colas enlazadas, cambiando de colores como un atardecer viviente. 'Así es como decimos te quiero,' susurra Mamá. Han bailado cada mañana desde que se conocieron — y siempre lo harán."
      ru: "Каждое утро Мама Перл и Папа Сол исполняют самый красивый танец в океане. Они плывут навстречу друг другу через золотистую воду, и когда встречаются — переплетают свои закрученные хвостики! Тогда происходит волшебство: по их телам начинают струиться цвета! Папа переливается из оранжевого в яркое золото. Мама мерцает от розового до светящегося персикового. Они медленно кружатся вместе, хвостики связаны, меняя цвета как живой закат. 'Так мы говорим «я тебя люблю»,' шепчет Мама. Они танцуют каждое утро с момента встречи — и всегда будут."
    image: "morning-dance.jpg"

  # Papa's Pouch
  - id: papas-pouch
    mood: [soft-intimate, translucency]
    use_character: "${meet-papa.image}"
    action: "close-up of an orange seahorse with golden speckles gripping seagrass with his curly tail, his rounded belly pouch visibly full and glowing faintly, rocking gently in the current, peaceful coral reef behind him, warm golden-green light, serene and tender"
    title:
      en: "Papa's Special Pouch"
      es: "El Bolsillo Especial de Papá"
      ru: "Особый мешочек Папы"
    content:
      en: "While the babies grow, Papa Sol has the most important job in all the sea. His round pouch is like a tiny nursery — warm, safe, and full of growing seahorse babies! Papa grips a piece of seagrass with his curly tail and rocks gently back and forth in the current. He can't swim very far or very fast right now, but he doesn't mind one bit. 'I'm the luckiest Papa in the ocean,' he says, patting his belly softly. Mama Pearl brings him tiny shrimp to eat and nuzzles him. 'You're doing wonderfully, my love.'"
      es: "Mientras los bebés crecen, Papá Sol tiene el trabajo más importante de todo el mar. Su bolsillo redondo es como una pequeña guardería — cálido, seguro y lleno de caballitos de mar creciendo. Papá se agarra a una hierba marina con su cola rizada y se mece suavemente con la corriente. No puede nadar muy lejos ni muy rápido ahora, ¡pero no le importa en absoluto! 'Soy el Papá más afortunado del océano,' dice, acariciando suavemente su barriga. Mamá Pearl le trae pequeños camarones para comer y lo acaricia. 'Lo estás haciendo maravillosamente, mi amor.'"
      ru: "Пока малыши растут, у Папы Сола самая важная работа во всём море. Его круглый мешочек — как крошечные ясли — тёплый, безопасный и полный растущих малышей-коньков! Папа держится за морскую траву закрученным хвостиком и мягко покачивается на течении. Он не может сейчас далеко или быстро плавать, но ему совсем не жаль. 'Я самый счастливый Папа в океане,' говорит он, нежно поглаживая животик. Мама Перл приносит ему крошечных креветок и ласково касается его. 'Ты справляешься чудесно, любимый.'"
    image: "papas-pouch.jpg"

  # The Big Arrival
  - id: the-big-arrival
    mood: [epic-skies, translucency]
    use_characters: ["${meet-papa.image}", "${meet-mama.image}"]
    action: "dramatic magical moment — an orange seahorse with golden speckles releasing dozens of tiny baby seahorses from his belly pouch into sparkling turquoise water, babies swirling out like confetti in a cloud of tiny bubbles, mama rose-pink seahorse watching nearby with joy, golden sunbeams streaming through the water, coral reef background, the most exciting moment ever"
    title:
      en: "The Big Arrival!"
      es: "¡La Gran Llegada!"
      ru: "Великое появление!"
    content:
      en: "The most exciting day has arrived! Papa Sol grips his seagrass tightly, and then — WHOOSH! Tiny baby seahorses begin swirling out of his pouch like living confetti! Dozens and dozens of miniature seahorses spiral into the sparkling water, each one smaller than a grain of rice! They tumble and twirl in the current, surrounded by a cloud of tiny bubbles. Mama Pearl watches with tears of joy. 'They're here! They're all here!' Papa gasps, out of breath but beaming with pride. It's the most magical moment in the entire reef."
      es: "¡El día más emocionante ha llegado! Papá Sol se agarra fuerte a su hierba marina, y entonces — ¡WOOSH! ¡Diminutos caballitos de mar bebés comienzan a salir en espiral de su bolsillo como confeti viviente! Docenas y docenas de caballitos de mar en miniatura giran en el agua brillante, ¡cada uno más pequeño que un grano de arroz! Ruedan y dan vueltas en la corriente, rodeados de una nube de pequeñas burbujas. Mamá Pearl observa con lágrimas de alegría. '¡Están aquí! ¡Todos están aquí!' jadea Papá, sin aliento pero radiante de orgullo."
      ru: "Самый волнующий день настал! Папа Сол крепко хватается за морскую траву, и тогда — ФУУ-У-УШ! Крошечные малыши-коньки начинают выплывать из его мешочка как живое конфетти! Десятки и десятки миниатюрных морских коньков спиралью кружатся в сверкающей воде, каждый меньше рисового зёрнышка! Они кувыркаются и вертятся на течении, окружённые облачком крошечных пузырьков. Мама Перл смотрит со слезами радости. 'Они здесь! Все здесь!' выдыхает Папа, запыхавшийся, но сияющий от гордости."
    image: "the-big-arrival.jpg"

  # Meet Coral and Bubbles
  - id: coral-and-bubbles
    generate_character: true
    mood: [soft-intimate, lush-botanical]
    use_characters: ["${meet-papa.image}", "${meet-mama.image}"]
    action: "two distinct tiny baby seahorses side by side — one bright sunny yellow with pink spots and enormous curious eyes, one soft lavender-purple with white belly and tall coronet — floating near their orange father and pink mother seahorse, colorful coral garden background, warm intimate lighting, adorable and heartwarming"
    title:
      en: "Meet Coral and Bubbles"
      es: "Conoce a Coral y Bubbles"
      ru: "Знакомьтесь: Коралл и Баблс"
    content:
      en: "Among all the tiny babies, two little seahorses stand out right away! Coral is bright sunny yellow with the cutest baby-pink spots and the most enormous curious eyes you've ever seen. She immediately starts looking around at EVERYTHING, her little tail curling with excitement. And right beside her is Bubbles — a slightly rounder baby in soft lavender-purple with a white belly and a distinctively tall coronet on her head. Bubbles is a bit shy, and the very first thing she does is grip Papa's tail. 'Don't worry, Bubbles,' Papa says gently. 'I've got you.'"
      es: "¡Entre todos los diminutos bebés, dos pequeños caballitos de mar destacan de inmediato! Coral es amarilla brillante como el sol con las manchitas rosa más lindas y los ojos curiosos más enormes que hayas visto. Inmediatamente empieza a mirar TODO a su alrededor, su colita rizándose de emoción. Y justo a su lado está Bubbles — una bebé un poco más redonda en suave lavanda-púrpura con barriga blanca y una corona distintivamente alta en su cabeza. Bubbles es un poco tímida, y lo primero que hace es agarrarse a la cola de Papá. 'No te preocupes, Bubbles,' dice Papá suavemente. 'Te tengo.'"
      ru: "Среди всех крошечных малышей двое маленьких морских коньков сразу выделяются! Коралл — ярко-жёлтая, солнечная, с самыми милыми розовыми пятнышками и самыми огромными любопытными глазами, какие вы когда-либо видели. Она тут же начинает разглядывать ВСЁ вокруг, её маленький хвостик закручивается от волнения. А рядом с ней — Баблс — чуть более круглая малышка нежного лавандово-фиолетового цвета с белым животиком и заметно высокой коронкой на голове. Баблс немного стеснительная, и самое первое, что она делает — хватается за хвост Папы. 'Не волнуйся, Баблс,' мягко говорит Папа. 'Я рядом.'"
    image: "coral-and-bubbles-portrait.jpg"
    imageAlt:
      en: "Two tiny adorable baby seahorses — one bright sunny yellow with pink spots and enormous curious eyes, one soft lavender-purple with white belly and tall coronet — floating together near colorful coral"
      es: "Dos diminutos y adorables caballitos de mar bebés — uno amarillo brillante con manchas rosas y enormes ojos curiosos, uno suave lavanda-púrpura con barriga blanca y corona alta — flotando juntos cerca de coral colorido"
      ru: "Два крошечных очаровательных малыша-конька — один ярко-жёлтый с розовыми пятнышками и огромными любопытными глазами, другой нежно-лавандово-фиолетовый с белым животиком и высокой коронкой — плавающие вместе возле красочных кораллов"

  # Tail Gripping
  - id: tail-gripping
    mood: [lush-botanical, soft-intimate]
    use_characters: ["${coral-and-bubbles.image}", "${meet-papa.image}"]
    action: "two tiny baby seahorses — one yellow, one purple — learning to grip with their curly tails, the yellow one wrapped around a piece of bright green seagrass, the purple one gripping the orange father's tail, coral reef with swaying sea fans behind them, warm dappled sunlight, adorable learning moment"
    title:
      en: "Hold On Tight!"
      es: "¡Agárrate Fuerte!"
      ru: "Держись крепче!"
    content:
      en: "The very first lesson for baby seahorses is the most important one: hold on tight! Seahorses are the slowest swimmers in the ocean, so their curly tails are their superpower. Coral tries gripping a piece of bright green seagrass — her tiny tail wraps around it like a little spring. 'I did it! I did it!' she squeaks. Bubbles tries too, but instead of gripping the seagrass, she wraps her tail around Papa's tail. 'That works too,' Papa laughs. They practice gripping everything — seagrass, coral branches, each other's tails. It's the best game ever!"
      es: "¡La primera lección para los caballitos de mar bebés es la más importante: agárrate fuerte! Los caballitos de mar son los nadadores más lentos del océano, así que sus colas rizadas son su superpoder. Coral intenta agarrarse a una hierba marina verde brillante — su colita se envuelve alrededor como un pequeño resorte. '¡Lo logré! ¡Lo logré!' chilla. Bubbles también intenta, pero en vez de agarrar la hierba marina, envuelve su cola alrededor de la cola de Papá. 'Eso también funciona,' ríe Papá. Practican agarrar todo — hierba marina, ramas de coral, las colas de los demás."
      ru: "Самый первый урок для малышей-коньков — самый важный: держись крепко! Морские коньки — самые медленные пловцы в океане, поэтому их закрученные хвостики — их суперсила. Коралл пробует ухватиться за ярко-зелёную морскую траву — её крошечный хвостик обвивается вокруг как маленькая пружинка. 'Получилось! Получилось!' пищит она. Баблс тоже пробует, но вместо травы обвивает хвостиком хвост Папы. 'Так тоже подходит,' смеётся Папа. Они тренируются хвататься за всё подряд — морскую траву, веточки кораллов, хвостики друг друга."
    image: "tail-gripping.jpg"

  # Tiny Meals
  - id: tiny-meals
    mood: [soft-intimate, translucency]
    use_characters: ["${coral-and-bubbles.image}"]
    action: "tiny yellow baby seahorse with enormous eyes sucking up microscopic food through her tubular snout, tiny sparkly particles visible being drawn in like a vacuum, purple baby seahorse beside her trying too, surrounded by floating microscopic plankton that sparkles, warm turquoise water with coral in background"
    title:
      en: "Snout Snacks!"
      es: "¡Bocadillos de Hocico!"
      ru: "Перекус через мордочку!"
    content:
      en: "Time for the first meal! Baby seahorses eat by sucking food through their long tubular snouts — SLURRRP! — like a tiny underwater vacuum cleaner. Coral spots a cloud of sparkly microscopic shrimp and — SLUUURP! — she sucks one right up! 'Mmmm!' Her eyes go wide. 'More! More!' Bubbles tries too — SLURP, SLURP — she's a natural! 'You need to eat ALL DAY LONG,' Mama Pearl tells them, 'because you have no stomach! Food goes straight through you.' 'No stomach?!' Coral gasps. 'Best excuse for always eating!'"
      es: "¡Hora de la primera comida! Los caballitos de mar bebés comen succionando comida a través de sus largos hocicos tubulares — ¡SLURRRP! — como una pequeña aspiradora submarina. Coral ve una nube de diminutos camarones brillantes y — ¡SLURRRP! — ¡succiona uno! '¡Mmmm!' Sus ojos se agrandan. '¡Más! ¡Más!' Bubbles también intenta — ¡SLURP, SLURP! — ¡es una natural! 'Necesitan comer TODO EL DÍA,' les dice Mamá Pearl, 'porque no tienen estómago. La comida pasa directo.' '¿¡Sin estómago!?' jadea Coral. '¡La mejor excusa para siempre estar comiendo!'"
      ru: "Время первой еды! Малыши-коньки едят, всасывая еду через длинные трубчатые мордочки — ХЛЮП! — как крошечный подводный пылесос. Коралл замечает облачко сверкающих микроскопических креветок и — ХЛЮЮЮП! — всасывает одну! 'Ммм!' Её глаза округляются. 'Ещё! Ещё!' Баблс тоже пробует — ХЛЮП, ХЛЮП — у неё природный талант! 'Вам нужно есть ВЕСЬ ДЕНЬ,' говорит им Мама Перл, 'потому что у вас нет желудка! Еда проходит насквозь.' 'Нет желудка?!' ахает Коралл. 'Лучшее оправдание, чтобы всегда кушать!'"
    image: "tiny-meals.jpg"

  # Two-Way Eyes
  - id: two-way-eyes
    mood: [lush-botanical, translucency]
    use_characters: ["${coral-and-bubbles.image}"]
    action: "close-up of a tiny bright yellow baby seahorse with one eye looking forward at a colorful clownfish and the other eye looking backward at a purple baby seahorse, both eyes clearly pointing in different directions, vibrant coral reef background with anemones and sea fans, warm playful lighting, funny and adorable"
    title:
      en: "Eyes Everywhere!"
      es: "¡Ojos por Todas Partes!"
      ru: "Глаза повсюду!"
    content:
      en: "Coral makes the FUNNIEST discovery! She's looking at a pretty orange clownfish swimming in front of her, when she realizes — she can ALSO see Bubbles sneaking up behind her! Each of her eyes can look in a completely different direction at the same time! 'Bubbles, I can see you back there!' Coral giggles. 'HOW?!' Bubbles squeaks, startled. 'My eyes are magic! One looks forward, one looks backward!' Coral spins one eye up and one eye down. 'I can see the sky AND the sand at the same time!' Papa laughs. 'That's your seahorse superpower, little ones.'"
      es: "¡Coral hace el descubrimiento MÁS GRACIOSO! Está mirando a un bonito pez payaso naranja nadando frente a ella, cuando se da cuenta — ¡TAMBIÉN puede ver a Bubbles acercándose por detrás! ¡Cada uno de sus ojos puede mirar en una dirección completamente diferente al mismo tiempo! '¡Bubbles, puedo verte allí atrás!' ríe Coral. '¿¡CÓMO!?' chilla Bubbles, asustada. '¡Mis ojos son mágicos! ¡Uno mira adelante, otro mira atrás!' Coral gira un ojo hacia arriba y otro hacia abajo. '¡Puedo ver el cielo Y la arena al mismo tiempo!' Papá ríe. 'Ese es su superpoder de caballito de mar, pequeñas.'"
      ru: "Коралл делает САМОЕ СМЕШНОЕ открытие! Она смотрит на красивую оранжевую рыбку-клоуна, плывущую перед ней, когда понимает — она ТАКЖЕ видит Баблс, подкрадывающуюся сзади! Каждый её глаз может смотреть в совершенно разном направлении одновременно! 'Баблс, я вижу тебя сзади!' хихикает Коралл. 'КАК?!' пищит Баблс, испуганная. 'Мои глаза волшебные! Один смотрит вперёд, другой — назад!' Коралл поворачивает один глаз вверх, а другой вниз. 'Я вижу небо И песок одновременно!' Папа смеётся. 'Это ваша суперсила морских коньков, малышки.'"
    image: "two-way-eyes.jpg"

  # Reef Exploration
  - id: reef-exploration
    mood: [lush-botanical, epic-skies]
    use_characters: ["${meet-papa.image}", "${meet-mama.image}", "${coral-and-bubbles.image}"]
    action: "seahorse family — orange father, rose-pink mother, tiny yellow baby and tiny purple baby — touring a magnificent colorful coral reef together, swimming past giant purple sea fans, bright orange anemones with clownfish, yellow tube sponges, schools of tiny blue fish, golden sunbeams creating light shafts through the water, magical and awe-inspiring underwater landscape"
    title:
      en: "The Grand Reef Tour"
      es: "El Gran Tour del Arrecife"
      ru: "Великая экскурсия по рифу"
    content:
      en: "Time for an adventure! The whole family sets out to explore their magnificent reef home. They drift past waving purple sea fans as tall as trees, bright orange anemones where clownfish play peek-a-boo, yellow tube sponges that look like chimneys, and gardens of coral in every color imaginable. 'Look, Mama! A starfish!' squeals Coral, pointing with her snout. 'Look, Papa! Blue fish!' Bubbles whispers from behind Papa's tail. The reef is an endless wonderland of color and life. Even Papa and Mama discover something new. 'We've lived here our whole lives,' Mama marvels, 'and it still surprises us.'"
      es: "¡Hora de una aventura! Toda la familia sale a explorar su magnífico hogar de arrecife. Se deslizan junto a abanicos de mar púrpura ondulantes tan altos como árboles, anémonas naranjas brillantes donde los peces payaso juegan al escondite, esponjas tubulares amarillas que parecen chimeneas, y jardines de coral en cada color imaginable. '¡Mira, Mamá! ¡Una estrella de mar!' chilla Coral, señalando con su hocico. '¡Mira, Papá! ¡Peces azules!' susurra Bubbles desde detrás de la cola de Papá. El arrecife es un mundo maravilloso sin fin de color y vida."
      ru: "Время приключений! Вся семья отправляется исследовать свой великолепный рифовый дом. Они проплывают мимо покачивающихся фиолетовых морских вееров высотой с деревья, ярко-оранжевых актиний, где рыбки-клоуны играют в прятки, жёлтых трубчатых губок, похожих на дымоходы, и садов кораллов всех мыслимых цветов. 'Смотри, Мама! Морская звезда!' визжит Коралл, показывая мордочкой. 'Смотри, Папа! Голубые рыбки!' шепчет Баблс из-за Папиного хвоста. Риф — бесконечная страна чудес, полная красок и жизни."
    image: "reef-exploration.jpg"

  # The Color Dance (Finale)
  - id: color-dance
    mood: [golden-hour, epic-skies]
    use_characters: ["${meet-papa.image}", "${meet-mama.image}", "${coral-and-bubbles.image}"]
    action: "sunset scene underwater — orange father seahorse and rose-pink mother seahorse with tails intertwined performing their color-changing dance, nearby two tiny baby seahorses — one yellow one purple — trying to copy them, their little bodies flickering through rainbow colors clumsily, golden sunset light streaming down through the water, coral reef silhouettes, magical and heartwarming family moment, particles of light floating like stars"
    title:
      en: "The Sunset Dance"
      es: "La Danza del Atardecer"
      ru: "Танец на закате"
    content:
      en: "As the golden sunset light streams down through the water, Mama Pearl and Papa Sol begin their evening dance. Their tails intertwine, and colors ripple across their bodies — orange to gold, pink to peach, then both shimmer with rainbow light. And then something wonderful happens: Coral and Bubbles try to dance too! Coral flickers from yellow to green to — OOPS — bright red! Bubbles flashes from purple to blue and accidentally turns polka-dotted! They're not very good at it yet, but they're trying SO HARD. The whole family laughs and dances together as the reef glows gold around them. This is home. This is love. This is the tiniest, most beautiful dance in all the sea."
      es: "Mientras la luz dorada del atardecer se filtra por el agua, Mamá Pearl y Papá Sol comienzan su danza vespertina. Sus colas se entrelazan, y los colores ondean por sus cuerpos — naranja a oro, rosa a melocotón, luego ambos brillan con luz de arcoíris. ¡Y entonces algo maravilloso sucede: Coral y Bubbles intentan bailar también! Coral parpadea de amarillo a verde a — ¡UPS! — ¡rojo brillante! Bubbles destella de púrpura a azul y accidentalmente se vuelve de lunares. No son muy buenas todavía, pero se esfuerzan TANTO. Toda la familia ríe y baila junta mientras el arrecife brilla dorado a su alrededor. Esto es hogar. Esto es amor. Esta es la danza más pequeña y hermosa de todo el mar."
      ru: "Когда золотистый закатный свет струится сквозь воду, Мама Перл и Папа Сол начинают свой вечерний танец. Их хвостики переплетаются, и по их телам разливаются цвета — оранжевый в золотой, розовый в персиковый, затем оба мерцают радужным светом. И тогда происходит чудесное: Коралл и Баблс тоже пытаются танцевать! Коралл мигает от жёлтого к зелёному и — ОЙ! — ярко-красному! Баблс вспыхивает от фиолетового к голубому и случайно становится в горошек! Они пока не очень хорошо танцуют, но стараются ТАК СИЛЬНО. Вся семья смеётся и танцует вместе, пока риф сияет золотом вокруг них. Это — дом. Это — любовь. Это — самый крошечный, самый прекрасный танец во всём море."
    image: "color-dance-sunset.jpg"
    imageAlt:
      en: "Seahorse family at sunset — orange Papa and pink Mama with tails intertwined dancing, two tiny babies trying to copy them, golden light streaming through water, coral reef glowing, magical rainbow colors flickering across all four seahorses"
      es: "Familia de caballitos de mar al atardecer — Papá naranja y Mamá rosa con colas entrelazadas bailando, dos diminutos bebés intentando copiarlos, luz dorada atravesando el agua, arrecife brillando, colores de arcoíris mágicos parpadeando en los cuatro caballitos"
      ru: "Семья морских коньков на закате — оранжевый Папа и розовая Мама с переплетёнными хвостиками танцуют, два крошечных малыша пытаются их копировать, золотистый свет пронизывает воду, риф сияет, волшебные радужные цвета мерцают на всех четырёх коньках"

