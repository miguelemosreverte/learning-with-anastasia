viewerDetails:
- title:
    en: "The Winter Den"
    es: "La Guarida Invernal"
    ru: "Зимняя Берлога"
  description:
    en: "Look at the cozy den! Brown bears dig their dens under tree roots, in hillsides, or even in caves. The entrance is small to keep heat in, and the main chamber is lined with dried grass and leaves. It stays a comfortable temperature even when it's freezing outside!"
    es: "¡Mira la acogedora guarida! Los osos pardos cavan sus guaridas bajo raíces de árboles, en laderas o incluso en cuevas. La entrada es pequeña para mantener el calor, y la cámara principal está forrada con hierba seca y hojas. ¡Se mantiene a una temperatura cómoda incluso cuando afuera está helando!"
    ru: "Посмотрите на уютную берлогу! Бурые медведи роют берлоги под корнями деревьев, на склонах холмов или даже в пещерах. Вход маленький, чтобы сохранять тепло, а основная камера выстлана сухой травой и листьями. Там сохраняется комфортная температура, даже когда снаружи мороз!"
  image: "detail-den-structure.jpg"

- title:
    en: "Built-In Snowshoes"
    es: "Raquetas de Nieve Incorporadas"
    ru: "Встроенные Снегоступы"
  description:
    en: "Did you notice Papa Bear's huge paws? Brown bear paws can be over 12 inches wide! The thick pads and fur between the toes spread their weight over a larger area, working like natural snowshoes. Their long claws — up to 4 inches — help them dig for roots and catch fish."
    es: "¿Notaste las enormes patas de Papá Oso? ¡Las patas de oso pardo pueden medir más de 30 centímetros de ancho! Las gruesas almohadillas y el pelaje entre los dedos distribuyen su peso sobre una área más grande, funcionando como raquetas de nieve naturales. Sus largas garras — hasta 10 centímetros — les ayudan a cavar raíces y atrapar peces."
    ru: "Заметили огромные лапы Папы Медведя? Лапы бурого медведя могут быть более 30 сантиметров в ширину! Толстые подушечки и мех между пальцами распределяют вес на большую площадь, работая как естественные снегоступы. Их длинные когти — до 10 сантиметров — помогают им копать корни и ловить рыбу."
  image: "detail-bear-paws.jpg"

- title:
    en: "Nature's Best Coat"
    es: "El Mejor Abrigo de la Naturaleza"
    ru: "Лучшая Шуба Природы"
  description:
    en: "Mama Bear's thick fur has a secret — it's actually two layers! A dense, soft underfur traps warm air close to the skin, while longer guard hairs on top shed water and snow. This double coat keeps bears warm in temperatures as low as -40 degrees!"
    es: "El grueso pelaje de Mamá Osa tiene un secreto — ¡en realidad son dos capas! Un denso y suave subpelaje atrapa aire cálido cerca de la piel, mientras que los pelos de guardia más largos en la parte superior repelen el agua y la nieve. ¡Este doble abrigo mantiene a los osos calientes en temperaturas tan bajas como -40 grados!"
    ru: "У густого меха Мамы Медведицы есть секрет — на самом деле это два слоя! Плотный, мягкий подшёрсток удерживает тёплый воздух у кожи, а более длинные остевые волосы сверху отталкивают воду и снег. Эта двойная шуба согревает медведей при температуре до -40 градусов!"
  image: "detail-thick-fur.jpg"

- title:
    en: "A Bear's Changing Menu"
    es: "El Menú Cambiante del Oso"
    ru: "Меняющееся Меню Медведя"
  description:
    en: "Brown bears are omnivores — they eat both plants and animals! Their diet changes with the seasons: in spring, they munch on roots and fresh grass. In summer, it's berries and insects. In autumn, they feast on salmon to build fat for winter. One bear can eat 90 pounds of food per day before hibernation!"
    es: "¡Los osos pardos son omnívoros — comen tanto plantas como animales! Su dieta cambia con las estaciones: en primavera, comen raíces y hierba fresca. En verano, son bayas e insectos. En otoño, se dan festines de salmón para acumular grasa para el invierno. ¡Un oso puede comer 40 kilos de comida por día antes de la hibernación!"
    ru: "Бурые медведи всеядны — они едят и растения, и животных! Их рацион меняется со сменой времён года: весной они грызут корни и свежую траву. Летом — ягоды и насекомые. Осенью они пируют лососем, чтобы накопить жир на зиму. Один медведь может съедать до 40 кг пищи в день перед спячкой!"
  image: "detail-seasonal-diet.jpg"

